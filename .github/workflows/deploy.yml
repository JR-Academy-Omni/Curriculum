name: Deploy Curriculum to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Setup Chrome + puppeteer-core + 预渲染 mp-article 的所有海报成真实 PNG
      # 让公众号粘贴时能抓到图片 URL（base64 会被微信丢弃）
      - name: Setup Chrome (for mp-article poster PNG rendering)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install curriculum root deps (puppeteer-core)
        run: bun install

      - name: Render mp-article posters to PNG (ai-engineer / business-analyst / web-code)
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: bun run render:mp-posters

      # Build ai-adoption-bootcamp
      - name: Build ai-adoption-bootcamp
        working-directory: ai-adoption-bootcamp
        run: |
          bun install
          bun run build

      # Build ai-engineer-bootcamp
      - name: Build ai-engineer-bootcamp
        working-directory: ai-engineer-bootcamp
        run: |
          bun install
          bun run build

      # Build web-code-bootcamp-or-learn-to-code-1 (第 30 期 Full-Stack + AI · slide deck + mp-article + xhs-posters)
      # URL slug with -1 suffix to match production: /program-course/web-code-bootcamp-or-learn-to-code-1
      - name: Build web-code-bootcamp-or-learn-to-code-1
        working-directory: web-code-bootcamp-or-learn-to-code-1
        run: |
          bun install
          bun run build

      # ai-essentials-bootcamp: static HTML only, no React build needed

      # ai-programming (Cursor AI 编程实战课): static HTML only, no React build needed

      # ai-builder (Vibe Coding 提升班): static HTML only, no React build needed

      # Assemble all courses into one output
      - name: Assemble output
        run: |
          mkdir -p _site/ai-adoption-bootcamp
          cp -r ai-adoption-bootcamp/dist/* _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/index.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/curriculum.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase1.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase2.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase3.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase4.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/styles.css _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/internal.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/learning-plan.html _site/ai-adoption-bootcamp/
          [ -f ai-adoption-bootcamp/public/pages.json ] && cp ai-adoption-bootcamp/public/pages.json _site/ai-adoption-bootcamp/ || true
          # ai-adoption-bootcamp 小红书素材集
          if [ -d ai-adoption-bootcamp/public/xhs-posters ]; then
            cp -r ai-adoption-bootcamp/public/xhs-posters _site/ai-adoption-bootcamp/
          fi

          mkdir -p _site/ai-essentials-bootcamp
          cp -r ai-essentials-bootcamp/public/* _site/ai-essentials-bootcamp/

          # web-code-bootcamp-or-learn-to-code-1 (第 30 期 · Full-Stack + AI)
          # URL slug 匹配 production: /program-course/web-code-bootcamp-or-learn-to-code-1
          # 包含：Vite slide deck（dist）+ curriculum.html + styles.css
          #       + mp-article 公众号发稿页 + xhs-posters 小红书素材 + outline.json
          mkdir -p _site/web-code-bootcamp-or-learn-to-code-1
          cp -r web-code-bootcamp-or-learn-to-code-1/dist/* _site/web-code-bootcamp-or-learn-to-code-1/
          if [ -d web-code-bootcamp-or-learn-to-code-1/public ]; then
            cp -r web-code-bootcamp-or-learn-to-code-1/public/* _site/web-code-bootcamp-or-learn-to-code-1/
          fi

          # ai-engineer-rag (AI Engineer 入门): static HTML only, no React build needed
          if [ -d ai-engineer-rag/public ]; then
            mkdir -p _site/ai-engineer-rag
            cp -r ai-engineer-rag/public/* _site/ai-engineer-rag/
          fi

          # ai-programming (Cursor AI 编程实战课) / ai-builder (Vibe Coding 提升班):
          # only copy if directory exists (not yet committed)
          if [ -d ai-programming/public ]; then
            mkdir -p _site/ai-programming
            cp -r ai-programming/public/* _site/ai-programming/
          fi

          if [ -d ai-builder/public ]; then
            mkdir -p _site/ai-builder
            cp -r ai-builder/public/* _site/ai-builder/
          fi

          # full-stack-developer-interview: data-only (outline.json used by skills-data sync),
          # HTML pages will land later. Deployed so outline.json + any future pages are live.
          if [ -d full-stack-developer-interview/public ]; then
            mkdir -p _site/full-stack-developer-interview
            cp -r full-stack-developer-interview/public/* _site/full-stack-developer-interview/
          fi

          # it-career-support: static HTML only
          if [ -d it-career-support/public ]; then
            mkdir -p _site/it-career-support
            cp -r it-career-support/public/* _site/it-career-support/
          fi

          # openclaw-workshop: static HTML only (4-hour offline workshop, no React build)
          if [ -d openclaw-workshop/public ]; then
            mkdir -p _site/openclaw-workshop
            cp -r openclaw-workshop/public/* _site/openclaw-workshop/
          fi

          # ai-comic-workshop: static HTML only (2-hour online Zoom workshop, 张彦伟 · AI 漫剧)
          if [ -d ai-comic-workshop/public ]; then
            mkdir -p _site/ai-comic-workshop
            cp -r ai-comic-workshop/public/* _site/ai-comic-workshop/
          fi

          # claude-cowork-workshop: static HTML only (3-hour hands-on workshop, Claude Cowork)
          if [ -d claude-cowork-workshop/public ]; then
            mkdir -p _site/claude-cowork-workshop
            cp -r claude-cowork-workshop/public/* _site/claude-cowork-workshop/
          fi

          # openclaw-bootcamp: static HTML only (4-week deep version of openclaw-workshop)
          if [ -d openclaw-bootcamp/public ]; then
            mkdir -p _site/openclaw-bootcamp
            cp -r openclaw-bootcamp/public/* _site/openclaw-bootcamp/
          fi

          # business-analyst (AI 产品经理 BA 训练营): static HTML only, generated from outline.json
          if [ -d business-analyst/public ]; then
            mkdir -p _site/business-analyst
            cp -r business-analyst/public/* _site/business-analyst/
          fi

          mkdir -p _site/ai-engineer-bootcamp
          cp -r ai-engineer-bootcamp/dist/* _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/curriculum.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/outline.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase1.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase2.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase3.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase4.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/styles.css _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/internal.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/jd-mapping.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/learning-plan.html _site/ai-engineer-bootcamp/
          [ -f ai-engineer-bootcamp/public/pages.json ] && cp ai-engineer-bootcamp/public/pages.json _site/ai-engineer-bootcamp/ || true
          if [ -d ai-engineer-bootcamp/public/posters ]; then
            cp -r ai-engineer-bootcamp/public/posters _site/ai-engineer-bootcamp/
          fi
          if [ -d ai-engineer-bootcamp/public/xhs-posters ]; then
            cp -r ai-engineer-bootcamp/public/xhs-posters _site/ai-engineer-bootcamp/
          fi
          if [ -d ai-engineer-bootcamp/public/mp-article ]; then
            cp -r ai-engineer-bootcamp/public/mp-article _site/ai-engineer-bootcamp/
          fi
          if [ -d ai-engineer-bootcamp/public/video ]; then
            cp -r ai-engineer-bootcamp/public/video _site/ai-engineer-bootcamp/
          fi
          if [ -d ai-engineer-bootcamp/public/jobs ]; then
            cp -r ai-engineer-bootcamp/public/jobs _site/ai-engineer-bootcamp/
          fi

          # Top-level posters aggregate page (internal marketing asset index)
          [ -f posters.html ] && cp posters.html _site/posters.html || true
          [ -f quest-posters.html ] && cp quest-posters.html _site/quest-posters.html || true

          # ChatGPT 海报 Prompt 库 (gpt-image-2 prompt 货架，posters.html banner 入口)
          [ -f image-prompts.html ] && cp image-prompts.html _site/image-prompts.html || true
          [ -d image-prompts ] && cp -r image-prompts _site/image-prompts || true
          [ -f IMAGE_PROMPTS_PRD.md ] && cp IMAGE_PROMPTS_PRD.md _site/IMAGE_PROMPTS_PRD.md || true

          # AI 每日头条海报已迁至 jr-wiki，走 GitHub Pages:
          # https://jr-academy-ai.github.io/jr-wiki/ai-news-posters/

          # Index page
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8">
            <title>JR Academy Curriculum</title>
            <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800;900&family=DM+Sans:wght@500;600;700&family=Space+Mono:wght@700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: "DM Sans", "Noto Sans SC", sans-serif; background: #fff1e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
              .container { text-align: center; max-width: 1200px; }
              h1 { font-family: "Bricolage Grotesque", sans-serif; font-size: 48px; font-weight: 900; margin-bottom: 12px; }
              p { font-size: 16px; color: #666; margin-bottom: 32px; }
              .section { margin-bottom: 32px; }
              .section-title { font-family: "Space Mono", monospace; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; }
              .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
              a { display: block; width: 280px; padding: 24px; background: #fff; text-decoration: none; color: #000; border: 3px solid #000; box-shadow: 6px 6px 0 #000; transition: all 0.15s; text-align: left; }
              a:hover { box-shadow: none; transform: translate(4px, 4px); }
              .tag { display: inline-block; padding: 4px 10px; font-size: 11px; font-weight: 700; font-family: "Space Mono", monospace; color: #fff; margin-bottom: 12px; }
              .title { font-family: "Bricolage Grotesque", sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
              .desc { font-size: 13px; color: #666; line-height: 1.6; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>JR Academy Curriculum</h1>
              <p>课程大纲与详情</p>

              <div class="section">
                <div class="section-title">AI 必修课 · 4 周 · 零基础入门</div>
                <div class="cards">
                  <a href="./ai-essentials-bootcamp/curriculum.html">
                    <span class="tag" style="background:#2e7d32">CURRICULUM</span>
                    <div class="title">AI 必修课</div>
                    <div class="desc">课程总览 — 4 Phase、16 课、面向 40-60 岁非技术人员</div>
                  </a>
                  <a href="./ai-essentials-bootcamp/outline.html">
