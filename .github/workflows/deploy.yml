      # Generate pages.json from outline.json for each bootcamp
      # Reads the curriculumPages field from each outline.json and writes it to
      # _site/<slug>/pages.json so the frontend iframe embed can list HTML pages.
      - name: Generate pages.json
        run: |
          set -x
          for outline in */public/outline.json; do
            [ -f "$outline" ] || continue
            slug=$(basename "$(dirname "$(dirname "$outline")")")
            if [ ! -d "_site/${slug}" ]; then
              echo "Skip $slug — not in _site"
              continue
            fi
            if jq -e '.curriculumPages' "$outline" > /dev/null 2>&1; then
              jq '.curriculumPages' "$outline" > "_site/${slug}/pages.json"
              echo "Generated _site/${slug}/pages.json"
              cat "_site/${slug}/pages.json"
            else
              echo "Skip $slug — no curriculumPages in outline.json"
            fi
          done

      # Clean up stale directories on server before deploy (SCP 只复制不删，改目录名后老数据会残留)
      # 一次性清掉已知的废弃 slug —— 新增 bootcamp 改名 / 删除时都在这里加一行
      - name: Clean stale directories on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 2026-04-21 · 错的无后缀 slug，已合并进 -1/
            sudo rm -rf /var/www/static/curriculum/web-code-bootcamp-or-learn-to-code
            # 列一下当前 curriculum 下还剩什么（方便日志核对）
            ls /var/www/static/curriculum/

      # Deploy to server via SCP
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "_site/*"
          target: "/var/www/static/curriculum"
          strip_components: 1
          overwrite: true
