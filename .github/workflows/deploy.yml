name: Deploy Curriculum to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Build ai-adoption-bootcamp
      - name: Build ai-adoption-bootcamp
        working-directory: ai-adoption-bootcamp
        run: |
          bun install
          bun run build

      # Build ai-engineer-bootcamp
      - name: Build ai-engineer-bootcamp
        working-directory: ai-engineer-bootcamp
        run: |
          bun install
          bun run build

      # ai-essentials-bootcamp: static HTML only, no React build needed

      # ai-coding-bootcamp: static HTML only, no React build needed

      # vibe-coding-bootcamp: static HTML only, no React build needed

      # Assemble all courses into one output
      - name: Assemble output
        run: |
          mkdir -p _site/ai-adoption-bootcamp
          cp -r ai-adoption-bootcamp/dist/* _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/index.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/curriculum.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase1.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase2.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase3.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/phase4.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/styles.css _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/internal.html _site/ai-adoption-bootcamp/
          cp ai-adoption-bootcamp/public/learning-plan.html _site/ai-adoption-bootcamp/

          mkdir -p _site/ai-essentials-bootcamp
          cp -r ai-essentials-bootcamp/public/* _site/ai-essentials-bootcamp/

          mkdir -p _site/ai-coding-bootcamp
          cp -r ai-coding-bootcamp/public/* _site/ai-coding-bootcamp/

          mkdir -p _site/vibe-coding-bootcamp
          cp -r vibe-coding-bootcamp/public/* _site/vibe-coding-bootcamp/

          mkdir -p _site/ai-engineer-bootcamp
          cp -r ai-engineer-bootcamp/dist/* _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/curriculum.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/outline.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase1.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase2.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase3.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/phase4.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/styles.css _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/internal.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/jd-mapping.html _site/ai-engineer-bootcamp/
          cp ai-engineer-bootcamp/public/learning-plan.html _site/ai-engineer-bootcamp/

          # Index page
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8">
            <title>JR Academy Curriculum</title>
            <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800;900&family=DM+Sans:wght@500;600;700&family=Space+Mono:wght@700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: "DM Sans", "Noto Sans SC", sans-serif; background: #fff1e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
              .container { text-align: center; max-width: 1200px; }
              h1 { font-family: "Bricolage Grotesque", sans-serif; font-size: 48px; font-weight: 900; margin-bottom: 12px; }
              p { font-size: 16px; color: #666; margin-bottom: 32px; }
              .section { margin-bottom: 32px; }
              .section-title { font-family: "Space Mono", monospace; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; }
              .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
              a { display: block; width: 280px; padding: 24px; background: #fff; text-decoration: none; color: #000; border: 3px solid #000; box-shadow: 6px 6px 0 #000; transition: all 0.15s; text-align: left; }
              a:hover { box-shadow: none; transform: translate(4px, 4px); }
              .tag { display: inline-block; padding: 4px 10px; font-size: 11px; font-weight: 700; font-family: "Space Mono", monospace; color: #fff; margin-bottom: 12px; }
              .title { font-family: "Bricolage Grotesque", sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
              .desc { font-size: 13px; color: #666; line-height: 1.6; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>JR Academy Curriculum</h1>
              <p>课程大纲与详情</p>

              <div class="section">
                <div class="section-title">AI 必修课 · 4 周 · 零基础入门</div>
                <div class="cards">
                  <a href="./ai-essentials-bootcamp/curriculum.html">
                    <span class="tag" style="background:#2e7d32">CURRICULUM</span>
                    <div class="title">AI 必修课</div>
                    <div class="desc">课程总览 — 4 Phase、16 课、面向 40-60 岁非技术人员</div>
                  </a>
                  <a href="./ai-essentials-bootcamp/outline.html">
                    <span class="tag" style="background:#FF914D">OUTLINE</span>
                    <div class="title">AI 必修课 完整大纲</div>
                    <div class="desc">16 课 × 98 Step 完整序列 — Lesson 即 Lab 模式</div>
                  </a>
                  <a href="./ai-essentials-bootcamp/internal.html">
                    <span class="tag" style="background:#dc2626">INTERNAL</span>
                    <div class="title">AI 必修课 内部资料</div>
                    <div class="desc">Lab 映射、竞品分析、Marketing 素材、定价建议</div>
                  </a>
                </div>
              </div>

              <div class="section">
                <div class="section-title">AI Coding 实战课 · 5-8 周 · 零基础 Non-tech</div>
                <div class="cards">
                  <a href="./ai-coding-bootcamp/curriculum.html">
                    <span class="tag" style="background:#10b981">CURRICULUM</span>
                    <div class="title">Cursor AI 编程实战课</div>
                    <div class="desc">课程总览 — 46 课、4 Phase、零基础用 Cursor 做产品</div>
                  </a>
                  <a href="./ai-coding-bootcamp/outline.html">
                    <span class="tag" style="background:#FF914D">OUTLINE</span>
                    <div class="title">AI Coding 完整大纲</div>
                    <div class="desc">46 课 × 138 Steps 完整序列</div>
                  </a>
                </div>
              </div>

              <div class="section">
                <div class="section-title">Vibe Coding 实战课 · 8 周 · For Developer</div>
                <div class="cards">
                  <a href="./vibe-coding-bootcamp/curriculum.html">
                    <span class="tag" style="background:#6366f1">CURRICULUM</span>
                    <div class="title">Claude Code + Cursor 实战课</div>
                    <div class="desc">课程总览 — 42 课、Skills/MCP/Agent/全栈</div>
                  </a>
                  <a href="./vibe-coding-bootcamp/outline.html">
                    <span class="tag" style="background:#FF914D">OUTLINE</span>
                    <div class="title">Vibe Coding 完整大纲</div>
                    <div class="desc">42 课 × 124 Steps 完整序列</div>
                  </a>
                </div>
              </div>

              <div class="section">
                <div class="section-title">AI Adoption Specialist Bootcamp · 8 周</div>
                <div class="cards">
                  <a href="./ai-adoption-bootcamp/">
                    <span class="tag" style="background:#10b981">CURRICULUM</span>
                    <div class="title">AI Adoption Specialist</div>
                    <div class="desc">课程结构详情 — 大纲、Phase 详情</div>
                  </a>
                  <a href="./ai-adoption-bootcamp/slides.html">
                    <span class="tag" style="background:#6366f1">SLIDE DECK</span>
                    <div class="title">AI Adoption Specialist</div>
                    <div class="desc">13 页互动演示 — 课程概览、卖点、定价</div>
                  </a>
                  <a href="./ai-adoption-bootcamp/learning-plan.html">
                    <span class="tag" style="background:#FF914D">LEARNING PLAN</span>
                    <div class="title">AI Adoption 学习方案</div>
                    <div class="desc">完整学习路径、资源清单、待建 Checklist</div>
                  </a>
                  <a href="./ai-adoption-bootcamp/internal.html">
                    <span class="tag" style="background:#dc2626">INTERNAL</span>
                    <div class="title">AI Adoption 内部资料</div>
                    <div class="desc">Lab 映射、老师分工、JD 对比、Marketing 素材</div>
                  </a>
                </div>
              </div>

              <div class="section">
                <div class="section-title">AI Engineer Bootcamp · 12 周</div>
                <div class="cards">
                  <a href="./ai-engineer-bootcamp/">
                    <span class="tag" style="background:#6366f1">SLIDE DECK</span>
                    <div class="title">AI Engineer</div>
                    <div class="desc">13 页互动演示 — 课程概览、卖点、定价</div>
                  </a>
                  <a href="./ai-engineer-bootcamp/curriculum.html">
                    <span class="tag" style="background:#10b981">CURRICULUM</span>
                    <div class="title">AI Engineer</div>
                    <div class="desc">课程结构详情 — 95 节课、4 Phase、7 项目</div>
                  </a>
                  <a href="./ai-engineer-bootcamp/outline.html">
                    <span class="tag" style="background:#FF914D">OUTLINE</span>
                    <div class="title">AI Engineer 完整大纲</div>
                    <div class="desc">95 节课详细列表 — Lesson/Video/Info/Project</div>
                  </a>
                  <a href="./ai-engineer-bootcamp/internal.html">
                    <span class="tag" style="background:#dc2626">INTERNAL</span>
                    <div class="title">AI Engineer 内部资料</div>
                    <div class="desc">Lab 映射、老师分工、JD 对比、Marketing 素材</div>
                  </a>
                </div>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      # Generate pages.json from outline.json for each bootcamp
      - name: Generate pages.json
        run: |
          for dir in _site/*/; do
            slug=$(basename "$dir")
            outline="${slug}/public/outline.json"
            if [ -f "$outline" ]; then
              python3 -c "
          import json, sys
          d = json.load(open(sys.argv[1]))
          cp = d.get('curriculumPages')
          if cp:
              json.dump(cp, open(sys.argv[2], 'w'), indent=2)
              print(f'Generated pages.json for {sys.argv[3]}')
          " "$outline" "${dir}pages.json" "$slug"
            fi
          done

      # Deploy to server via SCP
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "_site/*"
          target: "/var/www/static/curriculum"
          strip_components: 1
          overwrite: true
