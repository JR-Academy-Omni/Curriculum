              <div class="section">
                <div class="section-title">AI Engineer 全栈项目班 · 6 个月 · 第 30 期</div>
                <div class="cards">
                  <a href="./web-code-bootcamp-or-learn-to-code-1/">
                    <span class="tag" style="background:#6366f1">SLIDE DECK</span>
                    <div class="title">Full-Stack + AI 公开课</div>
