<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding 海报生成器 V2.1 - Fix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&family=Noto+Serif+SC:wght@900&family=Space+Grotesk:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --jr-red: #FF5757;
            --jr-beige: #FFF1E7;
            --jr-blue: #10162f;
            --jr-yellow: #FFD23F;
            --jr-cyan: #00F5FF;
            --black: #000000;
            --white: #ffffff;
            --shadow-brutal: 10px 10px 0px var(--black);
            --border-heavy: 5px solid var(--black);
            --transition: all 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f5f5;
            color: var(--black);
            font-family: 'Noto Sans SC', sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-main {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 40px;
            background: var(--jr-yellow);
            color: var(--black);
            padding: 15px 40px;
            border: var(--border-heavy);
            box-shadow: 12px 12px 0 var(--black);
            transform: rotate(-1deg);
            font-family: 'Space Grotesk', sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 50px;
            max-width: 1500px;
            width: 100%;
        }

        /* --- Sidebar --- */
        .sidebar { display: flex; flex-direction: column; gap: 25px; }
        .card { background: var(--white); border: var(--border-heavy); padding: 30px; box-shadow: 10px 10px 0 var(--black); position: relative; }
        .card h3 { font-size: 16px; text-transform: uppercase; margin-bottom: 20px; background: var(--black); color: var(--white); padding: 4px 12px; display: inline-block; font-weight: 900; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn { background: var(--white); border: 3px solid var(--black); padding: 12px 18px; font-weight: 900; cursor: pointer; transition: var(--transition); font-size: 14px; }
        .btn:hover { background: var(--jr-beige); transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--black); }
        .btn.active { background: var(--jr-red); color: var(--white); box-shadow: 6px 6px 0 var(--black); transform: translate(-3px, -3px); }

        .direction-list { display: flex; flex-direction: column; gap: 12px; }
        .dir-item { padding: 18px; border: 3px solid var(--black); background: var(--white); cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); }
        .dir-item:hover { background: var(--jr-cyan); transform: translateX(5px); }
        .dir-item.active { background: var(--jr-blue); color: var(--white); transform: translateX(15px); border-left: 15px solid var(--jr-red); }

        /* --- Poster --- */
        .poster-view { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        
        #poster {
            background-color: var(--jr-beige);
            border: 6px solid var(--black);
            box-shadow: 30px 30px 0px var(--black);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Background Watermark */
        .p-bg-text {
            position: absolute;
            font-family: 'Noto Serif SC', serif;
            font-size: 280px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(0,0,0,0.08);
            z-index: 1;
            white-space: nowrap;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-12deg);
            pointer-events: none;
            user-select: none;
            letter-spacing: -10px;
        }

        .p-header {
            background: var(--black);
            color: var(--white);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--black);
            z-index: 10;
            flex-shrink: 0; /* Prevent header from shrinking */
        }

        .p-body {
            flex: 1;
            padding: 30px 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
            position: relative;
            overflow: hidden; /* Ensure body content doesn't push footer out */
        }

        .p-badge-stack { display: flex; flex-direction: column; gap: 8px; width: fit-content; }
        .p-badge { background: var(--jr-red); color: var(--white); padding: 6px 15px; font-weight: 900; border: 4px solid var(--black); transform: rotate(-1deg); font-size: 18px; width: fit-content; box-shadow: 6px 6px 0 var(--black); }
        .p-tag-line { background: var(--jr-cyan); color: var(--black); padding: 4px 12px; font-weight: 900; border: 3px solid var(--black); font-size: 12px; width: fit-content; font-family: 'Space Grotesk', sans-serif; }

        /* Headline: Solid & Heavy */
        .p-headline {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 82px; /* Slightly reduced to fit fixed height */
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -4px;
            margin: 10px 0;
            text-transform: uppercase;
            color: var(--black);
            text-shadow: 
                2px 2px 0 var(--white),
                5px 5px 0 var(--black);
        }

        .p-headline span.highlight {
            background: var(--jr-yellow);
            padding: 5px 12px;
            display: inline-block;
            border: 4px solid var(--black);
            box-shadow: 6px 6px 0 var(--black);
            transform: skewX(-5deg);
            margin-top: 5px;
        }

        .p-content-box {
            background: var(--white);
            border: 5px solid var(--black);
            padding: 20px 25px;
            box-shadow: 10px 10px 0px var(--black);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.4;
            max-width: 90%;
            position: relative;
        }

        .p-footer {
            padding: 25px 40px;
            background: var(--white);
            border-top: 6px solid var(--black);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
            flex-shrink: 0; /* CRITICAL: Prevent footer from being pushed out */
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-item { border-left: 6px solid var(--jr-red); padding-left: 15px; }
        .stat-val { font-size: 42px; font-weight: 900; line-height: 1; font-family: 'Bebas Neue', sans-serif; }
        .stat-lbl { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #333; margin-top: 5px; }

        .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .qr-container { width: 120px; height: 120px; border: 4px solid var(--black); padding: 5px; background: white; box-shadow: 6px 6px 0 var(--jr-cyan); transform: rotate(1deg); }
        .qr-img { width: 100%; height: 100%; }
        .qr-caption { font-size: 9px; font-weight: 900; background: var(--black); color: white; padding: 2px 8px; text-transform: uppercase; }

        /* Sizes */
        #poster.moment { width: 800px; height: 800px; }
        #poster.xhs { width: 800px; height: 1066px; }
        #poster.banner { width: 1200px; height: 510px; }
        #poster.banner .p-bg-text { font-size: 200px; }
        #poster.banner .p-body { flex-direction: row; align-items: center; justify-content: space-between; padding: 0 60px; }
        #poster.banner .p-headline { font-size: 60px; width: 50%; }
        #poster.banner .p-content-box { width: 45%; margin: 0; }
        #poster.long { width: 800px; height: 1600px; }

        /* Copy Area */
        .copy-section { margin-top: 30px; background: #111; color: #00ff41; padding: 30px; border: 4px solid var(--black); box-shadow: 12px 12px 0 #222; position: relative; font-family: 'Courier New', monospace; font-size: 16px; }
        .copy-trigger { position: absolute; top: -20px; right: 30px; background: var(--jr-cyan); color: black; border: 4px solid var(--black); padding: 10px 25px; font-weight: 900; cursor: pointer; box-shadow: 5px 5px 0 var(--black); }

    </style>
</head>
<body>

    <h1 class="title-main">AI CODING POSTER V2.1</h1>

    <div class="container">
        <div class="sidebar">
            <div class="card">
                <h3>1. 输出尺寸 (CHANNELS)</h3>
                <div class="btn-group" id="size-selector">
                    <button class="btn active" data-size="moment">朋友圈</button>
                    <button class="btn" data-size="xhs">小红书</button>
                    <button class="btn" data-size="banner">公众号头图</button>
                    <button class="btn" data-size="long">详情长图</button>
                </div>
            </div>

            <div class="card">
                <h3>2. 叙事策略 (STRATEGY)</h3>
                <div class="direction-list" id="dir-selector">
                    <button class="dir-item active" data-dir="0">01. 零基础觉醒 <span>→</span></button>

                    <button class="dir-item" data-dir="6">07. 自由职业者 <span>→</span></button>
                    <button class="dir-item" data-dir="7">08. 避坑指南 <span>→</span></button>
                    <button class="dir-item" data-dir="8">09. 作品集 <span>→</span></button>
                </div>
            </div>

            <div class="copy-section">
                <button class="copy-trigger" onclick="copyContent()">COPY TEXT</button>
                <div id="copy-result">// 文案生成中...</div>
            </div>
        </div>

        <div class="poster-view">
            <div id="poster" class="moment">
                <div class="p-bg-text" id="p-bg-text">AI CODING</div>
                
                <div class="p-header">
                    <div style="font-family: 'Space Grotesk'; font-weight: 900; font-size: 28px; letter-spacing: -1px;">JIANGREN / AI</div>
                    <div style="font-weight: 900; letter-spacing: 2px; font-size: 12px; color: var(--jr-cyan);">V2.1_2026</div>
                </div>

                <div class="p-body">
                    <div class="p-badge-stack">
                        <div class="p-tag-line" id="p-tag">MODULE_ID: NEW_PARADIGM</div>
                        <div class="p-badge" id="p-badge">零基础觉醒</div>
                    </div>

                    <div class="p-headline" id="p-head">
                        不会写代码<br>
                        <span class="highlight">AI帮你写</span>
                    </div>

                    <div class="p-content-box" id="p-content">
                        <!-- Content -->
                    </div>
                </div>

                <div class="p-footer">
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-val">103+</div>
                            <div class="stat-lbl">LECTURES</div>
                        </div>
                        <div class="stat-item" style="border-color: var(--black);">
                            <div class="stat-val">29</div>
                            <div class="stat-lbl">LAB_TESTS</div>
                        </div>
                    </div>

                    <div class="qr-wrap">
                        <div class="qr-container">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://jiangren.com.au/program-course/ai-programming" class="qr-img">
                        </div>
                        <div class="qr-caption">BUILD_YOUR_FUTURE</div>
                    </div>
                </div>
            </div>
            <p style="font-size: 14px; font-weight: 900; background: var(--black); color: white; padding: 10px 40px; margin-top: 20px;">[ 点击右下角红色「⬇ 下载 PNG」按钮一键导出 ]</p>
        </div>
    </div>

    <script>
        const posters = [
            {
                head: "不会写代码<br><span class='highlight'>AI帮你写</span>",
                badge: "零基础觉醒",
                bg: "AI WRITING",
                content: "别再纠结语法。在 AI 时代，逻辑就是唯一的门槛。8周时间，带你用人类语言指令，构建属于自己的全栈产品。",
                tag: "ZERO_TO_HERO",
                copy: "【零基础觉醒】\n代码不再是门槛，思维才是。匠人学院《AI Coding 实战课》，带你用嘴写代码，8周上线个人App。🚀"
            },
            {
                head: "省下 $10,000<br><span class='highlight'>自建MVP</span>",
                badge: "创业者自由",
                bg: "MVP BUILD",
                content: "拒绝昂贵外包。掌握 AI 编程，一人即是开发部。快速验证商业想法，把每一分预算都精准投向增长核心。",
                tag: "SOLO_FOUNDER",
                copy: "【创业者自由】\n省下1万刀外包费，自己用AI做MVP。速度快10倍，成本近乎0。你的下一款产品，不需要求人。💰"
            },
            {
                head: "降维打击<br><span class='highlight'>效率革命</span>",
                badge: "降维打击",
                bg: "HYPER DRIVE",
                content: "这是生产力的代差。传统开发者还在查文档，你已经通过 AI 完成了全栈部署。在速度上，实现对同行的绝对压制。",
                tag: "SPEED_AS_WEAPON",
                copy: "【降维打击】\n别人还在学打印 Hello World，你已经用 AI 部署了全栈应用。这就是 AI Coding 的效率压制。⏳"
            },
            {
                head: "拒绝被<br><span class='highlight'>AI取代</span>",
                badge: "焦虑粉碎机",
                bg: "EVOLUTION",
                content: "与其担心淘汰，不如率先进化。掌握 AI 编程，从被动的“工具使用者”蜕变为主动的“AI 架构师”。",
                tag: "ANTI_REPLACE",
                copy: "【焦虑粉碎机】\n与其担心被AI取代，不如先学会如何用AI淘汰对手。加入我们，掌握未来的生存技能。🔥"
            },
            {
                head: "103节课<br><span class='highlight'>29个实验</span>",
                badge: "核心硬数据",
                bg: "HARD DATA",
                content: "数据证明生产力。从 Prompt 精调到 Agent 自动化流，全链路工业级实战。每一分钟投入，都转化为可交付的代码。",
                tag: "STABLE_BUILD",
                copy: "【实战派】\n103节实战课 + 29个互动实验。不讲废话，只带你做真正能运行的产品。匠人学院出品。📊"
            },
            {
                head: "抢占职场<br><span class='highlight'>新风口</span>",
                badge: "职业新物种",
                bg: "AI BUILDER",
                content: "年薪 $100K+ 的 AI Builder 职位虚位以待。掌握“AI+开发+业务”的复合技能，在 2026 年的职场竞争中降维生存。",
                tag: "NEW_OPPORTUNITY",
                copy: "【职业新物种】\nAI Builder 是2026年最抢手的人才。懂AI、懂开发、懂业务。现在上车，占领高薪高地。👔"
            },
            {
                head: "碎片时间<br><span class='highlight'>创造资产</span>",
                badge: "自由职业者",
                bg: "PASSIVE ASSET",
                content: "每天 1 小时，撬动数字杠杆。无论身在何处，利用 AI 编程快速构建 SaaS 副业，打造属于你的 24 小时自动收益系统。",
                tag: "FREELANCE_LIFE",
                copy: "【自由生活】\n用碎片时间，在家里就能开发出全球使用的 SaaS。AI Coding 让副业变得如此简单。🏡"
            },
            {
                head: "告别烂尾<br><span class='highlight'>不再被坑</span>",
                badge: "避坑指南",
                bg: "CTO MINDSET",
                content: "外包难懂你？代码交付差？学会 AI 编程，掌握技术底层逻辑。自己当 CTO，彻底终结技术信息差，告别烂尾工程。",
                tag: "NO_MORE_TRAPS",
                copy: "【避坑指南】\n为什么你请的外包总是失败？因为你不懂技术底层。学会AI编程，自己就是CTO，彻底告别烂尾工程。💸"
            },
            {
                head: "这就是你<br><span class='highlight'>的作品集</span>",
                badge: "真实成果",
                bg: "PROUD WORK",
                content: "从 AI 营销助手到全自动工作流。这些都是非技术背景学员在 8 周内的真实产出。你的创意，离上线只差一次点击。",
                tag: "SUCCESS_STORIES",
                copy: "【见证奇迹】\n看看非技术背景的学员们都用 AI 做了什么？你的创意，只差这一门课的距离。🏆"
            }
        ];

        let size = 'moment';
        let dir = 0;

        function update() {
            const p = document.getElementById('poster');
            const item = posters[dir];

            p.className = size;
            document.getElementById('p-head').innerHTML = item.head;
            document.getElementById('p-badge').innerText = item.badge;
            document.getElementById('p-bg-text').innerText = item.bg;
            document.getElementById('p-content').innerText = item.content;
            document.getElementById('p-tag').innerText = "STRATEGY_ID: " + item.tag;
            document.getElementById('copy-result').innerText = item.copy;
        }

        document.getElementById('size-selector').addEventListener('click', (e) => {
            if (e.target.dataset.size) {
                document.querySelectorAll('#size-selector .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                size = e.target.dataset.size;
                update();
            }
        });

        document.getElementById('dir-selector').addEventListener('click', (e) => {
            const btn = e.target.closest('.dir-item');
            if (btn) {
                document.querySelectorAll('#dir-selector .dir-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                dir = parseInt(btn.dataset.dir);
                update();
            }
        });

        function copyContent() {
            const text = document.getElementById('copy-result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const trigger = document.querySelector('.copy-trigger');
                trigger.innerText = 'COPIED!';
                trigger.style.background = '#00ff41';
                setTimeout(() => {
                    trigger.innerText = 'COPY TEXT';
                    trigger.style.background = 'var(--jr-cyan)';
                }, 2000);
            });
        }

        update();
    </script>

    <!-- 下载 PNG 按钮 -->
    <button id="jr-download-btn" type="button" style="position:fixed;right:24px;bottom:24px;z-index:99999;background:#ff5757;color:#fff;border:3px solid #000;box-shadow:6px 6px 0 #000;padding:14px 22px;font-family:'Space Mono','DM Sans',monospace;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;">⬇ 下载 PNG</button>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
    (function(){
      var btn = document.getElementById('jr-download-btn');
      btn.addEventListener('mouseenter', function(){ btn.style.transform='translate(3px,3px)'; btn.style.boxShadow='3px 3px 0 #000'; });
      btn.addEventListener('mouseleave', function(){ btn.style.transform=''; btn.style.boxShadow='6px 6px 0 #000'; });
      btn.addEventListener('click', async function(){
        var target = document.getElementById('poster');
        if (!target) { alert('未找到海报元素 #poster'); return; }
        var original = btn.textContent;
        btn.textContent = '渲染中…';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        try {
          var canvas = await html2canvas(target, { backgroundColor: null, scale: 2, useCORS: true, allowTaint: true, logging: false });
          var slug = (location.pathname.split('/').pop() || 'poster').replace(/\.html?$/,'');
          var link = document.createElement('a');
          link.download = slug + '-' + Date.now() + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error(err);
          alert('导出失败：' + (err && err.message ? err.message : err));
        } finally {
          btn.textContent = original;
          btn.disabled = false;
          btn.style.opacity = '';
        }
      });
    })();
    </script>
</body>
</html>
