<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding 海报生成器 V5 - Bento Grid Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+SC:wght@900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5757;
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --black: #1D1D1F;
            --border: #D2D2D7;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg);
            color: var(--black);
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- Workspace --- */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1300px;
        }

        .sidebar { display: flex; flex-direction: column; gap: 30px; }
        .control-card { background: #FFF; padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 700; color: #86868B; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .opt-list { display: flex; flex-direction: column; gap: 8px; }
        .opt-btn { background: #FBFBFB; border: 1px solid var(--border); text-align: left; padding: 12px 16px; font-size: 13px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: 0.2s; color: #444; }
        .opt-btn.active { background: var(--black); color: var(--white); border-color: var(--black); color: #FFF; }

        .size-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .size-btn { padding: 8px 16px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: white; cursor: pointer; transition: 0.2s; }
        .size-btn.active { background: var(--black); color: white; border-color: var(--black); }

        /* --- BENTO POSTER --- */
        #poster {
            background: #F0F0F2;
            padding: 30px;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 15px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            transition: all 0.5s var(--ease);
        }

        /* Abstract Pattern Background */
        .p-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.03;
            background-image: url('https://www.transparenttextures.com/patterns/pinstripe-light.png');
        }

        .bento-tile {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        /* Tile Configurations */
        .tile-head { grid-column: 1 / 5; grid-row: 1 / 4; background: var(--black); color: #FFF; justify-content: flex-end; }
        .tile-head .eye { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin-bottom: 15px; }
        .tile-head h2 { font-family: 'Noto Serif SC', serif; font-size: 42px; line-height: 1.1; font-weight: 900; }

        .tile-stat { grid-column: 5 / 7; grid-row: 1 / 3; text-align: center; }
        .tile-stat .val { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; }
        .tile-stat .label { font-size: 10px; font-weight: 700; color: #86868B; margin-top: 5px; }

        .tile-img { grid-column: 5 / 7; grid-row: 3 / 5; padding: 0; }
        .tile-img img { width: 100%; height: 100%; object-fit: cover; }

        .tile-desc { grid-column: 1 / 4; grid-row: 4 / 7; }
        .tile-desc p { font-size: 15px; font-weight: 500; line-height: 1.6; color: #444; }

        .tile-lab { grid-column: 4 / 7; grid-row: 5 / 7; background: #FFF1E7; }
        .tile-lab b { font-size: 28px; color: var(--black); }
        .tile-lab span { font-size: 12px; font-weight: 700; }

        .tile-qr { grid-column: 4 / 5; grid-row: 4 / 5; padding: 10px; align-items: center; }
        .tile-qr img { width: 100%; filter: contrast(1.1); }

        /* Sizes Control */
        #poster.moment { width: 600px; height: 600px; }
        #poster.xhs { width: 600px; height: 800px; }
        #poster.banner { width: 900px; height: 383px; padding: 20px; }
        #poster.banner .tile-head h2 { font-size: 32px; }
        #poster.long { width: 600px; height: 1100px; }

        /* Dark Mode for Bento */
        #poster.dark-mode { background: #000; }
        #poster.dark-mode .bento-tile { background: #1A1A1A; border-color: #333; color: #FFF; }
        #poster.dark-mode .tile-head { background: #FFF; color: #000; }
        #poster.dark-mode .tile-desc p { color: #AAA; }
        #poster.dark-mode .tile-lab { background: #333; color: #FFF; }
        #poster.dark-mode .tile-lab b { color: var(--primary); }

        /* Copy Panel */
        .copy-panel { background: white; padding: 24px; border-radius: 20px; border: 1px solid var(--border); margin-top: 30px; }
        .copy-text { font-size: 13px; line-height: 1.6; color: #666; white-space: pre-wrap; margin-bottom: 20px; background: #F5F5F7; padding: 15px; border-radius: 12px; max-height: 120px; overflow-y: auto; }
        .btn-main { background: var(--black); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

    </style>
</head>
<body>

    <div class="workspace">
        <div class="sidebar">
            <div class="control-card">
                <div class="section-title">Narrative Tile</div>
                <div class="opt-list" id="dir-selector">
                    <button class="opt-btn active" data-dir="0">THE CURRICULUM / 课程</button>
                    <button class="opt-btn" data-dir="1">THE EFFICIENCY / 效率</button>
                    <button class="opt-btn" data-dir="2">THE CAREER / 职业</button>
                </div>
            </div>

            <div class="control-card">
                <div class="section-title">Grid Format</div>
                <div class="size-group" id="size-selector">
                    <button class="size-btn active" data-size="moment">Moment</button>
                    <button class="size-btn" data-size="xhs">Social</button>
                    <button class="size-btn" data-size="banner">Banner</button>
                </div>
            </div>

            <div class="control-card">
                <div class="section-title">Color System</div>
                <div class="size-group" id="tone-selector">
                    <button class="size-btn active" data-tone="light">Cloud White</button>
                    <button class="size-btn" data-tone="dark">Deep Space</button>
                </div>
            </div>

            <div class="copy-panel">
                <div id="copy-text" class="copy-text">...</div>
                <button class="btn-main" onclick="copyText()">Copy To Clipboard</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="poster" class="moment">
                <div class="p-pattern"></div>
                
                <div class="bento-tile tile-head">
                    <div class="eye" id="p-eye">AI CODING SYMPOSIUM</div>
                    <h2 id="p-head">人人都能学的<br>AI Coding 实战课</h2>
                </div>

                <div class="bento-tile tile-stat">
                    <div class="val">103+</div>
                    <div class="label">PRACTICAL LESSONS</div>
                </div>

                <div class="bento-tile tile-stat" style="grid-row: 3/5;">
                    <div class="val">5</div>
                    <div class="label">WEEKS TO DEPLOY</div>
                </div>

                <div class="bento-tile tile-img">
                    <img id="p-img" src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80&w=600" alt="Tech">
                </div>

                <div class="bento-tile tile-desc">
                    <p id="p-desc">从零开始，利用 AI 跨越代码鸿沟。这不仅是一门编程课，更是你通往 AI 时代的入场券。</p>
                </div>

                <div class="bento-tile tile-qr">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://jiangren.com.au/program-course/ai-programming" alt="QR">
                </div>

                <div class="bento-tile tile-lab">
                    <b>29+</b>
                    <span>INTERACTIVE LABS</span>
                </div>
            </div>
            <p style="color: #999; font-size: 11px; margin-top: 10px;">BENTO GRID LAYOUT v1.0 • DESIGNED FOR JIANGREN ACADEMY</p>
        </div>
    </div>

    <script>
        const content = [
            {
                eye: "MASTER THE FUTURE",
                head: "掌握 AI 开发<br>定义新生产力",
                desc: "103 节精心设计的课程，带你从 Prompt 技巧一路进化到全栈 AI Agent 开发。5周时间，见证你的产品上线。",
                img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=600",
                copy: "【AI 时代，人人都是开发者】\n匠人学院《AI Coding 实战课》，5周上线个人App。🚀"
            },
            {
                eye: "EFFICIENCY REVOLUTION",
                head: "拒绝低效重复<br>用 AI 加速一切",
                desc: "传统开发 6 个月的工作量，在 AI 辅助下仅需 5 周。这不仅是提速，更是维度的跨越。",
                img: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=600",
                copy: "【效率革命】\n传统编程 6 个月 vs AI 编程 5 周。用 AI 赋能，实现真正的降维打击。⏳"
            },
            {
                eye: "CAREER UPGRADE",
                head: "成为首批<br>AI Builder",
                desc: "抢占 2026 年最稀缺的岗位。不论你之前是什么背景，掌握 AI 编程就是掌握了高薪职业的第二曲线。",
                img: "https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?auto=format&fit=crop&q=80&w=600",
                copy: "【职场新风口】\nAI Product Builder 是2026年最抢手人才。重塑职业天花板。👔"
            }
        ];

        let curDir = 0, curSize = 'moment', curTone = 'light';

        function update() {
            const p = document.getElementById('poster');
            const d = content[curDir];
            p.className = `${curSize} ${curTone === 'dark' ? 'dark-mode' : ''}`;
            document.getElementById('p-head').innerHTML = d.head;
            document.getElementById('p-desc').innerText = d.desc;
            document.getElementById('p-eye').innerText = d.eye;
            document.getElementById('p-img').src = d.img;
            document.getElementById('copy-text').innerText = d.copy;
        }

        document.getElementById('dir-selector').onclick = (e) => {
            if (e.target.dataset.dir) {
                document.querySelectorAll('#dir-selector .opt-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                curDir = parseInt(e.target.dataset.dir); update();
            }
        };

        document.getElementById('size-selector').onclick = (e) => {
            if (e.target.dataset.size) {
                document.querySelectorAll('#size-selector .size-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                curSize = e.target.dataset.size; update();
            }
        };

        document.getElementById('tone-selector').onclick = (e) => {
            if (e.target.dataset.tone) {
                document.querySelectorAll('#tone-selector .size-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                curTone = e.target.dataset.tone; update();
            }
        };

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('copy-text').innerText).then(() => alert('Copy Success!'));
        }

        update();
    </script>

    <!-- 下载 PNG 按钮 -->
    <button id="jr-download-btn" type="button" style="position:fixed;right:24px;bottom:24px;z-index:99999;background:#ff5757;color:#fff;border:3px solid #000;box-shadow:6px 6px 0 #000;padding:14px 22px;font-family:'Space Mono','DM Sans',monospace;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;">⬇ 下载 PNG</button>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
    (function(){
      var btn = document.getElementById('jr-download-btn');
      btn.addEventListener('mouseenter', function(){ btn.style.transform='translate(3px,3px)'; btn.style.boxShadow='3px 3px 0 #000'; });
      btn.addEventListener('mouseleave', function(){ btn.style.transform=''; btn.style.boxShadow='6px 6px 0 #000'; });
      btn.addEventListener('click', async function(){
        var target = document.getElementById('poster');
        if (!target) { alert('未找到海报元素 #poster'); return; }
        var original = btn.textContent;
        btn.textContent = '渲染中…';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        try {
          var canvas = await html2canvas(target, { backgroundColor: null, scale: 2, useCORS: true, allowTaint: true, logging: false });
          var slug = (location.pathname.split('/').pop() || 'poster').replace(/\.html?$/,'');
          var link = document.createElement('a');
          link.download = slug + '-' + Date.now() + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error(err);
          alert('导出失败：' + (err && err.message ? err.message : err));
        } finally {
          btn.textContent = original;
          btn.disabled = false;
          btn.style.opacity = '';
        }
      });
    })();
    </script>
</body>
</html>
