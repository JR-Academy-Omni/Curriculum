<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding 宣传海报生成器 V1 - CyberTech Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5757;
            --accent: #00F0FF;
            --bg-dark: #0A0F1E;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05070A;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* --- Header & Tabs --- */
        header {
            width: 100%;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .tab-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: #888;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 87, 87, 0.3);
        }

        /* --- Main Layout --- */
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin-top: 40px;
            gap: 40px;
            padding: 0 20px;
        }

        /* --- Control Panel (Left) --- */
        .controls {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .control-section {
            background: #111827;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .control-section h3 {
            font-size: 16px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .direction-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .dir-btn {
            text-align: left;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: #bbb;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dir-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .dir-btn.active {
            background: linear-gradient(90deg, #1E293B 0%, #334155 100%);
            color: var(--accent);
            border-color: var(--accent);
        }

        .dir-btn span { font-size: 18px; }

        /* --- Poster Display Area (Right) --- */
        .poster-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* --- THE POSTER ITSELF --- */
        #poster {
            background: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Dimensions set via JS */
        }

        /* --- Poster Style Elements --- */
        .p-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
        }

        .p-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.15;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .p-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            padding: 10%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Theme Variants */
        #poster.theme-blue { --theme-color: #00F0FF; background: radial-gradient(circle at top right, #1E293B, #0F172A); }
        #poster.theme-purple { --theme-color: #A855F7; background: radial-gradient(circle at bottom left, #2E1065, #000); }
        #poster.theme-gold { --theme-color: #FACC15; background: linear-gradient(135deg, #111, #1C1917); }
        #poster.theme-red { --theme-color: #EF4444; background: radial-gradient(circle at center, #450A0A, #000); }

        .headline {
            font-size: 42px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subheadline {
            font-size: 18px;
            color: var(--theme-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .p-middle {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            margin: 20px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .p-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
        }

        .p-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #fff;
        }

        .qr-code {
            width: 60px;
            height: 60px;
            background: #fff;
            padding: 5px;
            border-radius: 8px;
        }

        .copy-area {
            width: 100%;
            max-width: 600px;
            background: #111827;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid var(--border);
        }

        .copy-text {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            color: #bbb;
            white-space: pre-wrap;
            margin-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .btn-action {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-action:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .controls { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

                },
                {
                    head: "传统 6个月放弃<br>AI 5周上线。",
                    sub: "EFFICIENCY REVOLUTION",
                    mid: "<b>⌛ 时间线对比:</b><br><div style='height:8px; width:100%; background:#333; margin:10px 0; position:relative; border-radius:4px;'><div style='position:absolute; left:0; width:15%; height:100%; background:var(--theme-color); border-radius:4px;'></div></div><small>AI 编程 (5周)</small><br><div style='height:8px; width:100%; background:#333; margin:10px 0; position:relative; border-radius:4px;'><div style='position:absolute; left:0; width:100%; height:100%; background:#666; border-radius:4px;'></div></div><small>传统学习 (24周+)</small>",
                    theme: "theme-purple",
                    bg: "https://images.unsplash.com/photo-1508921334172-b68ed301282a?auto=format&fit=crop&q=80&w=1000",
                    copy: "为什么大多数人学编程会半途而废？\n因为反馈太慢！\nAI Coding 让你第一节课就做出东西，5周直接部署上线。"
                },

                },
                {
                    head: "碎片时间学习<br>开启第二职业。",

        let currentChannel = 'moment';
        let currentDir = 0;

        function updatePoster() {
            const chan = config.channels[currentChannel];
            const dir = config.directions[currentDir];
            const poster = document.getElementById('poster');

            poster.style.width = chan.w + 'px';
            poster.style.height = chan.h === 1000 ? 'auto' : chan.h + 'px';
            if (chan.h === 1000) poster.style.minHeight = '800px';

            document.getElementById('p-head').innerHTML = dir.head;
            document.getElementById('p-sub').innerText = dir.sub;
            document.getElementById('p-mid-content').innerHTML = dir.mid;
            document.getElementById('poster-bg').style.backgroundImage = `url(${dir.bg})`;
            document.getElementById('copywriting-text').innerText = dir.copy;

            poster.className = '';
            poster.classList.add(dir.theme);

            if (currentChannel === 'banner') {
                document.querySelector('.p-content').style.flexDirection = 'row';
                document.querySelector('.p-top').style.width = '60%';
                document.getElementById('p-mid-content').style.width = '35%';
                document.getElementById('p-mid-content').style.marginTop = '0';
            } else {
                document.querySelector('.p-content').style.flexDirection = 'column';
                document.querySelector('.p-top').style.width = '100%';
                document.getElementById('p-mid-content').style.width = '100%';
            }
        }

        document.getElementById('channel-tabs').onclick = (e) => {
            if (e.target.dataset.channel) {
                document.querySelectorAll('#channel-tabs .tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentChannel = e.target.dataset.channel;
                updatePoster();
            }
        };

        document.getElementById('direction-tabs').onclick = (e) => {
            const btn = e.target.closest('.dir-btn');
            if (btn && btn.dataset.dir) {
                document.querySelectorAll('#direction-tabs .dir-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDir = parseInt(btn.dataset.dir);
                updatePoster();
            }
        };

        function copyText() {
            const text = document.getElementById('copywriting-text').innerText;
            navigator.clipboard.writeText(text).then(() => alert('文案已复制！'));
        }

        updatePoster();
    </script>

    <!-- 下载 PNG 按钮 -->
    <button id="jr-download-btn" type="button" style="position:fixed;right:24px;bottom:24px;z-index:99999;background:#ff5757;color:#fff;border:3px solid #000;box-shadow:6px 6px 0 #000;padding:14px 22px;font-family:'Space Mono','DM Sans',monospace;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;">⬇ 下载 PNG</button>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
    (function(){
      var btn = document.getElementById('jr-download-btn');
      btn.addEventListener('mouseenter', function(){ btn.style.transform='translate(3px,3px)'; btn.style.boxShadow='3px 3px 0 #000'; });
      btn.addEventListener('mouseleave', function(){ btn.style.transform=''; btn.style.boxShadow='6px 6px 0 #000'; });
      btn.addEventListener('click', async function(){
        var target = document.getElementById('poster');
        if (!target) { alert('未找到海报元素 #poster'); return; }
        var original = btn.textContent;
        btn.textContent = '渲染中…';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        try {
          var canvas = await html2canvas(target, { backgroundColor: null, scale: 2, useCORS: true, allowTaint: true, logging: false });
          var slug = (location.pathname.split('/').pop() || 'poster').replace(/\.html?$/,'');
          var link = document.createElement('a');
          link.download = slug + '-' + Date.now() + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error(err);
          alert('导出失败：' + (err && err.message ? err.message : err));
        } finally {
          btn.textContent = original;
          btn.disabled = false;
          btn.style.opacity = '';
        }
      });
    })();
