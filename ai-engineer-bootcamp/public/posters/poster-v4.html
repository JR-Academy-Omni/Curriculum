<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineer 海报生成器 V4 - Cinematic Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7000FF;
            --white: #FFFFFF;
            --black: #000000;
            --accent: #00F0FF;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: #050505;
            color: var(--white);
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- UI Controls --- */
        .workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 50px;
            width: 100%;
            max-width: 1300px;
        }

        .sidebar { display: flex; flex-direction: column; gap: 30px; }
        .control-card { background: #111; padding: 20px; border-radius: 16px; border: 1px solid #222; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #555; margin-bottom: 12px; letter-spacing: 2px; }
        
        .opt-list { display: flex; flex-direction: column; gap: 6px; }
        .opt-btn { background: #1A1A1A; border: 1px solid #333; text-align: left; padding: 12px 16px; font-size: 13px; font-weight: 500; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #888; }
        .opt-btn:hover { background: #222; color: #FFF; }
        .opt-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

        .size-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .size-btn { padding: 6px 14px; font-size: 12px; border: 1px solid #333; border-radius: 20px; background: #1A1A1A; color: #888; cursor: pointer; transition: 0.2s; }
        .size-btn.active { background: #FFF; color: #000; border-color: #FFF; }

        /* --- POSTER ENGINE --- */
        .canvas-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        #poster {
            background: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 80px 160px rgba(0,0,0,0.8);
            transition: all 0.8s var(--ease);
            display: flex;
            flex-direction: column;
        }

        .p-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            transition: 1.5s var(--ease);
            filter: brightness(0.7) contrast(1.1);
        }

        .p-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 30% 50%, transparent 20%, rgba(0,0,0,0.9) 100%);
        }

        .poster-content {
            position: relative;
            z-index: 10;
            padding: 10% 8%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .p-eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .p-eyebrow::after { content: ""; width: 30px; height: 1px; background: var(--primary); }

        .p-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 54px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            color: #FFF;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .p-description {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            max-width: 420px;
            padding-left: 20px;
            border-left: 2px solid var(--primary);
        }

        .p-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .p-brand { display: flex; flex-direction: column; gap: 4px; }
        .p-brand .name { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
        .p-brand .tag { font-size: 10px; font-weight: 600; color: #666; letter-spacing: 1px; }

        .qr-section { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .qr-code { width: 80px; height: 80px; padding: 6px; background: #FFF; border-radius: 4px; }
        .qr-code img { width: 100%; }
        .qr-label { font-size: 9px; font-weight: 700; color: #FFF; opacity: 0.5; letter-spacing: 1px; }

        /* Sizes Control */
        #poster.moment { width: 600px; height: 600px; }
        #poster.xhs { width: 600px; height: 800px; }
        #poster.banner { width: 900px; height: 383px; }
        #poster.banner .p-title { font-size: 38px; }
        #poster.banner .p-description { display: none; }

        /* Copy Preview */
        .copy-panel { width: 100%; max-width: 600px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .copy-text { font-size: 13px; line-height: 1.6; color: #888; white-space: pre-wrap; margin-bottom: 20px; background: #000; padding: 15px; border-radius: 10px; }
        .btn-copy { background: #FFF; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-copy:hover { background: var(--primary); color: #FFF; }

    </style>
</head>
<body>

    <div class="workspace">
        <div class="sidebar">
            <div class="control-card">
                <div class="section-title">Narrative Theme</div>
                <div class="opt-list" id="dir-selector">
                    <button class="opt-btn active" data-dir="0">TECH PINNACLE / 技术巅峰</button>
                    <button class="opt-btn" data-dir="1">CAREER SHIFT / 职业跳跃</button>
                    <button class="opt-btn" data-dir="2">RAG ARCHITECT / 架构大师</button>
                    <button class="opt-btn" data-dir="3">AGENT EXPERT / 智能体专家</button>
                    <button class="opt-btn" data-dir="4">P3 INCUBATOR / P3 孵化</button>
                </div>
            </div>

            <div class="control-card">
                <div class="section-title">Format</div>
                <div class="size-group" id="size-selector">
                    <button class="size-btn active" data-size="moment">Moment 1:1</button>
                    <button class="size-btn" data-size="xhs">Social 3:4</button>
                    <button class="size-btn" data-size="banner">Banner</button>
                </div>
            </div>

            <div class="copy-panel">
                <div class="section-title">Copywriting</div>
                <div class="copy-text" id="copy-text">...</div>
                <button class="btn-copy" onclick="copyText()">Copy Content</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="poster" class="moment">
                <div class="p-image" id="p-bg"></div>
                <div class="p-overlay"></div>
                
                <div class="poster-content">
                    <div class="p-top">
                        <div class="p-eyebrow" id="p-eye">AI ENGINEER ELITE</div>
                        <div class="p-title" id="p-title">AI Engineer<br>精英实战营</div>
                        <div class="p-description" id="p-desc">掌握 RAG、Agent SDK、Fine-Tuning 等核心技术栈。定义 2026 生产级系统设计能力。</div>
                    </div>

                    <div class="p-bottom">
                        <div class="p-brand">
                            <div class="name" style="letter-spacing: 2px;">匠人学院</div>
                            <div class="tag">AI ENGINEERING HUB</div>
                        </div>
                        <div class="qr-section">
                            <div class="qr-code">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://jiangren.com.au/program-course/ai-engineer-bootcamp">
                            </div>
                            <div class="qr-label">START JOURNEY</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const themes = [
            { eye: "THE ARCHITECT", title: "技术巅峰<br>定义 AI 工程师", desc: "掌握生产级 RAG、Agent SDK、Fine-Tuning。这不是简单的应用调用，而是 AI 时代的系统架构设计。", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1200", copy: "【AI 工程师：2026 薪资之王】从只会写 Prompt 到设计高可用 AI 系统。匠人学院带你完成专家转身。🚀" },
            { eye: "THE EVOLUTION", title: "职业跨越<br>年薪 20 万刀", desc: "12 周高强度技术进阶 + 12 周 P3 真实项目孵化。导师来自 Meta、Microsoft，助你抢占技术高薪高地。", img: "https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&q=80&w=1200", copy: "【职场新物种】掌握 AI 全栈工程能力，抢占年薪 $120k-$200k 岗位。👔" },
            { eye: "THE LOGIC", title: "全链路 RAG<br>核心系统架构", desc: "从基础检索到 GraphRAG。解决 AI 落地最后 1 公里的难题，掌握百万级数据的上下文工程设计。", img: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1200", copy: "【硬核 RAG 实战】掌握 GraphRAG、混合检索与 AI Eval 评测。172 节课攻克 AI 落地痛点。📊" },
            { eye: "THE AGENT", title: "Agent 矩阵<br>构建自动化未来", desc: "深入 OpenAI / Claude 三大 SDK。掌握 Multi-Agent 协作协议，亲手打造能独立工作的 AI 智能体帝国。", img: "https://images.unsplash.com/photo-1531746790731-6c087fdec0ed?auto=format&fit=crop&q=80&w=1200", copy: "【智能体革命】掌握 Multi-Agent 系统设计。加入我们，构建你的自动化 AI 未来。🔥" },
            { eye: "THE REALITY", title: "从学会到就业<br>P3 真实孵化", desc: "拒绝纸上谈兵。12 周真实企业项目孵化，导师带你完成生产级作品，跨越从理论到就业的鸿沟。", img: "https://images.unsplash.com/photo-1522071823991-b5ae72647c48?auto=format&fit=crop&q=80&w=1200", copy: "【就业闭环】12周技术课程 + 12周P3孵化。你的第一款 AI 产品就在这里诞生。🏆" }
        ];

        let curDir = 0, curSize = 'moment';

        function update() {
            const d = themes[curDir];
            const p = document.getElementById('poster');
            p.className = curSize;
            document.getElementById('p-bg').style.backgroundImage = `url(${d.img})`;
            document.getElementById('p-eye').innerText = d.eye;
            document.getElementById('p-title').innerHTML = d.title;
            document.getElementById('p-desc').innerText = d.desc;
            document.getElementById('copy-text').innerText = d.copy;
        }

        document.getElementById('dir-selector').onclick = (e) => {
            if (e.target.dataset.dir) {
                document.querySelectorAll('#dir-selector .opt-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                curDir = parseInt(e.target.dataset.dir); update();
            }
        };

        document.getElementById('size-selector').onclick = (e) => {
            if (e.target.dataset.size) {
                document.querySelectorAll('#size-selector .size-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                curSize = e.target.dataset.size; update();
            }
        };

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('copy-text').innerText).then(() => alert('Copy Success!'));
        }

        update();
    </script>
</body>
</html>
