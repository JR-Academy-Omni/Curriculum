\n1. **试 L 的讨论能力**：选中刚生成的函数，按 Cmd/Ctrl + L，在侧栏问\"如果我想让这个函数支持传入名字参数，该怎么改？\"——先聊清楚思路，再回编辑器动手，体会 L（动脑）和 K（动手）的分工。\n2. **试 `@` 引用**：再建一个 `config.ts`，随便写个常量导出。回到 hello.ts 里按 K，用 `@config.ts` 引用它，让 AI\"用 config 里的常量作为默认名字\"，感受一下有没有 `@` 引用的区别。\n3. **对比两个模型的手感**：把同一个 prompt（比如\"给函数加参数校验并抛出友好错误\"）分别用 Claude Fable 5 / Opus 4.8 和 GPT-5.4 mini 各跑一次，注意两点——**响应速度**谁快，**改出来的代码**谁更周到。跑完你就明白前面说的\"质量 vs 速度\"到底是什么感觉了。\n\n```typescript\n// hello.ts —— 你可能会得到类似这样的结果（加了参数校验之后）\nexport function sayHello(name: string): void {\n  if (!name || name.trim() === \"\") {\n    throw new Error(\"name 不能为空\");\n  }\n  console.log(`Hello ${name}, welcome to JR Academy`);\n}\n```\n"},{"path":"resources/glossary.md","label":"资料 · 术语表","md":"# Vibe Coding 大师课 · 术语表\n\n> 用法：按主题分组，遇到看不懂的词直接 Ctrl+F 搜。每条 = 一句人话解释 + 一个例子/类比。中英对照。\n\n---\n\n## 一、基础\n\n**Vibe Coding（氛围编程）** — 主要用自然语言向 AI 描述意图、由 AI 生成代码，你负责判断和把关，而不是逐行手写。*例：你说\"给我做一个能上传 CSV 并画折线图的页面\"，AI 直接写出代码，你跑起来看对不对。* 注意：不是\"不看代码只看感觉\"就交付——你仍要 review、测试、担责。\n\n**Prompt（提示词）** — 你发给模型的那段输入指令/问题，决定它输出什么。*类比：给外包同事的需求文档，写得越清楚、约束越明确，交付越靠谱。*\n\n**Context Engineering（上下文工程）** — 有意识地设计\"喂给模型的整包信息\"（指令 + 相关代码 + 文档 + 历史 + 工具结果），让模型在有限窗口里拿到最相关的内容。*例：与其把整个 repo 塞进去，不如只放要改的那 3 个文件 + 项目规范。* 比\"写好一句 Prompt\"更大——它管的是整个信息环境。\n\n---\n\n## 二、Prompt 与项目约定\n\n**Cursor Rules / `.cursorrules`** — 放在项目里的规则文件，告诉 Cursor 编辑器\"这个项目一贯怎么写代码\"，每次生成都自动带上。*例：写\"用 TypeScript、不用 any、组件用函数式\"，之后 AI 生成都遵守。* 新版 Cursor 也支持 `.cursor/rules/` 目录形式。\n\n**`CLAUDE.md`** — 放在项目根目录的说明文件，Claude Code 每次进项目自动读取，用来记住项目结构、命令、约定和红线。*类比：给新同事的入职手册，AI 一进门就先看它。* 和 `.cursorrules` 是同类东西，各家工具的项目记忆文件。\n\n**Slash Command（斜杠命令）** — 在 AI 编程工具里用 `/名字` 触发的预设动作/流程。*例：打 `/review` 让它审当前 diff，`/deploy` 触发发布流程。* 本质是把一段常用指令封装成一个可复用的快捷入口。\n\n**Skill（技能）** — 一份打包好的专项能力说明（做某类任务的 SOP + 可带脚本/资源），AI 在合适场景自动加载或你手动调用。*类比：一个\"专科顾问\"，需要写小红书就叫写小红书那个，需要审课程就叫审课程那个。* 比单个 Slash Command 更完整，通常含判断何时用、怎么做、红线。\n\n---\n\n## 三、Agent 与编排\n\n**Agent（智能体）** — 能自己拆解目标、调用工具、根据结果决定下一步、循环推进直到完成任务的 AI，而不是问一句答一句。*例：让它\"修好这个 bug\"，它自己读代码→改→跑测试→看报错→再改，直到测试通过。*\n\n**Agentic Coding（智能体式编程）** — 让 Agent 自主完成一整段编码任务的工作方式（读文件、改多处、跑命令、验证），你从\"写代码\"退到\"给目标 + 验收\"。*和 Vibe Coding 的区别：Vibe Coding 强调\"用自然语言编程\"这件事，Agentic Coding 强调\"AI 自己成环地干活\"这种自主度。*\n\n**Tool Use / Function Calling（工具调用 / 函数调用）** — 模型不只输出文字，还能按约定格式请求调用外部函数/工具（查数据库、发请求、跑代码），拿到结果再继续。*例：你问\"北京现在几点\"，模型调用一个 `get_time` 工具拿到真实时间再回答。* 两个词基本同义，Function Calling 是早期叫法。\n\n**ReAct（Reason + Act，推理-行动）** — 一种 Agent 套路：让模型先\"想一步\"（Reason）再\"做一步\"（Act），拿到观察结果后再想再做，交替循环。*类比：一边出声念叨思路一边动手，而不是闷头一次做完。*\n\n**Sub-agent（子智能体）** — 主 Agent 派生出来专门干某个子任务的 Agent，干完把结果交回主 Agent。*例：主 Agent 要重构代码，先派一个 sub-agent 专门\"把整个 repo 里相关调用点找全\"，找完再继续。* 好处是子任务用独立上下文，不污染主线。\n\n**Orchestrator / Worker（编排者 / 工作者）** — 一种多 Agent 分工模式：Orchestrator 负责拆任务、分派、汇总；Worker 负责各自埋头执行一块。*类比：项目经理（Orchestrator）拆活派给几个工程师（Worker），最后汇总交付。*\n\n**Workflow（工作流）** — 预先写死的固定步骤序列（步骤和顺序是人定的），每步可能调用模型。*和 Agent 的区别：Workflow 路径是固定的（照剧本走）；Agent 自己决定下一步（临场发挥）。* 很多真实系统是两者混用。\n\n**Schedule（定时/调度）** — 让某个任务/Agent 按时间自动触发（每天几点、每隔多久、某时刻一次）。*例：每天早上 9 点自动跑一遍\"检查部署状态\"。*\n\n---\n\n## 四、MCP（模型上下文协议）\n\n**MCP（Model Context Protocol，模型上下文协议）** — 一个开放标准，规定 AI 应用怎么统一接入外部工具和数据源，让\"一个工具写一次、各家 AI 都能用\"。*类比：AI 世界的 USB-C 接口——不用为每个模型单独适配。*\n\n**MCP Client / Server（MCP 客户端 / 服务端）** — Client 是发起方（AI 应用/编辑器那边），Server 是提供能力的一方（暴露某个工具/数据源）。*例：Cursor 是 Client，一个\"查你数据库\"的 MCP Server 提供查询能力，Cursor 连上就能用。*\n\n**Tool vs Resource（工具 vs 资源）** — MCP Server 提供的两类东西：Tool 是\"能执行的动作\"（会产生副作用，如发邮件、写文件）；Resource 是\"可读取的数据\"（如一份文件内容、一条记录）。*记忆：Tool = 动词（做事），Resource = 名词（读料）。*\n\n**Transport（传输方式：stdio / SSE）** — Client 和 Server 之间怎么通信。**stdio** 走本地标准输入输出（Server 和应用在同一台机器上、进程间通信）；**SSE**（Server-Sent Events，也常见 Streamable HTTP）走网络、适合远程 Server。*例：本地跑的文件工具用 stdio；托管在云上的服务用 SSE/HTTP。*\n\n---\n\n## 五、模型与优化\n\n**Token（词元）** — 模型处理文本的最小计费/计量单位，一个 token 约等于英文几个字符或中文一两个字，不完全等于\"一个词\"。*例：一段 500 字的中文大约几百到上千 token；API 按 token 计费和限长。*\n\n**上下文窗口（Context Window）** — 模型一次能\"看进去\"的 token 上限（输入 + 输出合计）。*类比：模型的工作台面大小，放不下的内容它就看不到。* 超了要么报错、要么旧内容被挤掉。\n\n**中间遗忘（Lost in the Middle）** — 当上下文很长时，模型对开头和结尾的信息记得清楚，对夹在中间的信息容易忽略。*应对：把最关键的指令/信息放开头或结尾，别埋在长文中段。*\n\n**Temperature（温度）** — 控制输出随机性的参数：低（接近 0）更确定、更保守、更可复现；高更发散、更有创意也更容易跑偏。*例：写代码/抽结构化数据用低温；头脑风暴文案用高一点。*\n\n**Top-P（核采样，Nucleus Sampling）** — 另一个控制随机性的参数：只从累计概率达到 P 的那批最可能候选里采样。*例：Top-P=0.9 表示只在\"最靠谱的前 90% 概率质量\"里选词。* 一般 Temperature 和 Top-P 调一个就够，别同时大改。\n\n---\n\n## 六、Prompt 技巧与常见坑\n\n**Zero-shot（零样本）** — 不给示例，直接下指令让模型做。*例：直接说\"把这段话翻成英文\"。*\n\n**Few-shot（少样本）** — 在 Prompt 里先给几个\"输入→输出\"示例，再让模型照做。*例：给 3 个\"公司名→行业标签\"的例子，再让它标第 4 个。* 适合让输出格式/风格对齐。\n\n**Chain-of-Thought（CoT，思维链）** — 引导模型先分步推理再给答案（如\"一步步想\"），提升复杂推理的正确率。*类比：让它把演算过程写出来，而不是直接报答案。*\n\n**幻觉（Hallucination）** — 模型一本正经地编出看似合理、实则不存在或错误的内容（假引用、假 API、假事实）。*应对：关键事实要核实、让它给可验证来源、代码要真跑一遍。*\n\n**Slopsquatting（幻觉依赖包）** — 一种供应链攻击：模型幻觉出一个不存在的库名，攻击者抢注这个名字发恶意包，你照抄安装就中招。*应对：装依赖前先确认这个包真实存在、来源可信，别盲信 AI 给的 import。* 名字混着\"slop（AI 垃圾产出）\"和\"typosquatting（错拼抢注）\"。\n\n---\n\n## 七、检索、数据与工程安全\n\n**RAG（Retrieval-Augmented Generation，检索增强生成）** — 回答前先从你的知识库检索相关片段，塞进上下文再让模型基于这些内容作答。*例：客服机器人先从公司文档里搜到相关条款，再据此回答，而不是凭记忆。* 主要用来减少幻觉、让模型用上\"训练时没见过的私有/最新资料\"。\n\n**向量数据库（Vector Database）** — 专门存\"文本的语义向量（embedding）\"并做相似度检索的数据库，是 RAG 的常用底座。*类比：按\"意思接近\"来找资料，而不是按关键词精确匹配。* 例：Pinecone、Milvus、pgvector。\n\n**幂等（Idempotent）** — 同一个操作执行一次和执行多次，结果一样、不会重复产生副作用。*例：设计一个\"创建订单\"接口，重试时不会重复下单。* 在 Agent/自动化里很重要——重试和重放不能把事情做两遍。\n\n**PII（Personally Identifiable Information，个人身份信息）** — 能识别到具体个人的数据：姓名、手机号、邮箱、身份证、地址、简历等。*红线：喂给外部模型、写进日志或 git 前要格外小心，密钥更是任何情况都不进 git。*\n\n**脱敏（Data Masking / Anonymization）** — 在保留数据可用性的前提下，去掉或替换掉敏感信息。*例：把手机号打码成 `138****1234`、把真实姓名换成\"学员 A\"，再拿去做案例分享或喂模型。*\n\n---\n\n> 补充说明：本表为课程配套速查，术语解释追求\"够用能懂\"，深入细节以对应正课与官方文档为准。\n"},{"path":"resources/troubleshooting-faq.md","label":"资料 · 排错 FAQ","md":"# Vibe Coding 大师课 · 排错 FAQ\n\n卡住了先来这里翻。每条按 **症状（你会怎么描述）→ 可能原因 → 解法** 组织。找不到你的问题就往下滚，或者把完整报错原文贴给 AI，别只贴一句\"报错了\"。\n\n用法：`Ctrl/Cmd + F` 搜关键词（比如 `PATH`、`rate limit`、`tools/list`）。\n\n---\n\n## 一、安装 / 环境\n\n### 装完 `claude` / `cursor` 命令找不到\n> \"我明明装了 Claude Code，terminal 里敲 `claude` 说 command not found。\"\n\n**原因**：装了但没进 `PATH`，或者装完没重开 terminal。\n\n**解法**：\n1. 先重开一个新的 terminal 窗口（旧窗口不会自动读新 PATH）。\n2. 确认全局装到位（Claude Code 官方走 npm 全局安装）：\n   ```bash\n   npm install -g @anthropic-ai/claude-code\n   claude --version\n   ```\n3. 还是找不到，看 npm 全局 bin 目录在不在 PATH 里：\n   ```bash\n   npm config get prefix\n   ```\n   把打印出来的路径 + `/bin`（Windows 是路径本身）加进 PATH。\n   - macOS / Linux（zsh），在 `~/.zshrc` 末尾加：\n     ```bash\n     export PATH=\"$(npm config get prefix)/bin:$PATH\"\n     ```\n     然后 `source ~/.zshrc`。\n   - Windows：搜\"编辑系统环境变量\" → 环境变量 → 在用户 `Path` 里加上 `npm config get prefix` 打印的目录 → 确定后**重开 PowerShell**。\n4. Cursor 是桌面 App，命令行的 `cursor` 命令要在 Cursor 里手动装：`Cmd/Ctrl + Shift + P` → 搜 `Shell Command: Install 'cursor' command`。\n\n---\n\n### `npm install -g` 报权限错误（EACCES / permission denied）\n> \"全局安装报一堆 EACCES、说没权限写到 /usr/local。\"\n\n**原因**：npm 全局目录属于 root，普通用户写不进去。**不要用 `sudo npm install -g` 硬来**，那会把后续所有全局包都绑上 root，越搞越乱。\n\n**解法**：把 npm 全局目录换到你自己的家目录。\n```bash\nmkdir -p ~/.npm-global\nnpm config set prefix ~/.npm-global\nexport PATH=\"$HOME/.npm-global/bin:$PATH\"   # 同样写进 ~/.zshrc / ~/.bashrc\n```\n之后再 `npm install -g @anthropic-ai/claude-code`，不用 sudo。\n\n---\n\n### Node 版本不对 / 装的时候报语法错误\n> \"安装的时候报 `Unexpected token` 或者要求 Node 18+，我不知道自己是几。\"\n\n**原因**：Node 太老。Claude Code 要 Node 18+，很多现代工具要 20+。\n\n**解法**：\n```bash\nnode -v   # 看当前版本\n```\n低于 18 就升级。别去官网手动下 pkg，用版本管理器，以后切版本方便：\n- macOS / Linux 用 `nvm`：\n  ```bash\n  nvm install 20\n  nvm use 20\n  nvm alias default 20\n  ```\n- Windows 用 `nvm-windows`（GitHub 上 coreybutler/nvm-windows），或者直接装官方 LTS installer。\n\n---\n\n### Python 版本 / `python` 命令的坑\n> \"教程让我跑 `python xxx.py`，我这边说 command not found，或者跑起来是 Python 2。\"\n\n**原因**：系统里 `python` 和 `python3` 不是一回事；有的机器 `python` 根本不存在。\n\n**解法**：\n- macOS / Linux：优先用 `python3` 和 `pip3`。\n  ```bash\n  python3 --version\n  ```\n- Windows：装了官方 Python 后用 `py`：\n  ```powershell\n  py --version\n  py -3 script.py\n  ```\n- 建议每个项目用虚拟环境，别污染全局：\n  ```bash\n  python3 -m venv .venv\n  source .venv/bin/activate          # Windows: .venv\\Scripts\\activate\n  pip install -r requirements.txt\n  ```\n  激活后命令行前面会出现 `(.venv)`，说明进对环境了。\n\n---\n\n### macOS / Windows 命令不一样，教程照抄跑不通\n> \"教程里的命令在我 Windows 上一堆报错，反斜杠、路径都不对。\"\n\n**原因**：多数教程默认 macOS/Linux 的 bash 语法。Windows 的 PowerShell 语法不同。\n\n**解法**：记住几个常见对照，其余直接问 AI\"这条 bash 命令在 Windows PowerShell 怎么写\"。\n\n| 目的 | macOS / Linux | Windows PowerShell |\n|------|---------------|--------------------|\n| 设环境变量 | `export KEY=value` | `$env:KEY=\"value\"` |\n| 看环境变量 | `echo $KEY` | `echo $env:KEY` |\n| 路径分隔 | `/` | `\\`（PowerShell 里 `/` 多数也认） |\n| 删目录 | `rm -rf dir` | `Remove-Item -Recurse -Force dir` |\n| 空设备 | `/dev/null` | `$null` |\n\n想彻底躲开差异：在 Windows 上装 **WSL2**（Ubuntu 子系统），之后所有教程都能按 Linux 命令跑。\n\n---\n\n## 二、模型 / 账号\n\n### 额度用完 / 报 quota exceeded / credit 不够\n> \"用着用着突然说额度不够、insufficient credits、或者直接拒绝。\"\n\n**原因**：订阅额度或 API credit 耗尽，或者账单没配。\n\n**解法**：\n1. API 用户去平台 console 看用量和余额，充值或换一把有余额的 key。\n2. 订阅用户看是不是撞到当前周期的用量上限，等重置或升级档位。\n3. 长任务前先估量：把大改动拆成几轮，别一次让 AI 读几十个文件——那既烧额度又烧上下文。\n\n---\n\n### rate limit / 429 / \"too many requests\"\n> \"刷刷刷发了几条就报 429，让我等。\"\n\n**原因**：短时间请求太密，或并发太高，触发了速率限制。\n\n**解法**：\n- 就是等一下再发，通常几十秒到一两分钟恢复。\n- 别同时开好几个 agent / 好几个终端对同一个账号猛发。\n- 报错里常带 `retry-after`（秒数），照着等最稳。\n- 长期高频用，考虑升级到限额更高的档位。\n\n---\n\n### 到底该选哪个模型\n> \"Opus、Sonnet、Haiku 一堆，我该用哪个？\"\n\n**原因**：不同模型是\"能力 vs 速度/成本\"的取舍，没有一个永远最优。\n\n**解法**：按任务挑，别无脑上最强。\n- **复杂重活**（大规模重构、跨多文件推理、难 bug）→ 用最强的（Opus 类）。\n- **日常编码**（写函数、改逻辑、常规调试）→ 中档（Sonnet 类）性价比最高，绝大多数时间用它。\n- **简单快活**（改文案、格式化、批量小改、跑得快最重要）→ 轻量档（Haiku 类）。\n\n实操建议：默认停在中档，只有当它明显搞不定时再升到最强档。省钱又快。\n\n---\n\n### 响应特别慢 / 转圈半天\n> \"问一句要等好久，或者一直在生成停不下来。\"\n\n**原因**：一次喂进去的上下文太大（塞了整个大项目 / 超长文件），或者选了最重的模型做小事，或者网络。\n\n**解法**：\n- 缩小上下文：只 `@` 相关的文件，别把整个仓库丢进去。\n- 小任务换轻量模型。\n- 长会话开久了会越来越慢——完成一个阶段就开新会话（见\"上下文\"一节）。\n- 挂了 VPN / 代理的检查下网络是否稳定。\n\n---\n\n## 三、MCP（Model Context Protocol）\n\n### MCP server 连不上 / 显示 failed / 一直 connecting\n> \"配了个 MCP server，客户端里显示连接失败，或者一直在连。\"\n\n**原因**：多数是启动命令写错、依赖没装、或路径不对——本质是那条 command 在你机器上根本跑不起来。\n\n**解法**：\n1. **先手动跑一遍那条启动命令**，看它自己能不能起来：\n   ```bash\n   npx -y @some/mcp-server\n   ```\n   手动都报错，说明是命令/依赖问题，先把它修好，别怀疑客户端。\n2. `command` 用绝对路径或确认在 PATH 里。用 `npx` 的话确认 Node 装了。\n3. 看客户端的 MCP 日志：\n   - Claude Code：`claude` 里跑 `/mcp` 看每个 server 的状态；用 `claude --debug` 启动看详细报错。\n4. 需要 API key 的 server，确认 `env` 里填了对的 key。\n\n---\n\n### `tools/list` 是空的 / 连上了但没有工具\n> \"server 显示连上了，但一个 tool 都没有。\"\n\n**原因**：server 起来了但没成功注册工具——通常是 server 本身初始化报错、版本不兼容，或者根本连的是个空 server。\n\n**解法**：\n1. 手动起 server（上一条），看它启动日志里有没有报错、有没有打印注册了哪些 tool。\n2. 确认 server 版本没过时：`npx -y pkg@latest`。\n3. 重启客户端（配置或 server 更新后**必须重启**才会重新拉 tools）。\n4. 还是空的，去这个 server 的仓库看它是否需要额外配置（有些要先登录 / 给 workspace 路径才暴露工具）。\n\n---\n\n### 模型死活不调工具\n> \"MCP 明明连上了、tool 也在，但我让它用它就是不用，自己瞎编答案。\"\n\n**原因**：**九成是 tool 的 description 太烂**。模型靠 description 判断\"这个工具是干嘛的、什么时候该用\"。description 含糊、没说清触发场景，模型就不会选它。\n\n**解法**：\n1. 打开 tool 的 description，用\"什么时候该调用它\"的口吻重写，说清楚：**这个工具做什么 + 什么情况下用它 + 输入输出是什么**。别只写一句名词短语。\n   - ❌ `\"查询数据\"`\n   - ✅ `\"当用户询问订单状态时，用订单号查询该订单的物流和付款状态，返回 JSON\"`\n2. 参数也要写 description，告诉模型每个参数填什么。\n3. 在你的提示里直接点名：\"用 xxx 工具查一下\" —— 先确认工具本身能被调用，再回头优化 description 让它自动触发。\n4. 工具太多（几十个）也会稀释模型注意力，砍掉用不上的 server。\n\n---\n\n### 配置文件路径 / 格式写错\n> \"照着文档改了 MCP 配置，重启后完全没反应，像没读到。\"\n\n**原因**：配置文件放错位置，或 JSON 格式有语法错误（多个逗号、少个括号），整个文件被判无效直接忽略。\n\n**解法**：\n1. 确认配置文件的**准确位置**（不同客户端不一样，以你用的那个客户端官方文档为准，别凭记忆猜）。\n   - Claude Code 项目级用仓库根的 `.mcp.json`；也支持 `claude mcp add` 命令行加，不用手写。\n2. 用命令行加最省心，避免手写 JSON 出错：\n   ```bash\n   claude mcp add my-server -- npx -y @some/mcp-server\n   claude mcp list      # 确认加进去了\n   ```\n3. 手写的话，把整段贴给 AI 或用在线 JSON 校验器查语法。常见坑：最后一项多了逗号、Windows 路径的反斜杠没转义（要写 `\\\\`）。\n\n---\n\n### 改完配置没生效\n> \"我改了 MCP 配置 / 更新了 server，但行为没变。\"\n\n**原因**：没重启。MCP 配置和 server 是启动时加载的，改完不重启读的还是旧的。\n\n**解法**：改完配置**完全退出客户端再重开**（不是关个窗口，是彻底退出进程）。Claude Code 里 `/mcp` 确认新状态；桌面 App 从 Dock/任务栏彻底退出后重开。\n\n---\n\n## 四、上下文（Context）\n\n### 上下文爆窗口 / context length exceeded\n> \"报 context 超了 / 让我压缩，或者对话开久了直接不让发了。\"\n\n**原因**：这次会话累积的内容（历史对话 + 读进来的文件）超过了模型的上下文窗口上限。\n\n**解法**：\n1. **开新会话**是最干净的解法。把当前进展让 AI 总结成几句，粘到新会话开头继续。\n2. Claude Code 里用 `/compact` 压缩历史，或 `/clear` 清空重来。\n3. 别一次 `@` 一堆大文件。只给相关的片段/文件。\n4. 让 AI 把关键结论写进项目里的 `CLAUDE.md` / 说明文件，下次自动带上，不用每次重讲。\n\n---\n\n### AI \"忘了\"前面说的\n> \"前面明明讲过项目规则，聊到后面它又忘了，还原样犯同一个错。\"\n\n**原因**：早期对话被挤出上下文窗口了（尤其压缩/清理过之后），或者本来就没进上下文。\n\n**解法**：\n- 把**长期有效的约定**写进 `CLAUDE.md`（项目根目录），它每次会自动读，比在对话里反复叮嘱可靠得多。例如代码风格、禁用的库、目录约定。\n- 关键指令在每轮里简短重申一次，别指望它记住 50 轮前的一句话。\n- 发现它开始漂了，就是该开新会话 + 用 `CLAUDE.md` 兜底的信号。\n\n---\n\n### 大项目喂不进去\n> \"我项目几百个文件，想让 AI 理解整个代码库，塞不进去。\"\n\n**原因**：再大的上下文窗口也装不下整个大仓库，硬塞既超窗又烧钱还稀释注意力。\n\n**解法**：\n- 别追求\"让它读完全部\"。让它**按需检索**：agent 类工具（Claude Code / Cursor）能自己 grep、搜文件、按需读，你只要说清目标。\n- 手动指路：告诉它\"相关逻辑在 `src/auth/` 目录\"，缩小范围。\n- 在 `CLAUDE.md` 里写一段项目结构导览（各目录干什么），当它的地图。\n- 大重构拆成一个个小任务，一次只让它专注一块。\n\n---\n\n## 五、代码质量\n\n### AI 改坏了别的地方\n> \"让它改 A 功能，结果它顺手把 B 也改了 / B 挂了。\"\n\n**原因**：给的范围太宽、或者它自作主张做了没要求的\"顺便优化\"。\n\n**解法**：\n1. **改动前先看 diff**，别直接 accept all。逐块看它到底动了什么，只留你要的。\n2. 指令写窄：\"只改 `login()` 函数，别动其他文件。\"\n3. **保证改之前工作区是干净的**（已 commit 或 stash），这样出问题一条命令就能退回：\n   ```bash\n   git diff              # 看它改了啥\n   git checkout -- .     # 全部丢弃，退回上次 commit\n   ```\n4. 关键改动前先 commit 一版当存档点，AI 每完成一个小任务就 commit 一次，方便回退到任意一步。\n\n---\n\n### 反复改不对，越改越乱（怎么跳出死循环）\n> \"同一个 bug 让它改了五六次，每次说修好了其实没有，越改越乱。\"\n\n**原因**：它在错误的假设上打转，后面每次修改都建立在已经跑偏的代码上，只会越滚越远。**继续在同一个烂摊子上改是最大的坑。**\n\n**解法**：**果断推倒重来，别舍不得。**\n1. 把 AI 这几轮的改动全丢掉，回到还正常的那个 commit：\n   ```bash\n   git checkout -- .          # 丢弃未提交的改动\n   # 或回到某个具体 commit：\n   git reset --hard <好的那个commit的hash>\n   ```\n2. **开一个新会话**（旧会话里全是跑偏的上下文，会继续带偏它）。\n3. 重新描述问题，这次给更多背景：贴上真实报错、说清期望行为、告诉它前一种思路已经试过不行。\n4. 让它**先解释 bug 的原因再动手**，别直接让它改——想清楚了再改，比瞎改五次强。\n\n一句话：**改超过 2-3 次还不对，就 `git checkout` + 新会话重开，不要恋战。**\n\n---\n\n### 幻觉出不存在的 API / 包 / 函数\n> \"它用了一个库里根本没有的方法，或者让我装一个查不到的 npm 包。\"\n\n**原因**：模型是根据模式生成的，会\"编\"出看着合理但实际不存在的 API、参数、包名。\n\n**解法**：\n1. **不认识的包先查真伪再装**：\n   ```bash\n   npm view <包名>        # 查不到就是不存在\n   pip index versions <包名>\n   ```\n   注意假包名蹭真包（typosquatting），别手一抖装了恶意包。\n2. 用到某个 API/方法，让它**给出官方文档链接**或版本号；查文档确认真有。\n3. 直接跑代码验证——报 `is not a function` / `ModuleNotFoundError` 就是它编的，把报错贴回去让它换真实方案。\n4. 明确它用的**库版本**：老版本没有的新方法，或反之，都会出错。告诉它\"我用的是 React 19 / xxx 库 3.x\"。\n\n---\n\n## 六、Git\n\n### AI 乱 commit / 一次全塞进一个 commit\n> \"它自己把一堆不相关的改动 `git add .` 全 commit 了，或者 commit message 乱写。\"\n\n**原因**：给它开了 git 权限又没约束，它图省事一锅端。\n\n**解法**：\n- 在 `CLAUDE.md` 里立规矩，比如\"commit 前先给我看 `git diff`，一个 commit 只包含一件事，message 要说清改了什么\"。\n- 已经乱 commit 但**还没 push**，可以撤销 commit 但保留改动，自己重新分块提交：\n  ```bash\n  git reset --soft HEAD~1     # 撤掉最近一次 commit，改动还在暂存区\n  git restore --staged .      # 取消暂存，自己挑着 add\n  ```\n- 想改最近一次的 message：`git commit --amend`。\n\n---\n\n### 冲突了，AI 越解越乱\n> \"merge / pull 冲突了，让 AI 解结果解得一团糟。\"\n\n**原因**：冲突需要理解\"两边到底想干嘛\"，AI 盲解容易两边逻辑都保不住。\n\n**解法**：\n1. 先看清冲突文件，`<<<<<<<` `=======` `>>>>>>>` 之间分别是两边的版本。\n2. 让 AI 解时，**告诉它每一边分别是什么意图**、你想保留哪边或怎么合，别丢一句\"帮我解冲突\"就走。\n3. 解不清就中止，回到干净状态再想：\n   ```bash\n   git merge --abort      # 或 git rebase --abort\n   ```\n4. 解完**务必跑一遍测试/手动验证**，冲突解错常常代码能编译但逻辑坏了。\n\n---\n\n### 误 push 了 / push 错了分支\n> \"手快 push 上去了，或者 push 到了不该 push 的分支。\"\n\n**原因**：AI 或自己在没确认的情况下执行了 push。\n\n**解法**：\n- **push 前设一道确认关**：在 `CLAUDE.md` 写\"push 前必须先问我确认\"，别让 AI 自动 push。\n- 已经 push 了想撤（**先确认没有别人已经拉了你的改动**，否则会坑队友）：\n  ```bash\n  git revert <commit>          # 安全：生成一个反向 commit 再 push，历史保留（推荐团队场景）\n  ```\n  真要抹掉历史（只在个人分支、确认没人依赖时）：\n  ```bash\n  git reset --hard <好的commit>\n  git push --force-with-lease   # 比 --force 安全，别人有新提交时会拒绝，防覆盖队友\n  ```\n- push 错分支：切到对分支重新 push，再到错的分支把那次 commit `revert` 或 `reset` 掉。\n\n---\n\n## 兜底：以上都没解决\n\n1. **把完整报错原文贴给 AI**，连同你执行的命令、你的系统（macOS/Windows）、工具版本（`claude --version` / `node -v`）。信息越全，AI 越可能一次定位。\n2. 去对应工具的官方文档 / GitHub issues 搜报错关键词——你遇到的坑大概率别人踩过。\n3. 课程答疑群里提问时，请**附上报错截图 + 你已经试过什么**，别只发\"我卡住了\"。\n"},{"path":"resources/cheatsheets.md","label":"资料 · 速查卡","md":"# Vibe Coding 速查卡合集\n\n> 五张一页纸。用 Claude Code / Cursor / Codex CLI 干活时直接抄。\n> 快捷键随版本会变，冲突时以 `Shift+P`(Cursor) / `/help`(Claude Code) 现查为准。\n\n---\n\n## 卡 1 · Cursor 快捷键卡\n\n> macOS 用 `Cmd`，Windows/Linux 用 `Ctrl`。下表以 `Cmd` 写，Win/Linux 自行替换。\n\n| 快捷键 | 干什么 | 什么时候用 |\n|---|---|---|\n| `Cmd+K` | 就地生成/改（inline edit，改选中代码或在光标处写） | 改一个函数、加个 try/catch、改个变量名——不想开侧栏，改完就在原地看 diff |\n| `Cmd+L` | 打开 chat 侧栏（对当前文件/选区提问、多轮讨论） | 问\"这段在干嘛\"、让它解释报错、要它给方案但先别动代码 |\n| `Cmd+I` | Composer / Agent（跨文件多处改，AI 自己决定动哪些文件） | 加一个功能要动 3+ 个文件、重命名散在多处的东西、脚手架一个新模块 |\n| `Cmd+Shift+P` | 命令面板（所有命令、切模型、开设置） | 找任何命令、切 model、改快捷键、开 MCP 设置——记不住时的万能入口 |\n| `Tab` | 接受 AI 补全（Cursor Tab / autocomplete） | 顺着写，AI 猜下一段——最高频操作 |\n| `Cmd+Shift+K` | 在 chat 里加当前选区/文件为上下文 | 让 AI 只盯着你选中的那段看 |\n| `Esc` | 打断正在生成 / 关掉 inline 输入框 | 生成跑偏了立刻停 |\n| `Cmd+Enter` | 在 chat 里用 codebase 全库检索回答（@Codebase） | 问\"登录逻辑在哪个文件\"、跨全项目找实现 |\n\n**选哪个的心法**：单点小改 `Cmd+K` → 想讨论/问 `Cmd+L` → 一次改一堆文件 `Cmd+I` → 记不住 `Cmd+Shift+P`。\n\n---\n\n## 卡 2 · Claude Code 常用操作卡\n\n> 终端里跑 `claude` 进入。以下为交互态常用操作。\n\n**斜杠命令（在输入框打 `/`）**\n\n| 命令 | 作用 |\n|---|---|\n| `/help` | 列出所有命令（记不住时先打这个） |\n| `/clear` | 清空当前对话上下文，重开一段（上下文脏了/换任务时用） |\n| `/init` | 扫项目生成 `CLAUDE.md`（新项目第一步） |\n| `/model` | 切模型（Opus/Sonnet 等） |\n| `/agents` | 管理 sub-agent（子代理） |\n| `/review` | 让它 review 当前 diff |\n| `/compact` | 压缩历史上下文，省 token 又不丢主线 |\n\n**引用与上下文**\n\n| 写法 | 作用 |\n|---|---|\n| `@path/to/file.ts` | 把某个文件塞进上下文（打 `@` 会有路径补全） |\n| `@目录/` | 引用整个目录 |\n| 直接贴报错/日志 | 让它照着错误定位——比描述\"报错了\"有用得多 |\n\n**CLAUDE.md 的作用**\n项目根的 `CLAUDE.md` = 每次对话自动加载的项目说明书。写进去：技术栈、约定、\"禁止用什么\"、跑测试的命令、目录结构。写好一次，之后每次 Claude Code 都自动读，不用重复交代。\n\n**sub-agent（子代理）**\n把一个独立子任务丢给一个新开、干净上下文的 agent 去跑（比如\"去搜整个 codebase 找所有调用点\"），它只把结论带回来，不污染主对话。适合：大范围搜索、并行探查、把一坨脏活隔离出去。\n\n**跑验证 / 回退**\n\n```bash\n# 让它改完后自己跑验证（在 prompt 里明确写出命令）\n#   \"改完跑 npm test 和 npm run typecheck，红了就修\"\n\n# 手动回退它的改动\ngit diff                      # 先看它改了什么\ngit checkout -- path/to/file  # 撤掉单个文件的未提交改动\ngit checkout -- .             # 撤掉所有未提交改动（慎用）\ngit stash                     # 先藏起来，保留后悔药\ngit reset --hard HEAD         # 彻底回到上次 commit（危险，会丢改动）\n```\n\n> 铁律：**让 AI 大改前先 commit 一次**，改坏了 `git checkout` 一键回到干净态。\n\n---\n\n## 卡 3 · 提示词模式卡\n\n> 每个模式一行说明 + 一个最小可抄模板。混用比单用强。\n\n**① 任务+背景+约束+输出+验收（万能结构，默认首选）**\n把需求拆成五块，AI 不用猜。\n\n```\n任务：给 UserService 加一个按 email 查用户的方法。\n背景：TypeScript + Prisma，代码在 src/services/user.ts。\n约束：复用现有 prisma client，不新增依赖，email 要小写归一化。\n输出：只改 user.ts，给出 diff。\n验收：新增方法有单测，npm test 全绿。\n```\n\n**② 角色+步骤+检查表（要它按流程走、别跳步）**\n先设定身份，再给步骤，最后给自检清单。\n\n```\n你是资深 code reviewer。按步骤做：\n1) 读 diff  2) 找 bug 和边界情况  3) 查是否有重复逻辑\n检查表：空值处理？错误处理？测试覆盖？命名？逐条打勾或标 ✗。\n```\n\n**③ diff-patch（只要改动，不要整文件重贴）**\n明确要 patch，省 token 也好 review。\n\n```\n只输出 unified diff（不要重贴整个文件），改动最小化，别动无关行。\n```\n\n**④ few-shot（给例子定风格/格式）**\n给 1-2 个输入→输出样例，AI 照葫芦画瓢。\n\n```\n按这个风格写 commit message：\n输入：加了登录限流 → 输出：feat(auth): add login rate limiting\n输入：修了空指针     → 输出：fix(user): handle null email in lookup\n现在给这次改动写一条：____\n```\n\n**⑤ Chain-of-Thought（复杂逻辑，先想后写）**\n让它先出计划/推理，你确认了再让它写代码。\n\n```\n先别写代码。先分析：这个 bug 可能的三个成因，各自怎么验证。\n我确认方向后你再动手。\n```\n\n---\n\n## 卡 4 · MCP 配置速查\n\n> MCP = 给 AI 工具挂外部能力（数据库、浏览器、文件系统等）的标准协议。\n> 下面是各工具的配置文件位置。路径随版本可能微调，找不到时以官方文档 / 应用内\"MCP 设置\"为准。\n\n**配置文件位置**\n\n| 工具 | macOS | Windows | Linux |\n|---|---|---|---|\n| Claude Desktop | `~/Library/Application Support/Claude/claude_desktop_config.json` | `%APPDATA%\\Claude\\claude_desktop_config.json` | 见官方文档（随版本） |\n| Claude Code | 项目根 `.mcp.json`（项目级）/ `~/.claude.json`（用户级） | 同左（`%USERPROFILE%\\.claude.json`） | 同左（`~/.claude.json`） |\n| Cursor | 项目级 `.cursor/mcp.json` / 全局 `~/.cursor/mcp.json` | 项目级 `.cursor\\mcp.json` / 全局 `%USERPROFILE%\\.cursor\\mcp.json` | `~/.cursor/mcp.json` |\n| VS Code (Copilot) | 工作区 `.vscode/mcp.json` / 用户 settings | 工作区 `.vscode\\mcp.json` / 用户 settings | `.vscode/mcp.json` |\n| Windsurf | `~/.codeium/windsurf/mcp_config.json` | `%USERPROFILE%\\.codeium\\windsurf\\mcp_config.json` | `~/.codeium/windsurf/mcp_config.json` |\n\n> 提示：Claude Code 也可以直接命令行加，不用手写文件——`claude mcp add`。\n\n**最小 server 配置片段（stdio 本地 server，最常见形态）**\n\n```json\n{\n  \"mcpServers\": {\n    \"filesystem\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/path/to/project\"]\n    }\n  }\n}\n```\n\n**远程 / HTTP server 形态（部分工具支持）**\n\n```json\n{\n  \"mcpServers\": {\n    \"my-remote\": {\n      \"url\": \"https://example.com/mcp\",\n      \"headers\": { \"Authorization\": \"Bearer ${MY_TOKEN}\" }\n    }\n  }\n}\n```\n\n> 注意：VS Code 的 `.vscode/mcp.json` 用的是顶层 `servers` 键（不是 `mcpServers`），且支持 `inputs` 让你运行时填密钥。**密钥永远走环境变量 / 输入提示，别硬编进 json 提交进 git。**\n\n---\n\n## 卡 5 · \"让 AI 干活\"四段式 workflow 卡\n\n> 一次交办 = 四段说清楚。缺哪段，AI 就在哪段自由发挥（=跑偏）。\n\n**① 入口（说清楚要什么）**\n\n```\n目标：<一句话，做完什么算数>\n范围：<只动哪些文件 / 模块，别扩散>\n禁止：<不许碰的东西：不改 schema / 不加依赖 / 不动 API 签名>\n成功标准：<怎么算完成：测试绿 / 某功能能跑 / 输出符合 X>\n```\n\n**② 上下文（喂它需要知道的）**\n\n```\n相关文件：@src/... @src/...\n约束：技术栈、代码风格、团队约定（能引用 CLAUDE.md 就引用）\n历史：这块之前踩过什么坑 / 为什么现在长这样 / 别重蹈的错\n```\n\n**③ 执行（先计划后改 + 带验证）**\n\n```\n先给方案和要改的文件清单，我确认后再动手。\n改动最小化，别顺手重构无关代码。\n改完自己跑：<npm test / typecheck / lint / 启动看效果>，红了继续修到绿。\n```\n\n**④ 出口（交付要能验收）**\n\n```\n给我：diff、跑过的验证结果、这次改动的风险点、建议的下一步。\n```\n\n**一句话记忆**：**入口定边界 → 上下文喂料 → 执行先计划后验证 → 出口交 diff 和风险。**\n每段独立成句，AI 越不用猜，结果越稳。\n\n---\n\n> 用法建议：把这五张卡钉在第二屏 / 打印贴墙上。开工前扫一眼卡 5 摆好 workflow，卡在哪个环节就翻对应那张。\n"}];
