<script>const DATA=[{"path":"vibe-coding/claude-code-workflow.md","label":"新建 · Claude Workflow 模板","md":"# Claude Workflow 模板与执行清单\n\n我带过不少刚上手 Claude Code 的同学，最常见的翻车姿势是：打开终端，敲一句「帮我把用户表加个 phone 字段」，然后回车，等着看结果。运气好改对了；运气不好，它改了 model、忘了改 migration，或者顺手把你没让它动的一个测试文件也重写了。你盯着一堆 diff，不知道从哪看起。\n\n问题不在于模型笨，在于你没给它一个**可复现的 workflow**。同样一句话，今天让它做和明天让它做，结果可能完全不同——因为每次的上下文、你补充的信息、它自己临时的判断都在变。真正能落地的做法，是把「让 AI 干活」这件事变成一条固定流程：输入什么、中间怎么走、输出长什么样，全都有章可循。这一章就讲怎么搭这条流程。\n\n## 为什么要懂 workflow，不懂会怎样\n\n一句话 Prompt 能用，但它是**赌博式**的。任务小、你自己心里有数、错了也能一眼看出来——OK，赌一把没问题。可一旦任务碰到多个文件、有隐含约束（数据库要同步改、接口有调用方、代码风格有规矩），一句话就压不住了。你会陷进「它改一版 → 我发现漏了 → 再补一句 → 它又改坏别的」的死循环，比自己写还慢。\n\n懂 workflow 的人不一样：他知道每个任务开始前先把「目标、范围、不许动什么、怎么算成功」写清楚，结束时让 AI 交出「改了哪些、测试过没、还有什么风险」的账。这样即使 AI 中途犯浑，你也能在检查点拦住它，而不是等到全跑完才发现满盘皆输。\n\n## Workflow 的三层：从随手一句到自动 Agent\n\n先建立一个分层的直觉。让 AI 干活，从轻到重有三种形态，别用大炮打蚊子，也别拿弹弓打坦克。\n\n- **一次性 Prompt**：一句话，一个来回。适合改个错别字、写个正则、解释一段代码。不值得搞流程。\n- **静态 Workflow**：你预先定好固定的几步（读文件 → 改代码 → 跑测试 → 报告），每次任务都走同样的轨道。适合**重复出现、步骤稳定**的活，比如「加字段」「加一个 API 端点」——这类任务八成时间是同一套动作。\n- **动态 Agent Workflow**：你只给目标和工具，让 Claude Code 自己决定下一步做什么、调哪个工具、要不要回头重试。适合**探索性、边界不清**的活，比如「排查这个偶发的线上报错」——你自己都不知道要读哪几个文件，只能让它自己找。\n\n这一章重点讲**静态 Workflow**，因为日常开发九成任务都属于这一层，把它固化下来收益最大。\n\n**术语：静态 Workflow**\n- 一句话解释：预先定死步骤顺序、每次任务都照同一套轨道走的执行流程。\n- 形象比喻：像麦当劳后厨的操作卡——不管谁上手，做汉堡的动作顺序都一样，出品才稳定。\n- 工作中怎么用：把「加字段/修 bug/加接口」这类高频任务写成固定四段模板，每次填空即可。\n- 最常踩的坑：把探索性任务（不知道要动哪些文件）硬塞进静态模板，结果 AI 被框死、找不到真正的问题源头。\n\n## 一个可复现 workflow 的四个固定件\n\n不管什么任务，一个能复现的 workflow 都由四段组成。记住这四个词：**入口、上下文、执行、出口**。\n\n- **入口**：目标是什么、范围到哪、**禁止动什么**、怎么算成功。禁止事项是最容易漏的一件——不写清楚，AI 就容易「顺手」改到你不想它碰的地方。\n- **上下文**：相关文件路径、要遵守的约束（命名、风格、依赖）、历史上为什么这么设计的决策。给足上下文，AI 才不会瞎猜。\n- **执行**：先出计划、再调工具读代码、然后改、最后跑验证命令。计划先行是关键，让它说清楚要动哪些文件、你先审一眼。\n- **出口**：diff 摘要、测试结果、剩余风险、下一步建议。这是它给你交的账，让你不用逐行读也能判断做得对不对。\n\n**术语：禁止事项（Constraints / Guardrails）**\n- 一句话解释：明确告诉 AI「这些地方不许碰」的边界清单。\n- 形象比喻：像给装修工划的红线——这面墙是承重墙，怎么都不能砸。\n- 工作中怎么用：写在入口段，例如「只改 user 模块，不动 auth、不动测试快照、不加新依赖」。\n- 最常踩的坑：只说要做什么、不说不能做什么，AI 就会自作主张扩大改动范围，diff 一大片没法审。\n\n## 完整走一遍：给用户表新增一个字段\n\n假设需求是：给用户加一个 `phone`（手机号）字段，前后端都要能存能取。看我怎么用四段式把它变成一个 workflow。\n\n**第一步，写入口。** 我不会直接说「加个 phone 字段」，我会给 Claude Code 这样一段：\n\n```\n目标：给 User 增加 phone 字段（string，可空），后端能存取、API 能返回。\n范围：只改 user 相关的 model、migration、schema、序列化。\n禁止：不动 auth 逻辑；不改任何测试快照；不加新依赖；不动前端样式。\n成功标准：迁移能跑通；新增字段在创建/查询用户的接口里能读写；已有测试全绿。\n```\n\n**第二步，喂上下文。** 让它先摸清现状，别急着写：\n\n```bash\n# 让 Claude Code 先读相关文件，别急着改\n# 你可以直接说：先读 user model、对应 migration 目录、API schema，\n# 告诉我现在字段是怎么定义的、迁移是怎么组织的，先别改代码。\n```\n\n它读完会回你「model 在 src/models/user.ts，迁移在 migrations/ 用时间戳命名，接口 schema 在 src/schemas/user.ts」之类。这一步是让它把上下文装进脑子，也让你确认它找对了地方。\n\n**第三步，执行——先计划后动手。** 明确要求它先出计划：\n\n```\n先给我一个改动计划：列出要改哪几个文件、每个文件改什么，先别写代码。\n```\n\n它会列：`1. user model 加 phone 字段 2. 新建一个 migration 3. user schema 加 phone 4. 序列化时带上 phone`。你扫一眼，觉得没漏没多，说「按这个计划改」。它才开始动代码。\n\n**第四步，验证。** 改完立刻跑命令验证，别信「我改好了」这句话：\n\n```bash\n# 迁移能不能跑通\nnpm run migrate\n\n# 相关测试有没有被改绿/改红\nnpm test -- user\n\n# 类型检查\nnpm run typecheck\n```\n\n**第五步，收出口。** 让它交账：\n\n```\n给我一个总结：改了哪些文件（diff 摘要）、上面命令的结果、还有什么风险、建议的下一步。\n```\n\n它回你「改了 4 个文件、migrate 通过、user 测试 12 个全绿、typecheck 无报错；风险：老数据的 phone 是 NULL，如果前端假设它一定有值会出问题；下一步：前端表单加上 phone 输入框」。到这，你对这次改动的全貌一清二楚——这就是可复现的意义。\n\n修 bug 也是同一套模板，只是入口段变成「复现步骤 + 期望行为 + 实际行为」，执行段多一步「先写一个能复现这个 bug 的失败测试」，验证段看那个测试从红变绿。骨架完全一样。\n\n## 检查点与失败回退\n\n四段之间有三个**检查点**，每个都对应一种失败和回退方式。\n\n- **计划检查点**（执行前）：计划里出现了你禁止的文件、或漏了关键改动 → 别让它动手，直接把计划打回：「你不能碰 auth，去掉那条；migration 你漏了，补上」。这是最便宜的拦截点，改一句话的事。\n- **验证检查点**（改完后）：测试红了、迁移报错 → 把**完整报错**贴回去让它修，别自己脑补。修两三轮还在原地打转，说明它跑偏了 → `git checkout .` 回到干净状态，重开一个来回，把出错的线索写进入口段（「上次它误改了 X，这次禁止」）。\n- **出口检查点**（交账后）：它列的剩余风险你不接受 → 当成一个新的小 workflow 继续，别在同一个乱糟糟的对话里硬缝。\n\n一条铁律：**动手前先 commit**。有 git 兜底，任何一步搞砸了都是 `git checkout .` 一键回到原点，代价为零。没有这层保险，你才会舍不得推翻重来、结果越缝越烂。\n\n## 把 workflow 固化成可复用资产\n\n上面这套四段式，你不该每次手打。把它沉淀成资产，自己省事，全组也能用。有三个层次：\n\n- **CLAUDE.md**：放项目根目录，Claude Code 每次自动读。把「本项目的通用约束」写进去——技术栈、命名规矩、不许动的目录、跑测试的命令。相当于给所有任务预置了上下文和禁止事项，你就不用每次重复。\n- **Slash command**：把某类任务的完整四段模板存成一条自定义命令。比如写一个 `/add-field`，正文就是上面那套「目标/范围/禁止/成功标准 + 先计划后改 + 跑这几个验证命令」的模板，以后加字段直接 `/add-field phone`。Cursor 和 Codex CLI 也有各自的自定义命令 / 规则文件机制，思路一致：把重复的流程存下来复用。\n- **Skill**：比 slash command 更完整的一包能力（带说明、步骤、示例文件），适合封装那种「有固定 SOP、还带参考素材」的复杂流程。团队里把它 commit 进仓库，所有人 pull 下来就能用同一套标准。\n\n**团队怎么共享**：这三样都是**纯文本、进 git**。你把 CLAUDE.md、`.claude/commands/` 下的 slash command、skill 目录一起提交，同事拉下来就自动获得同一套 workflow。等于把「组里最会用 AI 那个人的干活习惯」变成了全组的默认配置——这才是 workflow 真正的复利。\n\n## 小结\n\n- 让 AI 干活别赌一句话，按任务复杂度选层：随手改 → 一次性 Prompt；重复稳定的活 → 静态 Workflow；探索性的活 → 动态 Agent。\n- 任何可复现 workflow 都是四段：**入口**（目标/范围/禁止/成功标准）、**上下文**（文件/约束/历史决策）、**执行**（先计划后改、跑验证命令）、**出口**（diff 摘要/测试结果/剩余风险/下一步）。\n- 三个检查点拦住三种失败：计划检查点打回错误计划、验证检查点贴报错重修或回退、出口检查点另起新流程。动手前先 commit，回退零成本。\n- 把这套模板沉淀成 CLAUDE.md / slash command / skill，进 git 全组共享，让团队用同一套标准跟 AI 协作。\n"},{"path":"vibe-coding/claude-schedule.md","label":"新建 · Claude Schedule 安全边界","md":"我第一次给 Claude Code 配定时任务，是想让它每天早上帮我查一下线上课程大纲和本地 outline 有没有对不上。结果第一版我写得太随意，只说了一句「帮我同步一下」。它真的去 `git push` 了——把一份还没审的改动推到了 main。那天早上我一边喝咖啡一边看到通知，手一抖差点把杯子扣键盘上。\n\n从那以后我才明白：定时任务不是「设个闹钟让 AI 聊天」，是**把一段能自己判断、能动手的流程,交给一个没人盯着的 agent 在固定时间跑**。它能干多少活,取决于你给它划的边界。这一章就讲怎么把这份边界说明书写清楚。\n\n## Claude Schedule 到底是什么\n\n先把概念摆正,不然后面全是误会。\n\n**Claude Schedule（定时 Agent）：**\n- 一句话解释：让一个带完整上下文的 AI agent 在你指定的时间点,自动跑一段**可验证**的工作流,而不是等你手动敲命令。\n- 形象比喻：像给你雇了个夜班同事——你下班前把「几点做什么、能碰什么、做完怎么交」写在便利贴上,他半夜按点上工,早上你来看他留的记录。\n- 工作中怎么用：内容巡检、drift 检查、依赖安全更新、日报生成、失败复盘,这类「每天/每周都要做一遍、步骤固定、结果能对错」的活。\n- 最常踩的坑：以为它是「定时聊天机器人」。它不是来陪你唠嗑的,它是来**执行 + 交作业**的。你不给它明确的验收标准,它就会自己发挥,发挥就容易翻车。\n\n它和你平时在 Claude Code / Cursor 里边聊边改最大的区别是:**没人在旁边确认**。你手动改代码时,每一步都能喊停;定时任务跑起来的时候你可能在睡觉。所以这份说明书必须替「当时不在场的你」把关。\n\n## 什么活适合交给定时任务\n\n判断标准就一条:**这件事出错了,能不能自动发现、能不能轻松回退。** 能的就适合,不能的就别。\n\n适合的:\n\n- **内容巡检**——每天扫一遍已发布的文章/页面,查死链、查过期日期、查 SEO 标题有没有被谁改乱。纯只读,最多出个报告。\n- **drift 检查**——比对 production 的课程数据和本地 `outline.json`,哪节课线上线下不一致列出来。也是只读 + 报告。\n- **依赖安全更新**——扫 `package.json` 里有没有安全公告的包,升版本、跑测试,**但只出 PR,不自动 merge、不自动部署**。人第二天来点一下 merge。\n- **报告生成**——把昨天的 git 提交、数据、进展汇总成一份日报,写进文件或发通知。\n- **失败任务复盘**——上一个定时任务挂了,让它读 log、总结失败原因、给建议。\n\n不适合的(这些必须人工确认):\n\n- 删数据库记录、删文件——不可逆。\n- 任何涉及**支付、退款、扣费**的操作。\n- 直接 **部署到生产**——哪怕测试过了,部署时机也该是人决定的。\n- 给用户群发消息/邮件——发出去收不回。\n\n**判断口诀:凡是「做错了要打电话找人求救」的操作,不进定时任务。**\n\n## 怎么写一份可上线的任务说明书\n\n一份能上线的说明书,我固定写五块。缺一块,这任务我就不敢挂上去。\n\n### 1. 任务目标(一句话说清「干什么、算成功」)\n\n别写「检查一下课程」。要写「比对 production 的 `ai-builder` 课程 lesson 列表和本地 `curriculum/ai-builder/public/outline.json`,把标题/顺序/数量不一致的 lesson 列成一张表」。目标里必须带**验收标准**——你怎么知道它成功了。\n\n### 2. 执行边界(最关键的一块)\n\n这是我那次翻车之后加的。把权限**分成四档,明确写死这次能到哪一档:**\n\n**执行边界(四档权限):**\n- 一句话解释:把 agent 能做的事,从「只能看」到「能改能推能上线」分成递进的四级,这次任务只授权到必要的那一档。\n- 形象比喻:像给保洁的门禁卡——发个只能进大堂的,还是能进机房的,你得想清楚。给多了出事,给少了干不成。\n- 工作中怎么用:在说明书里明写一行,比如「本任务权限:**可提交**(能 git commit + 开 PR),**禁止部署**」。\n- 最常踩的坑:图省事直接给最高权限。默认就该给最低的那档,不够用了再往上加。\n\n四档是这么分的:\n\n| 档位 | 能做什么 | 典型任务 |\n|------|---------|---------|\n| 只读 | 读文件、跑查询、生成报告 | 内容巡检、drift 检查 |\n| 可写 | 改本地文件,不碰 git | 批量改文案、格式化 |\n| 可提交 | git commit + 开 PR,**不合并** | 依赖更新、自动化改稿 |\n| 可部署 | 直接推 main / 上线 | ⚠️ 基本不给定时任务 |\n\n写在说明书里就是明确一行:\n\n```\n权限档位: 可提交\n- 允许: 读文件、改本地文件、git commit、git push 到新分支、gh pr create\n- 禁止: git push origin main、merge PR、任何部署命令(deploy/scp/ci trigger)\n```\n\n### 3. 输入来源\n\n它从哪拿数据?写清楚具体路径/接口。比如「本地 `outline.json` + production admin API 的 `/lessons?course=ai-builder`」。别让它自己去猜该读哪个文件。\n\n### 4. 验证方式\n\n跑完怎么证明结果是对的,不是瞎编的。常用四种:\n\n- **diff**——改动前后做对比,只报真正变了的地方。\n- **测试**——依赖升级后跑一遍 `npm test`,绿了才算数。\n- **计数**——「本地 42 节课,线上 40 节,差 2 节」,数字对得上。\n- **schema 校验**——生成的 JSON 用 schema 验一遍格式,不合规就报错别提交。\n\n### 5. 输出方式\n\n结果去哪。报告写进哪个文件、PR 开到哪、通知发到哪个渠道。**一次任务只对应一种主输出**,别让它又发通知又直接改线上。\n\n## 「默认保守」原则\n\n这四个字是我这套东西的地基:**先报告,先 diff,先让人确认。**\n\n意思是,任何有风险的定时任务,第一版都别让它真动手。先让它**只生成报告**——「我打算改这 5 个地方,你看对不对」。跑几天你确认它每次判断都靠谱了,再把权限往上放一档,让它开 PR。再稳一阵,才考虑是不是让它 commit。\n\n给依赖更新任务的说明书,保守版长这样:\n\n```\n1. 扫 package.json 找有安全公告的包\n2. 逐个升级到最近的 patch 版本\n3. 跑 npm test —— 挂了就停,不提交,写进失败报告\n4. 全绿 → git checkout -b deps/auto-update-{date}\n5. git commit + gh pr create(标题带 [自动] 前缀)\n6. ⛔ 到此为止。不 merge、不部署。等人 review。\n```\n\n你看第 3 步和第 6 步——一个是「不确定就停」,一个是「到边界就收手」。这两道闸门是定时任务和手动操作最大的差别:它得替不在场的你踩刹车。\n\n## 失败报告怎么写\n\n定时任务一定会失败——网断了、接口变了、测试挂了。关键是它失败之后留下的信息,能不能让你三分钟看懂、知道下一步干嘛。\n\n一份合格的失败报告固定三块:\n\n```\n❌ 任务失败:依赖安全更新 2026-07-02 06:00\n\n失败命令:\n  npm test\n\n错误原因:\n  lodash@4.17.22 升级后,src/utils/format.test.ts 3 个用例挂了\n  TypeError: _.pick is not a function\n\n下一步建议:\n  1. lodash 4.17.22 移除了 _.pick,改用 _.pickBy 或原生解构\n  2. 已回滚到 4.17.21,未提交任何改动\n  3. 需人工确认要不要改调用方代码后再升级\n```\n\n**失败命令**告诉你它卡在哪一步,**错误原因**给原始报错别润色,**下一步建议**给人一个可执行的起点。最后那句「未提交任何改动」尤其重要——它在告诉你现场是干净的,你不用先去收拾残局。\n\n## 为什么要懂这个 / 不懂会怎样\n\n懂了,你能把每天重复的巡检、比对、更新交出去,早上打开电脑看一份现成报告,像上面雇了个夜班同事。\n\n不懂,两种结局:要么你根本不敢用,重复劳动继续手动干;要么你像我那样图省事给了满权限,某天半夜它「自作主张」把没审的东西推上线,甚至删了不该删的。前者浪费时间,后者是真事故。\n\n## 常见坑\n\n- **给了满权限图省事**——最常见也最致命。默认最低档,不够再加。\n- **没有验证**——它说「同步完成了」,你也不知道到底对不对。没有 diff/测试/计数,报告等于零。\n- **失败悄无声息**——任务挂了没通知,你三天后才发现巡检早就没跑了。失败也要有输出。\n- **一个任务干太多事**——又检查又修改又部署又通知。拆成几个小任务,每个只干一件、只有一种输出。\n- **把它当聊天**——写成「帮我看看有没有问题」这种开放式提问。定时任务的指令必须是**闭合的、有验收标准的**。\n\n## 小结\n\nClaude Schedule 是让 agent 在固定时间跑一段可验证工作流,不是定时聊天。写一份能上线的说明书,五块缺一不可:**任务目标(带验收)、执行边界(只读/可写/可提交/可部署分四档)、输入来源、验证方式(diff/测试/计数/schema)、输出方式**。适合的活是能自动发现错、能轻松回退的——巡检、drift 检查、只出 PR 的依赖更新、报告、复盘;不适合的是删除/支付/部署这类不可逆操作,一律人工确认。贯穿始终一个原则:**默认保守——先报告、先 diff、先让人确认**,权限一档一档往上放。最后别忘了配好失败报告(失败命令 + 错误原因 + 下一步建议),让不在场的你也能三分钟接手。\n"},{"path":"vibe-coding/model-routing-2026.md","label":"新建 · 模型选型 2026","md":"我先说个结论，省得你看半天：**2026 年选 AI coding 模型，已经不是「谁跑分高用谁」了。**\n\n前两年大家还在收藏各种「大模型编程能力横评」的截图，天天刷谁又超过谁 0.5 分。现在这套玩法基本失效了——第一，主流模型的能力都够用了，日常写业务代码你根本感觉不出差别；第二，同一个模型换个交付方式（网页对话 vs 本地 CLI vs API 调用），表现和成本可能差好几倍。\n\n所以我这节课想教你的，是一个更实在的思路：**没有绝对最好的模型，只有最适合这个任务的工具。** 你的工作不是找「最强的那个」，而是学会看一个任务的「风险」和「交付方式」，然后派给合适的工具。就像医院分诊——不是所有人都塞给主任医师，感冒挂普通门诊，急症进抢救室。\n\n---\n\n## 为什么要懂这个（不懂会怎样）\n\n不懂的人，日常大概是这样：所有活都甩给同一个最贵的模型，包括「帮我把这个变量名改一下」这种。结果一个月账单几百刀，一半是浪费在小事上的。\n\n反过来也有人为了省钱，什么活都用便宜小模型，结果写核心支付逻辑时它给你埋了个 bug，你 code review 没看出来，上线了才发现，返工 + 修复 + 复盘一整天——省下来的钱还不够赔这一天工时的零头。\n\n**懂选型的人，是在「质量、成本、速度」这三个之间做匹配**，而不是永远押一个极端。这才是 2026 年一个 AI builder 的基本功。\n\n---\n\n## 先认识一下 2026 年的牌面\n\n我按「定位」讲，不讲跑分数字——因为跑分你今天记住明天就过期了，定位反而稳定。\n\n**术语：agentic coding（自治式编程）**\n- 一句话解释：你给一个目标，模型自己拆任务、读代码、写代码、跑命令、自我验证，能连续干很久不用你插手。\n- 形象比喻：不是「你说一句它写一句」的实习生，而是「你交代一个需求它自己搞定」的资深工程师。\n- 工作中怎么用：适合「把这个设计文档实现成一个能跑的模块」这种大活、长活、隔夜活。\n- 最常踩的坑：把小活也丢给它，它会「想太多」——给你加一堆你没要的抽象层、错误处理、多余文件。小活反而该用低配。\n\n- **Claude Fable 5 / Claude Opus 4.8**——复杂推理、超长上下文、高自治的 agentic coding。这俩是「资深工程师」档，适合你说清楚一个大目标、然后放手让它跑很久的那种任务（大重构、跨多文件的功能、隔夜自动化）。Fable 5 是能力天花板更高的那个，Opus 4.8 是同门稍轻量、性价比更好的选择。\n- **Codex**——专门干「在你本地仓库里小步改动」的活：定位一个 bug、改几行、跑一下测试、开个 PR。它的强项是「贴着你的真实代码库」工作，交付粒度是 PR 级的小改动，不是从零造一个大系统。\n- **GPT-5.5**——复杂 reasoning + coding 的 API 工作流首选。你要把 AI 能力嵌进自己产品的后端、批量处理、做 pipeline，用它写这条链路很稳。它的小弟 **GPT-5.4 mini / nano** 则专门吃「低延迟、低成本、大批量」的活——比如给一万条数据打标签、做简单分类，用大模型是杀鸡用牛刀。\n- Gemini 我只作可选参考，不当主线——你团队里如果已经在用可以留着，但不必专门为它调整流程。\n\n**术语：交付方式（delivery mode）**\n- 一句话解释：同一个模型，你是通过网页聊天用它、还是在命令行 CLI 里用它、还是用代码调 API，这就是不同的交付方式。\n- 形象比喻：同一个厨师，你是去餐厅堂食、还是叫外卖、还是请他上门做包月——体验和成本完全不同。\n- 工作中怎么用：探索性问题用网页聊；改本地代码用 CLI（Codex / Claude Code）；嵌进产品用 API。\n- 最常踩的坑：把该用 API 的批量活手动在网页里一条条问，累死自己还没法复用。\n\n---\n\n## 核心方法：按任务选模型\n\n我把日常的 AI coding 活拆成 5 类，你对号入座：\n\n| 任务类型 | 风险 | 推荐工具 | 为什么 |\n|---|---|---|---|\n| 架构设计 / 技术方案 | 高（错了全盘返工） | Claude Fable 5 / Opus 4.8 | 要长上下文 + 深推理，值得上最强档 |\n| 本地代码修改 / 调 bug | 中 | Codex | 贴着真实仓库小步改、跑命令、开 PR |\n| 复杂 reasoning 的 API 链路 | 中高 | GPT-5.5 | 嵌进产品后端的推理 + coding 工作流 |\n| Code Review | 中（漏 bug 有代价） | Claude Opus 4.8 / Fable 5 | 找真 bug 能力强，值得多花点 |\n| 批量生成 / 简单分类 | 低 | GPT-5.4 mini / nano | 便宜、快、量大，不需要顶配脑子 |\n\n用的时候记住一句口诀：**「风险越高、错了越贵，就越舍得上好模型；活越小、越标准化，就越该用小模型。」**\n\n---\n\n## 落地：给团队写一份「模型路由清单」\n\n光记在脑子里没用，团队一多就乱。你要把它沉淀成一份清单，新人进来照着做就行。我给你个可以直接抄的模板：\n\n```md\n# 团队模型路由规则 v1（2026-07）\n\n## 默认档\n- 日常写业务代码 / 改本地仓库  → Codex\n- 有拿不准的技术选型 / 架构     → Claude Opus 4.8（复杂的升 Fable 5）\n\n## 什么时候升到最强档（Fable 5 / Opus 4.8）\n- 跨 5 个以上文件的重构\n- 隔夜 / 长时间自治任务\n- 核心链路的 code review（支付 / 权限 / 数据）\n\n## 什么时候用 GPT-5.5\n- 要写进产品后端的 AI 功能（reasoning + coding）\n- 需要稳定 API 工作流的 pipeline\n\n## 什么时候降到小模型（GPT-5.4 mini / nano）\n- 批量打标签 / 分类 / 格式转换\n- 简单模板生成、大量重复的小任务\n\n## 铁律\n- 「改个变量名」这种别用最强档 —— 浪费钱\n- 核心支付 / 安全逻辑别图便宜用小模型 —— 返工更贵\n```\n\n这份清单不用一次写完美。**先写个 v1 贴到团队文档里，跑两周再根据账单和踩坑记录改成 v2。** 活的规则比完美的规则有用。\n\n---\n\n## 关键一步：用一次真实任务做成本复盘\n\n这是我最想让你做的动作——**别信我说的，自己测一次。**\n\n挑一个你手头真实的中等任务（比如实现一个带校验的表单接口），用两个候选模型各做一遍，然后老老实实记这几个数：\n\n```md\n任务：实现订单退款接口（含参数校验 + 幂等）\n\n| 模型          | 输出质量(1-5) | 我验证花了多久 | 返工次数 |\n|--------------|-------------|-------------|--------|\n| Codex        | 4           | 15 分钟      | 1      |\n| Opus 4.8     | 5           | 8 分钟       | 0      |\n```\n\n你会发现一件反直觉的事：**有时候「贵的模型」总成本反而更低。** 因为它一次做对了，你验证快、不返工——省下的你的工时，远超那点 token 差价。「验证成本 + 返工次数」才是真成本，token 单价只是账面上的一小块。\n\n这个复盘做上三五次，你对自己团队的模型选型就有真数据了，比看任何横评都靠谱。\n\n---\n\n## 常见坑\n\n- **迷信「最新 = 最好」。** 新模型出来先别急着全量切，用你那份路由清单里的老任务测一遍再说。\n- **一个模型用到底。** 图省事全用一个,要么贵要么不够强,两头不讨好。\n- **只看 token 单价不看总成本。** 便宜模型返工三次,比贵模型一次做对还贵。\n- **小活用最强档。** 改个名字、加个注释这种,大模型会「用力过猛」,还费钱。\n- **没沉淀成规则。** 选型全靠个人脑子记,团队一扩就各干各的,规则文档才是护城河。\n\n---\n\n## 小结\n\n2026 年的模型选型,核心就一句:**按任务风险和交付方式选工具,没有绝对的最好,只有最适合。**\n\n- 认牌面:Claude Fable 5 / Opus 4.8 管高自治大活,Codex 管本地小改动,GPT-5.5 管 API 工作流,mini/nano 管批量小活。\n- 按任务分诊:架构 / review 舍得上好模型,批量简单活用小模型。\n- 沉淀成一份团队路由清单,先出 v1 再迭代。\n- 用真实任务复盘「质量 + 验证成本 + 返工次数」,拿真数据说话。\n\n把这套跑顺了,你就从「追着新模型跑的人」,变成「让每个模型各就各位的人」——后者才是真正省钱又高效的 AI builder。\n"},{"path":"ai-engineer/mcp-tool-integration.md","label":"新建 · MCP 工具集成","md":"前两章我们聊过 MCP 是什么、怎么把一个 MCP 服务器配进 Claude Code 或 Cursor。这章我要解决的是最后一公里，也是最容易翻车的一段：**工具接进去了，模型到底怎么找到它、怎么决定用它、怎么传参数、拿到结果又怎么接着往下走。**\n\n我踩过一个很典型的坑。我给团队写了个查订单的 MCP tool，本地测服务器跑得好好的，`tools/list` 也能列出来。结果一到实战，模型要么根本不调，要么调了传个乱七八糟的参数。查了半天发现问题不在代码，在我那句敷衍的 description。所以这章我想让你明白一件事：**MCP 集成的成败，八成不在服务器写得对不对，而在你给模型的「说明书」写得清不清楚。**\n\n## 集成的四个环节：模型是怎么用上你工具的\n\n先把整个链路拆开。模型用一个工具，永远是这四步，缺一不可：\n\n1. **发现（tools/list）** —— 客户端启动时向 MCP 服务器要一份工具清单。服务器返回每个工具的 name、description、inputSchema。这份清单会被塞进模型的上下文，模型这时才「知道」有哪些工具可用。\n2. **选择** —— 模型根据你的自然语言需求，对照每个工具的 description，判断该用哪个（或者一个都不用）。**它靠的就是 description 那几句话，没有别的信息。**\n3. **调用（tools/call）** —— 模型决定用某个工具后，按 inputSchema 生成一段参数 JSON，客户端把「工具名 + 参数」发给服务器执行。\n4. **回填** —— 服务器返回结构化结果，客户端把结果塞回模型上下文。模型拿到结果后，要么直接给你答案，要么发现还得再调一次（比如先查用户 ID、再拿 ID 查订单）。\n\n这四步里，第 1、3、4 步基本是协议和代码在跑，你控制不了太多。**你真正能左右模型行为的，是第 2 步——而它完全取决于第 1 步你喂进去的 description 和 schema。** 这就是为什么后面我会反复强调「写清楚」。\n\n## Tool 和 Resource：一个是动手，一个是查资料\n\nMCP 里有两类东西经常被搞混，但边界其实很清楚：\n\n**术语：Tool（工具）**\n- 一句话解释：模型主动调用、会产生副作用（改数据、发请求、触发动作）的能力。\n- 形象比喻：像给助理一双手——「去把这单退款」「去建个日历事件」。\n- 工作中怎么用：查订单、发邮件、创建工单、部署服务，这些都是 Tool。\n- 最常踩的坑：把只读查询也当 Tool 无所谓，但把有副作用的写操作当成「顺手做做」——没加确认，模型一激动就真删了数据。\n\n**术语：Resource（资源）**\n- 一句话解释：只读的上下文数据，模型可以引用但不会改变任何东西。\n- 形象比喻：像桌上摊开的参考手册——随便看，但看了不会把手册改掉。\n- 工作中怎么用：一份产品文档、一段数据库 schema、一个配置文件的当前内容。\n- 最常踩的坑：把「查订单」这种带查询参数、每次结果不同的动作硬塞成 Resource——它其实更适合做 Tool，因为它需要模型传参、主动触发。\n\n简单判断法：**这个操作会不会「改变世界」或者「需要模型传参数去执行」？会 → Tool；只是把已有内容摊给模型看 → Resource。** 这章我们聚焦 Tool，因为集成的复杂度基本都在这。\n\n## 一个 Tool 定义长什么样\n\nMCP 的 tool 定义就三个核心字段：`name`、`description`、`inputSchema`。inputSchema 是标准的 JSON Schema。给你一个完整例子——查订单：\n\n```json\n{\n  \"name\": \"get_order\",\n  \"description\": \"根据订单号查询订单的当前状态、金额和物流信息。用于回答'我的订单到哪了''这单多少钱''发货了没'这类问题。只读，不会修改订单。如果订单号不存在会返回明确错误。\",\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"order_id\": {\n        \"type\": \"string\",\n        \"description\": \"订单号，格式为 ORD- 开头加 8 位数字，例如 ORD-20260615。区分大小写。\"\n      },\n      \"include_items\": {\n        \"type\": \"boolean\",\n        \"description\": \"是否返回订单内的商品明细。默认 false，只有用户明确问'买了哪些东西'时才设为 true。\",\n        \"default\": false\n      }\n    },\n    \"required\": [\"order_id\"],\n    \"additionalProperties\": false\n  }\n}\n```\n\n注意几个细节：\n\n- **description 里说清了「什么时候用」和「用于回答哪类问题」**，不是干巴巴一句「查询订单」。这直接决定了第 2 步模型选不选它。\n- **每个参数自己也有 description**，连格式（`ORD-` 开头）都写了。模型据此才能从你「帮我查下 ORD-20260615」里正确提取参数。\n- **`required` 明确必填**，`additionalProperties: false` 防止模型瞎编字段。\n- **`default` 给了保守默认值**——不该多返回的默认不返回。\n\n## 为什么 description 要懂：含糊的说明是选错工具的头号原因\n\n这是这章我最想让你记住的一条。模型选工具时，它不看你的代码、不看你的注释，**它眼里只有那份 tools/list 里的 description。** 你写得含糊，它就选错。\n\n举个真实对比。假设你有两个工具：`get_order`（查单个订单）和 `list_orders`（查某用户的所有订单）。如果两个 description 都只写「查询订单」，模型面对「张三最近下了几单」时根本分不清该用哪个,大概率乱选。但如果分别写成：\n\n- `get_order`: 「根据**单个订单号**查询该订单详情」\n- `list_orders`: 「根据**用户 ID**查询该用户名下**所有**订单的列表」\n\n模型立刻就知道「查某人所有单」该用后者。**description 的价值不在于描述工具本身，而在于帮模型把它和别的工具区分开。** 写的时候多想一句：「模型凭这句话，能不能和我其他工具区分开？」\n\n**不懂会怎样**：你会遇到那种玄学 bug——工具明明能用，模型就是不调，或者调错。你去查代码查半天，其实改一句 description 就好了。这种时间浪费我见得太多了。\n\n## 错误处理：返回「能自我修正的信息」，不是一句 error\n\n模型有个很好的特性：只要你告诉它哪里错了、怎么改，它能自己重试修正。但前提是你的错误信息得**可行动**。\n\n反面教材：\n\n```json\n{ \"error\": \"failed\" }\n```\n\n模型看到这个只能干瞪眼，它不知道是订单号错了、没权限、还是超时，只能放弃或者原样重试。\n\n正确做法是按错误类型返回具体、可修正的信息：\n\n```json\n{\n  \"error\": \"invalid_order_id\",\n  \"message\": \"订单号 'ORD-123' 格式不对，正确格式是 ORD- 加 8 位数字（如 ORD-20260615）。请向用户确认完整订单号。\"\n}\n```\n\n分场景该返回什么：\n\n- **参数错误** → 说清哪个参数错了、正确格式是什么、让模型去跟用户确认。模型会重新问用户拿正确的值。\n- **无权限** → 明确「当前身份无权查此订单，需要工单权限」。模型就不会傻乎乎重试，而是转告用户「这需要更高权限」。\n- **超时 / 服务不可用** → 返回「上游服务暂时超时，可稍后重试」。模型知道这是临时故障，可能会重试一次或告诉用户稍等。\n\n**核心心法**：把错误信息当成「写给模型看的下一步指令」，而不是「写给日志的技术堆栈」。\n\n## 幂等和危险操作：写操作要能重复，删除要人来点头\n\n这里有两条工程纪律，直接关系到会不会出事故。\n\n**术语：幂等（Idempotent）**\n- 一句话解释：同样的请求执行一次和执行十次，结果一样，不会重复产生副作用。\n- 形象比喻：像电梯按钮，你连按五下，电梯也只来一次。\n- 工作中怎么用：写操作（创建、更新）尽量带一个 `idempotency_key`（幂等键），服务器发现同 key 已处理过就返回上次结果，而不是再执行一遍。\n- 最常踩的坑：模型因为超时没收到结果，会自动重试。如果你的创建订单接口不幂等，用户就会莫名其妙多出一单。\n\n为什么模型场景下幂等特别重要？因为**模型重试是常态**——网络抖一下、结果没回填成功，它就再调一次。人手动操作重试概率低，模型高得多。所以凡是写操作，默认就要往幂等上设计。\n\n至于**删除、支付、部署**这类不可逆或高风险动作，别指望幂等兜底，直接上人工确认。两种常见做法：\n\n1. 工具本身分两步——先返回「即将删除 X，确认请再调一次带 `confirmed: true`」，模型会把这句转达给用户，等用户点头才真执行。\n2. 客户端层面配置这类工具需要人工审批（Claude Code 里危险工具默认会弹确认）。\n\n原则一句话：**只读随便调，可逆写操作做幂等，不可逆 / 花钱 / 上线的操作一律人来拍板。**\n\n## 动手：把内部查订单 API 包成一个 MCP tool\n\n假设你们后端有个现成接口 `GET /internal/orders/{id}`，返回订单 JSON。把它包成 MCP tool，核心就是「把上面那个 tool 定义注册进去 + 写好 handler」。用 TypeScript SDK 大概长这样：\n\n```typescript\nserver.tool(\n  \"get_order\",\n  \"根据订单号查询订单状态、金额、物流。只读。订单号格式 ORD- 加 8 位数字。\",\n  {\n    order_id: z.string().describe(\"订单号，如 ORD-20260615\"),\n    include_items: z.boolean().default(false).describe(\"是否返回商品明细\"),\n  },\n  async ({ order_id, include_items }) => {\n    // 1. 参数校验，错了返回可修正信息\n    if (!/^ORD-\\d{8}$/.test(order_id)) {\n      return {\n        content: [{ type: \"text\", text:\n          `订单号 '${order_id}' 格式不对，应为 ORD- 加 8 位数字。请向用户确认。` }],\n        isError: true,\n      };\n    }\n    // 2. 调真实内部 API\n    const res = await fetch(`${API_BASE}/internal/orders/${order_id}`, {\n      headers: { Authorization: `Bearer ${process.env.INTERNAL_TOKEN}` },\n    });\n    if (res.status === 404) {\n      return { content: [{ type: \"text\", text:\n        `订单 ${order_id} 不存在，请让用户核对订单号。` }], isError: true };\n    }\n    if (!res.ok) {\n      return { content: [{ type: \"text\", text:\n        `上游服务返回 ${res.status}，暂时不可用，可稍后重试。` }], isError: true };\n    }\n    // 3. 结构化回填，按 include_items 裁剪\n    const order = await res.json();\n    const payload = include_items ? order : { ...order, items: undefined };\n    return { content: [{ type: \"text\", text: JSON.stringify(payload) }] };\n  }\n);\n```\n\n对着前面讲的检查一遍：description 说清了用途和格式（选对）、参数带 describe（传对）、三种错误分别返回可行动信息（自我修正）、只读所以不用管幂等。这就是一个能被模型「用对」的 tool。token 不进代码、走环境变量——这是红线。\n\n## 常见坑\n\n- **description 写给人看，不是写给模型看**：写成「订单查询工具 v2」这种没用，要写「什么时候该用、用来回答什么问题」。\n- **一个工具塞太多功能**：又能查又能改又能删的「万能订单工具」，模型永远搞不清该传什么。拆成职责单一的小工具，模型选得准。\n- **错误只返回 error 或者直接抛异常**：模型接不住，只能放弃。永远返回结构化、可行动的错误文本。\n- **写操作没幂等，靠祈祷模型不重试**：模型一定会重试，早晚出重复数据。\n- **危险操作不加确认**：删除 / 支付 / 部署裸奔，迟早出事故。\n\n## 小结\n\nMCP 集成的四个环节——发现、选择、调用、回填——里，**你唯一能大幅影响模型行为的杠杆就是那份工具说明**：清晰的 description 决定模型选不选、选不选对；精确的 inputSchema（每个参数都带 describe）决定它传不传对参数；可行动的错误信息让它能自我修正；幂等和人工确认则守住写操作和危险操作的安全底线。把这几条落到你写的每个 tool 上，你的工具就从「能列出来但不好使」变成「模型拿起来就用对」。下一步，去挑一个你们团队真实的内部只读 API，照着上面的模板包一个 tool，在 Claude Code 里试试它到底选不选得对。\n"},{"path":"ai-engineer/agent-fundamentals.md","label":"新建 · Agent Fundamentals","md":"## 先说人话：Agent 不是「更聪明的聊天」\n\n我第一次用 Claude Code 的时候，脑子里的模型是错的。我以为它就是个「懂代码的 ChatGPT」——我问一句，它答一句，只不过答得比网页版准。\n\n用了两天我才反应过来：完全不是这么回事。\n\n我让它「把这个项目里所有用了旧版日期库的地方换成新的」，然后它自己去 `grep`、自己打开文件、自己改、改完自己跑测试、测试挂了它自己看报错再改回来。我全程没插一句话。这就不是「聊天」了——聊天是我说一句它说一句，而它是**自己在一个循环里，决定下一步干什么**。\n\n这个「自己决定下一步」就是 Agent 和普通 LLM 调用最本质的区别。\n\n一个最好记的公式：\n\n**术语：Agent（智能体）**\n- 一句话解释：LLM + 工具 + 循环 + 记忆，让模型在循环里自己决定下一个动作，直到任务完成。\n- 形象比喻：普通 LLM 是「你问路，路人给你指个方向」；Agent 是「你把地址给司机，他自己看导航、自己拐弯、堵车了自己绕路，把你送到」。\n- 工作中怎么用：交给它路径不确定的活——比如「修好这个 bug」「把这块代码从 A 框架迁到 B 框架」，你不用告诉它每一步怎么走。\n- 最常踩的坑：把它当搜索引擎用，一次只问一个小问题，那你就浪费了它「自己跑循环」的能力，也白白多花了钱。\n\n## 核心：感知 → 推理 → 行动 → 观察，循环起来\n\nAgent 的心脏就是一个循环。每转一圈做四件事：\n\n1. **感知（Perceive）**：看当前上下文——任务是什么、上一步干了啥、结果如何。\n2. **推理（Reason）**：模型想一下，决定下一个动作该干嘛。\n3. **行动（Act）**：真的去调工具——跑命令、读文件、改代码、搜网页。\n4. **观察（Observe）**：看行动的结果，把结果塞回上下文，进入下一圈。\n\n一直转，直到任务完成，或者撞上你设的停止条件。\n\n用伪代码写出来，其实特别简单：\n\n```python\ndef run_agent(task, tools, max_steps=15, budget=2.0):\n    context = [task]          # 记忆：一开始只有任务本身\n    steps = 0\n    cost = 0.0\n\n    while steps < max_steps and cost < budget:\n        # 1. 感知 + 2. 推理：模型看着当前上下文，决定下一步\n        decision = llm.decide(context, tools)\n        cost += decision.token_cost\n\n        # 模型自己判断：任务做完了吗？\n        if decision.is_done:\n            return decision.final_answer\n\n        # 3. 行动：执行模型选的工具\n        result = run_tool(decision.tool, decision.args)\n\n        # 4. 观察：把结果写回记忆，进入下一圈\n        context.append(decision.action)\n        context.append(result)\n        steps += 1\n\n    return \"触发停止条件（步数或预算超了），交还给人处理\"\n```\n\n注意看：**决定用哪个工具的是模型，不是你写死的 `if-else`**。你只提供了工具箱（`tools`）和护栏（`max_steps`、`budget`），路怎么走是它自己选的。这就是「自治」。\n\n## Agent vs Workflow vs 单次 Prompt\n\n这三个东西天天被混着说，但用错场景代价很大。我用一个「点外卖」的类比来分：\n\n- **单次 Prompt**：你直接跟朋友说「帮我拿桌上那杯咖啡」。一句话说清，一步到位，不需要中途反馈。\n- **Workflow（工作流）**：你写好一张纸条——「先烧水 → 再放咖啡粉 → 倒水 → 搅拌」。步骤固定，谁来做、做几次，路径都一样，结果可预测。\n- **Agent**：你说「我想喝点提神的东西」。它得自己看家里有啥（感知）、决定做美式还是泡茶（推理）、发现没咖啡豆了跑去买（行动）、尝一口不够浓再补（观察）。路径事先不知道。\n\n**术语：Workflow（工作流）**\n- 一句话解释：把任务拆成固定的几步，按预先定好的路径一步步执行，路径可预测。\n- 形象比喻：像工厂流水线，每个工位干什么、下一步传给谁，都是提前排好的。\n- 工作中怎么用：重复性、结构化的任务——比如「每天早上把这份 JSON 转成报表并发邮件」，步骤永远一样。\n- 最常踩的坑：明明是固定流程，非要套个 Agent 去「智能」处理，结果又慢又贵还时好时坏。\n\n一句话记牢：**Workflow 的步骤是你（工程师）定的；Agent 的步骤是模型（运行时）定的。**\n\n| | 谁决定步骤 | 路径 | 适合 |\n|---|---|---|---|\n| 单次 Prompt | 你，一句话 | 无 | 一步能说清的活 |\n| Workflow | 你，写死流程 | 固定、可预测 | 重复、结构化任务 |\n| Agent | 模型，动态决定 | 不确定 | debug、迁移、跨模块改造 |\n\n## 什么时候「不该」用 Agent\n\n这条特别重要，因为现在满世界都在喊「上 Agent」，很多人上错了。\n\n**只要满足这几个条件，就别用 Agent，用 Workflow 更好：**\n\n- 步骤是固定的，每次都一样；\n- 任务能一次说清楚，不需要模型中途拿主意；\n- 你不需要看到中间结果再决定下一步。\n\n举个我踩过的坑：我要「把 200 个 markdown 文件的 frontmatter 里加一个字段」。这活我一开始扔给 Agent，它一个个文件读、一个个想、一个个改，跑了十几分钟还花了不少 token。后来我用一个 20 行的脚本（Workflow），2 秒跑完，一分钱没花，而且每次结果完全一样。\n\n**Agent 的自治是有成本的**：\n\n- **更慢**——每一圈都要等模型推理一次；\n- **更贵**——循环几圈，token 就翻几倍；\n- **更难复现**——同样的任务跑两遍，走的路径可能不一样，出 bug 你都难 debug。\n\n所以选择标准很简单：**路径确定 → Workflow；路径不确定、需要模型随机应变 → Agent。** 别为了「显得先进」硬上 Agent。\n\n## 完成条件 vs 停止条件：别让它跑成死循环\n\nAgent 最大的风险是**转不停**。它以为还没做完，一圈接一圈地跑，或者两个动作来回横跳（改了又改回来），把你的钱包和 API 额度烧穿。\n\n所以必须给它两种「刹车」：\n\n- **完成条件（Done）**：任务真的达成了——测试全过、目标文件都改完、问题解决了。这是「正常下班」。\n- **停止条件（Stop / 护栏）**：还没做完但必须叫停——步数超上限、花费超预算、连续几步没进展。这是「拉闸保命」。\n\n回头看上面伪代码里的 `max_steps` 和 `budget`，就是停止条件。**上线任何 Agent 之前，这两个护栏必须设。** 我的习惯是：先把 `max_steps` 设得偏小（比如 10 步）跑几次，看它一般几步能搞定，再往上调。\n\n## Agent 到底需要哪几个部件\n\n拆开看，一个能跑的 Agent 就三样核心部件：\n\n1. **工具（Tools）**：Agent 的手脚。读写文件、执行 shell、搜网页、调 API……没有工具，模型只能「说」不能「做」。工具描述写得越清楚，模型选得越准。\n2. **记忆 / 上下文（Memory / Context）**：Agent 的记事本。每一圈的动作和结果都要写回上下文，它才知道「我已经试过什么、现在到哪了」。上下文太长会爆窗口，所以现在很多做法是压缩历史或分段总结。\n3. **停止条件（Stop）**：Agent 的刹车。上面刚讲过，防死循环、控成本。\n\n2026 年这些部件很多已经被工具链封装好了。比如 Claude Code 的 **sub-agents**：主 Agent 可以派一个子 Agent 去专门啃某个子任务（比如「你去把测试全跑一遍并总结哪些挂了」），子 Agent 有自己独立的上下文，跑完把结论汇报回来。这本质上就是把「记忆」做了分层——主 Agent 的上下文不会被一堆测试日志塞爆。你不用自己从零实现循环，但**理解循环怎么转、护栏怎么设，你才知道它为什么慢、为什么绕、什么时候该拦它**。\n\n## 为什么要懂这个 / 不懂会怎样\n\n不懂 Agent 的循环机制，你会犯两类错：\n\n- **该用 Workflow 的地方硬上 Agent**——固定任务被跑得又慢又贵还不稳定，你还纳闷「AI 怎么这么笨」。其实是你选错工具了。\n- **不设护栏就放它跑**——某天它卡在一个死循环里，一晚上烧掉一大笔 API 费用，或者把不该动的文件改了一堆，你早上起来收拾残局。\n\n反过来，懂了之后你会很自然地做判断：这个任务路径确定吗？确定就写脚本；不确定就配好工具和停止条件，交给 Agent。\n\n## 常见坑\n\n- **把 Agent 当聊天用**：一次只问一个小问题，浪费了它自己跑循环的能力。想让它发挥价值，就给它一个「有终点、路径不明」的完整任务。\n- **不设 `max_steps` / 预算**：这是新手最容易漏的，直接后果就是死循环烧钱。任何 Agent 上线前先设护栏。\n- **工具描述太糊**：工具是模型的手，描述写不清它就选错工具。写工具描述要像写给一个聪明但没上下文的新同事看。\n- **上下文无限堆**：每圈结果都往里塞，迟早爆窗口。长任务要考虑压缩历史或用 sub-agent 分担。\n\n## 小结\n\n- **Agent = LLM + 工具 + 循环 + 记忆**，核心是模型在循环里**自己决定下一步**，不是更聪明的聊天。\n- 循环四步：**感知 → 推理 → 行动 → 观察**，转到完成或撞停止条件为止。\n- **Workflow 步骤你定、路径固定**；**Agent 步骤模型定、路径不确定**。重复任务用 Workflow，debug / 迁移 / 跨模块改造这类路径不明的活才用 Agent。\n- 自治有成本（更慢、更贵、更难复现），所以路径确定时别硬上 Agent。\n- 上线前必设**停止条件**（步数 / 预算上限），防死循环。\n- 三个核心部件：**工具、记忆、停止条件**。2026 年像 Claude Code sub-agents 已经帮你把循环和记忆分层封装好了，但机制你得懂，才知道什么时候该拦它。\n"},{"path":"ai-engineer/agent-tool-use.md","label":"新建 · Agent Tool Use","md":"# Agent Tool Use — 让 Agent 用对工具\n\n上一章「Agent Fundamentals」里，我们把 Agent 拆成了「感知—思考—行动」的循环。这章我专门讲那个「行动」环节：**工具调用（tool use / function calling）**。\n\n我自己最早写 Agent 的时候，脑子里想的是「模型很聪明，我把工具丢给它，它自然会用」。结果第一个 demo 就翻车了：我给了它 12 个工具，它查天气去调了发邮件的工具，还把城市名传进了收件人字段。不是模型笨，是我根本没告诉清楚每个工具是干嘛的、参数长什么样。\n\n工具用得好不好，八成不取决于模型，取决于**你怎么描述工具**。这章就是教你把工具描述清楚、把边界设死。\n\n---\n\n## 为什么要懂这个 / 不懂会怎样\n\nClaude Code、Cursor、Codex CLI 这些 2026 年天天在用的编码 Agent，本质都是「一个会调工具的模型」。它们能读文件、跑命令、改代码，靠的全是背后一套工具定义。\n\n如果你自己写 Agent 却不懂工具设计，会踩这些坑：\n- 模型总选错工具，你以为是模型蠢，其实是 description 写得含糊；\n- 参数经常传错格式，程序崩了模型还一脸懵，因为你返回的错误它读不懂；\n- 一个「删除数据库」的工具你设成能直接调用，某次模型误判，生产数据没了。\n\n反过来，工具设计对了，一个中等能力的模型也能干得又稳又准。\n\n---\n\n## 一个工具调用的完整回合\n\n先看清楚「模型调一次工具」到底发生了什么。它不是一步，是一个**闭环**：\n\n1. 模型看到你的问题 + 可用工具列表，决定「我要调 `get_weather`，参数是 `{city: \"Melbourne\"}`」；\n2. **运行时**（你的代码，不是模型）真正去执行这个函数，拿到结果；\n3. 结果作为一条 `tool` 角色的消息**回填**给模型；\n4. 模型基于这个结果继续——要么再调别的工具，要么给出最终答案。\n\n关键点：**模型自己不会执行任何东西**。它只输出「我想调什么、传什么参数」，真正跑代码的是你的运行时。跑完把结果喂回去，它才能接着想。\n\n用 JSON 看一遍这个来回：\n\n```json\n// 第 1 步：模型的输出——它决定调工具\n{\n  \"role\": \"assistant\",\n  \"content\": [\n    {\n      \"type\": \"tool_use\",\n      \"id\": \"toolu_01A\",\n      \"name\": \"get_weather\",\n      \"input\": { \"city\": \"Melbourne\" }\n    }\n  ]\n}\n\n// 第 2 步：你的运行时执行 get_weather(\"Melbourne\")，拿到结果\n// 第 3 步：把结果作为 tool_result 回填\n{\n  \"role\": \"user\",\n  \"content\": [\n    {\n      \"type\": \"tool_result\",\n      \"tool_use_id\": \"toolu_01A\",\n      \"content\": \"{\\\"temp\\\": 14, \\\"condition\\\": \\\"多云\\\"}\"\n    }\n  ]\n}\n\n// 第 4 步：模型基于结果继续，这次给最终答案\n{\n  \"role\": \"assistant\",\n  \"content\": [\n    { \"type\": \"text\", \"text\": \"墨尔本现在 14 度，多云，出门带件外套。\" }\n  ]\n}\n```\n\n一个 Agent 任务往往是这个回合转好几圈：调工具、看结果、再调、再看，直到能回答为止。\n\n---\n\n## 模型靠什么选对工具\n\n模型面对一堆工具，凭三样东西决定用哪个：\n\n**术语：工具 description（工具描述）**\n- 一句话解释：告诉模型「这个工具是干什么的、什么时候该用它」的自然语言说明。\n- 形象比喻：像超市货架上的标签。标签写「进口零食」你找薯片就走过去了；标签只写「食品」，你站货架前一脸茫然。\n- 工作中怎么用：写清楚**用途 + 触发场景 + 边界**，比如「查询某城市当前天气。仅用于实时天气，历史天气请用 `get_weather_history`」。\n- 最常踩的坑：description 写得含糊（比如只写「天气工具」），这是**模型选错工具的头号原因**。模型不是读你的代码，它只读这行字。\n\n第二样是**参数 schema**。它用 JSON Schema 约束每个参数的类型、格式、哪些必填。schema 越明确，模型越不容易传错。第三样是**工具数量**——工具太多会稀释模型的判断力，一次给它 30 个工具，它挑错的概率远高于给 5 个相关的。按当前任务场景只暴露相关工具，别一股脑全塞进去。\n\n看一个把三样都写清楚的工具定义：\n\n```json\n{\n  \"name\": \"get_weather\",\n  \"description\": \"查询某个城市的『当前实时』天气。适用于用户问『现在/今天天气怎么样』。历史天气或天气预报请勿使用此工具。\",\n  \"input_schema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"city\": {\n        \"type\": \"string\",\n        \"description\": \"城市英文名，如 'Melbourne'、'Sydney'\"\n      },\n      \"unit\": {\n        \"type\": \"string\",\n        \"enum\": [\"celsius\", \"fahrenheit\"],\n        \"description\": \"温度单位，默认 celsius\"\n      }\n    },\n    \"required\": [\"city\"]\n  }\n}\n```\n\n注意 `enum` 把 `unit` 限死在两个合法值里，`required` 标明 `city` 必须传。这些约束是在帮模型少犯错。\n\n---\n\n## ReAct：想一步、做一步、看一步\n\nAgent 调工具不是盲目乱调，一个经典且好用的思路是 **ReAct**：**Reason（想）→ Act（调工具）→ Observe（看结果）**，循环往复。\n\n**术语：ReAct**\n- 一句话解释：让模型「先说出推理、再调工具、再观察结果」交替进行的一种 Agent 模式。\n- 形象比喻：像修水管的师傅。他先想「应该是这段漏了」（Reason），拧开阀门试一下（Act），看水停没停（Observe），没停就换个判断再试。\n- 工作中怎么用：让模型在每次调工具前先输出一句「我为什么调这个」，你调试时能一眼看出它哪步判断错了。\n- 最常踩的坑：跳过 Observe——工具返回了结果，但你没把结果好好回填，模型就等于闭着眼睛在猜下一步。\n\n一个查航班的例子，思路是这样走的：\n\n```\nReason:  用户要订最便宜的墨尔本飞悉尼的票，我得先查航班列表。\nAct:     调 search_flights({from: \"MEL\", to: \"SYD\", date: \"2026-08-01\"})\nObserve: 返回 3 个航班，最便宜的是 JQ501，$89。\nReason:  找到最便宜的了，现在需要用户确认再下单。\nAct:     调 confirm_with_user({message: \"JQ501 $89，确认下单？\"})\n```\n\n每一圈都「想清楚—动手—看结果」，错了也能在下一圈纠回来。\n\n---\n\n## 常见坑\n\n**坑一：工具没做幂等，重试就重复副作用。** 网络抖一下、模型重试一次，`create_order` 被调了两遍，用户下了两个单。给有副作用的工具加个幂等键（比如 `idempotency_key`），同一个 key 只生效一次。\n\n**坑二：失败只返回 `\"error\"`。** 模型收到光秃秃一个 error，完全不知道该怎么改，只能瞎试或者放弃。要返回**可行动的错误**——告诉它错在哪、怎么改。\n\n**坑三：高风险操作能被直接调用。** 删除、支付、部署这类不可逆操作，如果模型能直接调，一旦它判断错就是事故。这类工具必须卡一道人工确认，或者拆成「先预演、再执行」两步。\n\n对比一下坏错误和好错误：\n\n```json\n// ❌ 模型读完一脸懵，不知道怎么办\n{ \"error\": \"invalid input\" }\n\n// ✅ 可行动的错误：错在哪 + 怎么改\n{\n  \"error\": \"invalid_date_format\",\n  \"message\": \"date 必须是 YYYY-MM-DD 格式，你传的是 '2026/8/1'\",\n  \"fix\": \"改成 '2026-08-01' 再试一次\"\n}\n```\n\n第二种错误里，模型直接知道下一步改 `date` 的格式重调就行——这就是「可自我修正的错误返回」。\n\n---\n\n## 给工具设计防错边界\n\n把上面的坑反过来，就是三条工具设计准则：\n\n1. **执行前确认**：高风险操作返回一个「待确认」状态，等人工点头（或再一轮模型确认）才真执行。\n2. **参数校验**：在函数真正跑之前先校验参数，不合法就返回结构化的可行动错误，别让脏参数进到核心逻辑。\n3. **可自我修正的错误返回**：错误里带上 `message` 和 `fix`，让模型下一轮能自己改对，而不是卡死。\n\n这三条不是锦上添花，是让 Agent 从「demo 能跑」走向「敢放上生产」的分界线。\n\n---\n\n## 动手：为一个 Agent 设计 3 个工具\n\n给一个「个人日程助手」Agent 设计 3 个工具，每个都写清 description + schema，并想清楚它的防错边界。我给你打个样，第一个我写完整，后两个你照着补：\n\n```json\n[\n  {\n    \"name\": \"list_events\",\n    \"description\": \"查询指定日期范围内的日程。用于用户问『我明天有什么安排』这类只读查询。\",\n    \"input_schema\": {\n      \"type\": \"object\",\n      \"properties\": {\n        \"start_date\": { \"type\": \"string\", \"description\": \"起始日期 YYYY-MM-DD\" },\n        \"end_date\":   { \"type\": \"string\", \"description\": \"结束日期 YYYY-MM-DD\" }\n      },\n      \"required\": [\"start_date\", \"end_date\"]\n    }\n  }\n  // TODO 你来补：\n  // 2. create_event —— 有副作用，记得想幂等 + 参数校验\n  // 3. delete_event —— 高风险，记得设执行前确认\n]\n```\n\n补的时候问自己三个问题：description 够不够让模型「一眼知道什么时候用它」？schema 有没有把非法参数挡在门外？有副作用/高风险的工具，防错边界设了没？\n\n---\n\n## 小结\n\n- 一次工具调用是个闭环：**模型出意图 → 运行时执行 → 结果回填 → 模型继续**，模型自己从不执行代码。\n- 模型选对工具靠三样：**清晰的 description、明确的参数 schema、克制的工具数量**。含糊的 description 是选错工具的头号原因。\n- **ReAct**（想—做—看）让 Agent 每步都可追、错了能纠。\n- 三个必防的坑：**没做幂等**（重试重复副作用）、**只返回 error**（模型没法改）、**高风险操作能直调**（该加人工确认）。\n- 工具设计的三条边界：**执行前确认、参数校验、可自我修正的错误返回**——这是从 demo 到生产的分界线。\n\n下一步，试着把你现在用的某个 Agent（哪怕是 Claude Code 里的一个自定义工具）的 description 拿出来读一遍：如果你自己都要猜它什么时候该被调用，那模型也在猜。\n"},{"path":"ai-engineer/multi-agent-orchestration.md","label":"新建 · Multi-Agent 编排","md":"前两章我们聊了单个 Agent 是怎么跑起来的（Agent Fundamentals），也聊了它怎么调工具（Agent Tool Use）。这一章往前一步：当一个 Agent 扛不动一整个任务的时候，你怎么把它拆成一群 Agent 协作。\n\n我先说结论，省得你读到最后才发现——**多 Agent 不是越多越好**。它是把一个大任务切开、分给几个专职小弟去干，然后有个头儿把结果拼回来。听着很美，代价也实打实。什么时候该拆、怎么拆、拆了怎么收场，这章讲清楚。\n\n## 为什么要懂 / 不懂会怎样\n\n2026 年你手上的工具——Claude Code、Cursor、Codex CLI——早就不是「你问一句它答一句」了。它们能自己开子任务、自己调工具、自己跑一长串活。你迟早会遇到一个任务大到单个 Agent 上下文塞不下，或者它干着干着就跑偏、把前面做的事忘了。\n\n不懂多 Agent 编排的人，遇到这种情况只会一个劲儿往一个 Agent 里塞更多指令、更多上下文，结果就是它越来越糊涂、输出越来越水。懂的人知道：这时候该把活拆开，让每个 Agent 只盯自己那一小块。\n\n反过来也一样。有人学了这套就上头，什么破事都要拆五个 Agent，结果 token 烧成三倍、协调乱成一团、还多出好几个能出错的地方。这也是不懂——不懂什么时候**不该**拆。\n\n## 编排者 + 工作者：核心模式\n\n最常见、最好用的一个模式，叫**编排者 + 工作者**（Orchestrator + Workers）。\n\n打个生活里的比方。你开一家小餐馆，来了个大订单。主厨（编排者）不亲自炒每一道菜，他干的是：看订单、把菜拆开、凉菜交给凉菜师傅、热菜交给炒锅、甜点交给点心师，最后菜都好了他检查装盘、一起出。每个师傅只管自己那口锅，不用管别人在忙啥。\n\n放到 Agent 上就是这样：\n\n```\n                  ┌─────────────────┐\n                  │   编排者 Agent    │\n                  │  Orchestrator    │\n                  │ ① 拆任务          │\n                  │ ② 分派            │\n                  │ ④ 汇总/收尾       │\n                  └───┬────┬────┬────┘\n             分派 ↓    ↓    ↓\n        ┌─────────┐┌─────────┐┌─────────┐\n        │ Worker A ││ Worker B ││ Worker C │\n        │ 调研     ││ 写方案   ││ 审校     │\n        │(专职+专用工具)         │         │\n        └────┬────┘└────┬────┘└────┬────┘\n             └──────────┴──────────┘\n                   结果回传 ③\n                        ↓\n                  编排者汇总成最终产物\n```\n\n编排者本身不干具体的脏活，它的价值全在**拆、派、拼**这三件事上。工作者只干一件事，干完把结果甩回去。\n\n**术语：编排者（Orchestrator）**\n- 一个负责拆任务、分派、收结果的 Agent，自己不做具体执行。\n- 像餐馆主厨——不炒菜，但决定谁炒哪道、最后统一装盘。\n- 工作中：给它一个复杂目标，让它自己判断切成几块、每块派给谁。\n- 最常踩的坑：让编排者又拆活又亲自下场干活，角色混了，上下文照样炸。\n\n**术语：工作者（Worker）**\n- 只负责一个专职子任务的 Agent，有自己的 system prompt 和自己那套工具。\n- 像专职师傅——凉菜师傅不碰炒锅，只把凉菜做到最好。\n- 工作中：给它一块界限清楚的活 + 只给它需要的工具，别把全套工具都塞给它。\n- 最常踩的坑：给的任务边界模糊，工作者不知道自己该管到哪，越界去动别人的活。\n\n## 拆多 Agent 到底图什么\n\n值得拆的三个真实理由：\n\n**1. 上下文隔离。** 每个工作者只带自己那一摊的上下文，互不污染。调研 Agent 的一堆搜索结果，不会挤进写方案 Agent 的脑子里干扰它。这是拆分最大的好处——你等于给每个子任务开了一块干净的白板。单 Agent 干到后面上下文一团乱，就是因为所有东西都堆在一块了。\n\n**2. 专职专用。** 不同工作者可以有完全不同的 system prompt 和工具集。审校 Agent 的 prompt 可以专门写「你是个挑刺的编辑，只找逻辑漏洞和事实错误」，还只给它读文件的工具、不给它写文件的权限。这种专门化，单个万能 Agent 做不到——你没法让一个 prompt 同时既是热情的调研员又是刻薄的审校。\n\n**3. 可并行。** 互不依赖的子任务可以同时跑，省时间。三个 Worker 一起动，墙上时钟只走一份活的时间。\n\n## 串行 vs 并行：哪些能同时跑\n\n这是拆活时最关键的判断：**子任务之间有没有依赖。**\n\n- **能并行**：任务 A 和任务 B 谁都不用等谁。比如「调研竞品 X」和「调研竞品 Y」——两个 Worker 同时开跑，互不相干。\n- **必须串行**：后一个任务的输入，是前一个任务的输出。比如「写方案」必须等「调研」出结果才能开始，「审校」又必须等「方案」写完。这条线只能一个接一个来。\n\n```\n串行（有依赖，只能排队）：\n  调研 ──→ 写方案 ──→ 审校 ──→ 交付\n\n并行（无依赖，可同时）：\n  ┌─→ 调研竞品 A ─┐\n  ├─→ 调研竞品 B ─┤──→ 编排者汇总\n  └─→ 调研竞品 C ─┘\n```\n\n现实里往往是混着的：先并行调研三家竞品，汇总后再串行地写方案、审校。编排者要做的就是画出这张依赖图，能并的并、该串的串。\n\n## 代价与取舍：先别急着拆\n\n现在说重话。多 Agent 不是免费的，每多一个 Agent 你就多付三笔账：\n\n- **多一份 token 成本**——每个 Agent 都要吃自己的 system prompt、自己的上下文，编排者还要花 token 去拆去拼。三个 Worker + 一个编排者，token 账单可能比单 Agent 干完翻好几倍。\n- **多一层协调复杂度**——谁传给谁、结果什么格式、怎么合并，这些都得你设计好，出问题也更难排查。\n- **多一个出错点**——四个 Agent 就有四个可能失败的地方，任何一个抽风都会拖垮整条链。\n\n所以关键那句话——**先问：这些子任务能独立完成吗？**\n\n如果子任务耦合得很紧、彼此要共享一大堆上下文，那拆开反而更糟：你得把同一份上下文复制给每个 Worker（token 更贵），Worker 之间还要来回传信息对齐（更慢更容易错）。这种时候，**单个 Agent 一口气干完，往往又快又省**。\n\n一句糙话记住：**能一个人顺手干完的活，别硬拉三个人开会。**\n\n## 交接、汇总，和某个 Worker 挂了怎么办\n\n**交接（handoff）**：Worker 把结果甩回编排者时，格式要固定。别让它随便回一大段散文，最好约定好结构——比如「调研 Worker 只回一个要点列表」。这样编排者拼起来才不费劲。\n\n**汇总**：编排者拿到几份结果后，不是简单拼接，而是要做整合——去重、对齐口径、把矛盾的地方标出来。这一步做不好，多 Agent 的产出会显得像几个人各写各的、拼在一起很分裂。\n\n**Worker 失败怎么办**：这是新手最容易漏的。真实世界里 Worker 会挂——搜不到东西、超时、输出跑偏。编排者要有预案：\n\n- **能重试的重试**：短暂失败（超时、限流）就让它再跑一次。\n- **能降级的降级**：三家竞品调研挂了一家，先拿另外两家的结果往下走，标注「竞品 C 缺失」，别整条链卡死。\n- **必须叫停的叫停**：如果挂的是关键前置（调研全挂了，方案没法写），就停下来报错，别硬着头皮让下游 Worker 凭空编。\n\n## 落地：用 Claude Code sub-agents 拆一个任务\n\n2026 年这套东西你不用自己从零搭，Claude Code 的 sub-agents 就是现成的编排者 + 工作者。你（或主 Agent）当编排者，派子任务给 sub-agent，它们各自带独立上下文去跑，跑完把结果回给你。\n\n拿一个典型任务：「调研某个技术方案 + 写一份选型建议 + 审校」。你可以这样拆：\n\n```\n主 Agent（编排者）\n  │\n  ├─ 派 sub-agent「调研员」\n  │     system prompt: 只搜集事实和数据，不下结论\n  │     工具: 搜索、读网页\n  │     产出: 一份要点清单\n  │\n  ├─（等调研回来，串行）派 sub-agent「方案作者」\n  │     输入: 调研清单\n  │     产出: 选型建议草稿\n  │\n  └─（等草稿，串行）派 sub-agent「审校」\n        system prompt: 挑逻辑漏洞和没依据的断言\n        工具: 只读\n        产出: 修改意见\n  ↓\n主 Agent 汇总三方结果，出最终建议\n```\n\n注意这里三个子任务是**串行**的（每个都依赖上一个）。但如果你要调研的是五个方案，那「调研这五个」就可以并行开五个 sub-agent 同时跑，全回来了再进入串行的写作阶段。\n\n关键设计动作就三个：给每个 sub-agent **界限清楚的活**、**只给它需要的工具**、**约定好回传格式**。做到这三点，编排就顺了。\n\n## 常见坑\n\n- **为拆而拆**：任务本来单 Agent 五分钟搞定，非要拆四个，结果慢一倍贵三倍。拆之前先问「能独立吗」。\n- **编排者亲自下场干活**：角色混了，上下文照样爆。编排者就管拆派拼，别抢 Worker 的活。\n- **工作者边界模糊**：没说清 Worker 该管到哪，它要么越界要么漏活。\n- **不处理失败**：默认每个 Worker 都会成功——真上线一个 Worker 挂了整条链崩，还找不到是谁挂的。\n- **交接格式随意**：Worker 回一大段散文，编排者拼得七荤八素。回传格式要提前约定。\n\n## 小结\n\n多 Agent 编排的核心就一句：**把一个大任务拆成几个专职小活，用编排者管拆派拼，用工作者各干一摊。**\n\n拆的三个理由是上下文隔离、专职专用、可并行；代价是更贵、更复杂、更多出错点。所以每次动手前，先问那句灵魂拷问——**这些子任务能独立完成吗？** 能，就拆，享受隔离和并行的好处；不能（耦合紧、要共享大量上下文），就老老实实用单 Agent，反而更快更省。\n\n依赖决定串并行：谁不等谁就并行，谁要吃谁的输出就串行。别忘了给 Worker 失败留预案——能重试重试、能降级降级、该叫停叫停。落到手上的活，用 Claude Code sub-agents 就能直接练：界限清楚、工具精简、格式约定好，三件事做到，一个人也能指挥一支 Agent 小队。\n"},{"path":"vibe-coding/ai-code-security.md","label":"新知识 · AI 代码安全","md":"上周我让 Claude Code 帮我写一个给用户发验证短信的接口，它几秒钟就吐出一整段能跑的代码。我扫了一眼，逻辑对、能编译、测试也过了，差点就 commit 了。结果眼角瞥到一行：`const TWILIO_TOKEN = \"SK3f9a...\"`——它把我的真实 token 直接写进了源码，还顺手 import 了一个我从没听过的包 `twilio-sms-helper`。\n\n这两个细节，一个会让密钥泄进 git 历史里再也拿不回来，另一个可能是攻击者抢注的恶意包。**代码能跑，不代表它安全。** 这一章讲的就是：AI 写代码时最爱埋的几类安全坑，以及你在合并前怎么一个个堵掉。\n\n为什么非得你自己懂？因为 AI 不对安全后果负责，你负责。出了事被 review 打回、密钥泄露上新闻、公司被拖库，落在谁头上很清楚。AI 是个手速极快但不长记性的实习生，你得当那个把关的人。\n\n## 坑一：硬编码密钥\n\n这是最常见、也最致命的一个。你让 AI 写调用某个 API 的代码，它为了「能直接跑」，经常把 key、token、数据库密码直接写进代码里，或者写进给你看的示例里。\n\n```python\n# ❌ AI 经常这么写——key 直接进源码\nimport stripe\nstripe.api_key = \"sk_live_51H8xY2eZvKf...\"\n\ndef charge(amount):\n    return stripe.Charge.create(amount=amount, currency=\"aud\")\n```\n\n问题不只是「不好看」。一旦这行代码被 commit，**git 历史会永久记住它**——就算你下一个 commit 删掉，`git log -p` 还是能翻出来。密钥一旦进了远程仓库，唯一安全的处理是：立刻去平台后台吊销并重新生成，而不是删代码假装没发生。\n\n正确做法是把密钥挪到环境变量或密钥管理服务：\n\n```python\n# ✅ 从环境变量读，源码里不出现真实值\nimport os\nimport stripe\nstripe.api_key = os.environ[\"STRIPE_API_KEY\"]\n\ndef charge(amount):\n    return stripe.Charge.create(amount=amount, currency=\"aud\")\n```\n\n配合 `.gitignore` 把 `.env`、`*.pem`、`config.local.*` 这类文件挡在 git 外面。2026 年主流做法已经是云端密钥管理（Vault、云厂商的 Secrets Manager、或平台内置的加密环境变量），本地开发用 `.env` + `.env.example`（example 里只放占位符）。\n\n> **术语：密钥管理（Secrets Management）**\n> - 把 API key、token、密码这类敏感字符串集中存放、加密、按需下发，而不是散落在代码里。\n> - 就像家里的贵重物品不放在门口鞋柜上，而是锁进保险箱，用的时候才拿。\n> - 工作中：代码只写 `os.environ[\"X\"]` 这样的「取件凭证」，真实的值放在 `.env`（本地）或密钥服务（生产），部署时注入。\n> - 最常踩的坑：把 `.env` 忘了加进 `.gitignore`，一 push 全泄了；或者以为「删掉那行 commit」就安全了——其实 git 历史里还在，必须吊销重发。\n\n## 坑二：注入类漏洞——AI 常忘了校验输入\n\nAI 生成 CRUD、查询、拼接命令的代码时，经常直接把用户输入拼进 SQL、HTML 或 shell 命令里，因为「拼字符串」是最短的能跑通的写法。但这正是 SQL 注入、XSS、命令注入的温床。\n\n看一个典型的坏例子：\n\n```javascript\n// ❌ 用户输入直接拼进 SQL——经典 SQL 注入\napp.get(\"/user\", (req, res) => {\n  const name = req.query.name;\n  db.query(`SELECT * FROM users WHERE name = '${name}'`, (err, rows) => {\n    res.json(rows);\n  });\n});\n```\n\n如果有人传 `name = ' OR '1'='1`，这条 SQL 就变成了「返回所有用户」；再狠一点还能删表。修法是用参数化查询，让数据库自己处理转义，输入永远只被当数据、不被当代码：\n\n```javascript\n// ✅ 参数化查询——输入被当成纯数据，注入不了\napp.get(\"/user\", (req, res) => {\n  const name = req.query.name;\n  db.query(\"SELECT * FROM users WHERE name = ?\", [name], (err, rows) => {\n    res.json(rows);\n  });\n});\n```\n\nXSS 同理——把用户输入直接 `innerHTML` 进页面就会执行其中的 `<script>`，正确做法是用 `textContent` 或框架自带的转义（React 的 `{}` 默认转义，别乱用 `dangerouslySetInnerHTML`）。命令注入也一样——别用字符串拼 shell 命令，用能接收参数数组的 API（如 Node 的 `execFile`、Python 的 `subprocess.run([...])`）。\n\n> **术语：参数化查询（Parameterized Query / Prepared Statement）**\n> - 把 SQL 语句结构和用户传的值分开发给数据库，值永远只当数据处理，不会被解析成 SQL 命令。\n> - 好比填表格：表格的格子（语句结构）是固定印好的，用户只能往格子里写字，改不了表格本身。\n> - 工作中：凡是用户输入进 SQL，一律用 `?` / `$1` / 命名占位符 + 参数数组，不用字符串模板拼。\n> - 最常踩的坑：以为「我自己写个函数把引号转义掉就行」——手写转义总有漏，参数化才是标准解，交给驱动去做。\n\n## 坑三：幻觉依赖包 / slopsquatting（重点，很多人不知道）\n\n这个坑最阴，因为它伪装成「AI 帮你省事」。AI 会**编造出根本不存在的包名**——比如它记得有个处理日期的库，就自信地让你 `npm install date-formatter-pro` 或 `pip install requests-helper`，但这个包压根不存在。\n\n单纯装不上还好，问题在于：攻击者知道 AI 爱编哪些名字，就**提前把这些幻觉包名抢注到 npm / PyPI 上，塞进恶意代码**。你照着 AI 的建议一装，恶意包就进了你的机器和项目。这个手法叫 slopsquatting。\n\n```bash\n# ❌ AI 建议的包，看着很合理，但可能根本不是官方的\nnpm install react-form-validator-easy\npip install fastapi-auth-toolkit\n```\n\n装之前，花三十秒核对：\n\n1. **去官方 registry 搜一下**——npmjs.com / pypi.org 上有没有这个包，是不是你以为的那个。\n2. **看下载量和维护状态**——一个几周前才发布、周下载量个位数、却声称是「流行库」的包，高度可疑。\n3. **点进它的仓库**——有没有真实的 GitHub 源、star、issue、提交历史；有没有官方文档链接。\n4. **对不上就别装**——很多时候 AI 想要的功能，标准库或你已装的主流库就能做，让 AI 换成真实存在的方案。\n\n> **术语：slopsquatting**\n> - 攻击者抢注「AI 常编造出来的假包名」，塞进恶意代码，等着有人照 AI 建议去安装。\n> - 就像有人发现导航软件老把你导到一条不存在的街，于是真去那条街盖了个假店等你上门。\n> - 工作中：AI 让你装任何不熟悉的包，先去官方 registry 核实真实性、看下载量和仓库，再决定装不装。\n> - 最常踩的坑：看包名「很合理」就直接 `install`——名字合理恰恰是攻击者精心设计的，合理 ≠ 真实。\n\n## 坑四：依赖与 license 合规\n\nAI 拉进来的库，除了可能不存在，还可能带着**不兼容的开源协议**。它不会替你判断 GPL、AGPL 这类「传染性」协议会不会逼你的商业闭源项目也得开源。它只管功能对不对，不管法务能不能过。\n\n合并新依赖前，扫一眼它的 license 字段（`package.json` 的 `license`、PyPI 页面的 License 分类）。团队里最好接一个自动扫描（很多平台的 CI 有依赖 license 检查），别等产品上线了才发现引了个不能商用的库。同理，AI 直接「借鉴」某段网上代码贴进你项目时，也要留意那段代码本身的授权。\n\n## 坑五：「看起来对」不等于安全\n\n前面几类是具体的洞，这一类是心态：AI 代码能编译、能跑、测试也绿，都不代表它没洞。安全问题往往不会让程序崩溃——它安安静静地等着被利用。所以每次合并 AI 代码，过一遍这份人工复核清单：\n\n- [ ] 有没有硬编码的密钥、token、密码、内网地址？\n- [ ] 所有用户输入进 SQL 都参数化了吗？进 HTML 都转义了吗？进 shell 都用参数数组了吗？\n- [ ] 新装的每个包都在官方 registry 核实过真实性、下载量、仓库了吗？\n- [ ] 权限校验有没有做？这个接口该不该验登录、验角色、验资源归属？\n- [ ] 错误信息会不会把堆栈、SQL、内部路径直接吐给用户？\n- [ ] 敏感操作（付款、删数据、改密码）有没有日志和二次确认？\n- [ ] 依赖的 license 跟项目商用要求兼容吗？\n\n## 实操：让 AI 先自查，你再人工复核\n\n好消息是，AI 也能帮你查它自己埋的坑——只要你明确要求。写完一段代码后，别急着合并，先让它做一轮自审：\n\n```\n请以安全审查者的身份复核你刚才生成的代码，逐条检查并指出：\n1. 是否有硬编码的密钥 / token / 密码 / 敏感地址\n2. 所有用户输入是否做了校验和转义（SQL 注入 / XSS / 命令注入）\n3. 引入的每个第三方包是否真实存在、是否为官方维护（我会去 registry 核对）\n4. 是否缺少权限 / 身份校验\n5. 错误处理是否会泄露内部信息\n对每一条：说明有没有问题、在哪一行、给出修复后的代码。\n```\n\nClaude Code / Cursor / Codex CLI 都能接这类 prompt，很多时候它自己就把硬编码密钥和缺校验揪出来了。但**AI 自查只是第一道筛子，不是终点**——它可能漏、也可能对自己编的幻觉包过度自信。所以自审之后，你再拿上面那份人工清单过一遍，尤其是「包是否真实存在」这条，必须你自己去 registry 眼见为实。\n\n## 常见坑\n\n- **以为「删掉那行 commit」密钥就安全了**——git 历史抹不掉，唯一正解是吊销重发。\n- **信 AI 说「这个包很流行」**——它会对自己编的名字很自信，一切以官方 registry 为准。\n- **手写转义代替参数化查询**——手写总有漏网的边界，参数化才是标准答案。\n- **测试过了就当没洞**——安全洞通常不影响功能，测试绿灯跟安全没关系。\n- **只查自己写的、不查 AI 一键生成的**——恰恰是你没细看的那几百行最容易埋坑。\n\n## 小结\n\nAI 写代码快，但把关的人还是你。记住这几个高频坑：密钥别进源码（进了就吊销重发）、用户输入一律参数化 + 转义、每个新包都去官方 registry 核实真实性防 slopsquatting、留意 license 合规。合并前让 AI 先自查一轮，再拿人工清单过一遍——「能跑」和「安全」是两码事，中间那道防线就是你。\n"},{"path":"vibe-coding/ai-data-privacy.md","label":"新知识 · 数据边界与隐私","md":"## 先讲个我差点翻车的下午\n\n上周三下午，线上有个诡异的 500，我盯着日志看了半天没头绪。顺手把一整段错误日志复制进 Claude Code，让它帮我分析堆栈。粘完的那一秒我心里咯噔一下——那段日志里有几行是完整的请求体，里面躺着一个客户的邮箱、手机号，还有半截 authorization header。\n\n我当时的第一反应不是\"糟了违规了\"，而是更朴素的一个问题：**这段东西现在到底去哪了？会不会被记下来？会不会哪天变成模型训练数据的一部分？** 我答不上来。\n\n这就是这一章想解决的事。你天天在用 Claude Code、Cursor、Codex CLI，把代码、日志、报错、配置一股脑喂进去，效率是真高。但\"喂什么\"这件事，大部分人从来没认真想过边界在哪。\n\n**不懂会怎样？** 轻的是你把公司还没公开的业务逻辑、内部架构喂给了一个你不清楚数据流向的服务；重的是客户 PII、密钥、内部机密流出去，等出了事，追责追到你头上，而你连\"我当时喂了什么、它存了没有\"都说不清。这不是吓唬——这是每个用 AI 写代码的人每天都在做、但很少复盘的动作。\n\n好消息是：这件事的规则其实很朴素，一张清单就能覆盖 90% 的日常判断。我们来把它讲清楚。\n\n---\n\n## 一、红黄绿：喂之前先过一遍这张表\n\n不用背复杂的分类法，你只要在按下回车前，问自己一句：**\"这段东西如果被记下来、被别人看到，我慌不慌？\"** 然后对号入座。\n\n### 🟢 绿灯——基本可以放心喂\n\n- 公开的开源代码、公开文档、Stack Overflow 上就能搜到的东西\n- 你自己写的、不含任何机密逻辑的通用工具函数、算法练习\n- 已经开源或计划开源的项目代码\n- 造出来的假数据、示例数据、公开 API 的示例响应\n\n这类东西本来就在公共领域，喂进去没有额外风险。\n\n### 🟡 黄灯——脱敏 / 处理后才能喂\n\n- 生产日志（几乎一定夹着真实数据，见开头那个坑）\n- 含真实数据库 schema、表结构、字段命名的东西（字段名本身可能泄露业务）\n- 内部但不算最高机密的代码（把里面的真实域名、内部服务地址、员工信息换掉再喂）\n- 带真实用户样本的测试数据\n\n黄灯的意思不是\"不能喂\"，是\"喂之前先动手把敏感部分替换掉\"。下面第四节专门讲怎么脱敏。\n\n### 🔴 红灯——绝对不喂，任何情况\n\n- **密钥、token、密码、私钥、连接串**——这是铁律，任何 AI、任何 git、任何截图都不进\n- **客户 / 用户的个人信息（PII）**：真实姓名、身份证、邮箱、手机、地址、支付信息\n- **公司核心机密**：未公开的算法、定价模型、合同条款、财务数据、并购信息\n- **受合规约束的敏感数据**：医疗、金融、政府类数据（这类往往有硬性法规管着）\n- **未公开的业务逻辑**：那些\"我们凭这个吃饭\"的核心 know-how\n\n红灯的东西，哪怕只是\"让 AI 帮我看一眼\"，也不要。\n\n> 一个简单的心法：**绿灯 = 本来就公开的；红灯 = 泄露了拿不回来的；黄灯 = 处理一下就能降到绿灯的。** 拿不准的一律当黄灯处理，脱敏后再说。\n\n---\n\n## 二、同一个工具，不同版本，数据待遇可能完全不同\n\n这是最多人踩的认知坑：**\"我用的是 Claude Code，我同事也用 Claude Code，那我俩的数据处理方式一样\"——不一定。**\n\n同一个 AI 工具，个人版和企业版、免费和付费、不同订阅层级，在这三件事上可能有本质区别：\n\n1. **你的输入会不会被用于改进 / 训练模型**——有的版本默认会用，有的默认不会，有的可以在设置里关。\n2. **数据存在哪、存多久**——有的按区域存储，有的有明确的保留期和删除承诺。\n3. **数据驻留（data residency）在哪个区域**——你的数据落在澳洲、美国还是别处，对企业合规可能是硬指标。\n\n### 术语四行模板：数据驻留（Data Residency）\n\n- **一句话**：你的数据物理上存放在哪个国家 / 区域。\n- **为什么你要在意**：有些企业、有些行业要求数据必须留在澳洲境内，跨境存储可能直接违反公司 policy。\n- **常见误区**：以为\"云服务嘛数据在哪都行\"——对合规敏感的公司，区域是能一票否决的硬条件。\n- **怎么查**：看你所用工具那个具体版本的官方条款里\"data residency / storage location\"章节，别猜。\n\n**关键提醒：我不替你下结论。** 我不会告诉你\"Cursor 的免费版会不会拿你代码训练\"或者\"Codex CLI 数据存几天\"——因为这些条款会变，各家写法不同，各订阅层不同，我编一个具体数字给你反而害了你。\n\n**你该做的是**：打开你正在用的那个工具、那个具体版本的官方隐私条款 / 数据处理说明，重点看三段——(1) 会不会用于训练；(2) 存储区域；(3) 保留期。花十分钟看一次，比背任何清单都管用。企业环境里，这一步往往你们 IT / 法务已经审过了，直接去问他们要结论。\n\n---\n\n## 三、澳洲 / 企业环境：多一层意识，但别自己当律师\n\n如果你在澳洲、或者在给企业客户做项目，客户数据这件事要额外上心。\n\n定性地说，你需要有这么几条基本意识：\n\n- **客户数据不是你的**——你只是替客户处理它，把它喂给第三方 AI 服务，本质上是把客户数据交给了另一个你可能没授权的地方。\n- **PII 要格外小心**——澳洲对个人信息的处理是有明确监管的，企业客户往往在合同里就写了数据怎么用、能不能出境。\n- **合同 / NDA 可能直接禁止**——很多企业项目的合同里有条款限制数据流向第三方工具，你把客户代码喂 AI 之前，这条得先确认。\n\n### 但是——这里划一条硬边界\n\n**我不做法律建议，这一章也不给你任何具体法规条款、罚款数字或公司案例。** 原因很简单：合规是真金白银的事，条款会更新、行业有差异、你的具体情形我不了解，我编一个\"根据某某法第几条罚多少\"给你，你照着做出了事，责任担不起。\n\n所以涉及合规，标准答案永远是这一句：\n\n> **\"具体能不能这么用，问你自己公司的 policy 和法务 / 合规团队。\"**\n\n这不是推卸，这是对的做法。在企业里，\"我用 AI 之前先确认了公司 AI 使用 policy\" 本身就是专业度的体现。很多公司已经有明确的《AI 工具使用规范》，你第一件事应该是去找它、读它。\n\n---\n\n## 四、脱敏：把黄灯降成绿灯的手艺\n\n大部分\"想喂但不敢喂\"的场景，脱敏都能解决。核心思路一句话：**把真实的敏感信息，换成结构一样、内容假的占位，再喂给 AI。**\n\n### 术语四行模板：脱敏（Data Masking / Sanitization）\n\n- **一句话**：把数据里的敏感部分替换成假的、无法反推真实值的内容，但保留它的结构和格式。\n- **为什么你要在意**：AI 需要的是\"结构和逻辑\"来帮你 debug，它并不需要真实的客户邮箱——所以真实值完全可以换掉。\n- **常见误区**：以为\"改几个字符\"就行——`zhang@abc.com` 改成 `zhang@xyz.com` 还是能认出人，脱敏要换成完全无意义的 `user@example.com`。\n- **怎么做**：见下面这张对照。\n\n| 真实数据 | 脱敏后 |\n|---|---|\n| `sk-live-9f3a...`（密钥） | `sk-xxxxxxxx`（占位，甚至整段删掉） |\n| `zhang.wei@client.com.au` | `user@example.com` |\n| `+61 4xx xxx xxx`（真实手机） | `+61 400 000 000` |\n| 真实客户名 `Acme 矿业` | `ClientCo` |\n| 内部服务地址 `internal-api.corp.local` | `api.example.internal` |\n| 生产数据库真实记录 | 手工造 2-3 条假记录，格式一样 |\n\n**实操习惯**：日志类的东西，先在本地文本编辑器里用查找替换把敏感字段清一遍，再复制进 AI。别嫌麻烦——开头那个下午如果我先做这一步，就不会有那声\"咯噔\"。\n\n有一个反直觉但重要的点：**脱敏之后，AI 帮你解决问题的能力几乎不打折。** 它需要的是\"有个字段格式不对\"\"这里空指针了\"这种结构信息，真实的客户是谁它根本不关心。所以脱敏不是\"为了合规牺牲效率\"，是\"几乎零代价拿到安全\"。\n\n---\n\n## 五、什么时候该考虑私有 / 本地部署\n\n如果你的项目敏感到\"连脱敏后都不放心往外发\"，那就该考虑把 AI 拉到你自己可控的环境里。定性地讲，有这么几档选择：\n\n### 术语四行模板：私有部署（Private / Self-hosted Deployment）\n\n- **一句话**：把模型跑在你自己的服务器 / 内网 / 本地机器上，数据不出你的边界。\n- **为什么你要在意**：对最敏感的项目，\"数据不离开公司网络\"可能是唯一能过合规的方案。\n- **常见误区**：以为\"本地跑的模型一定更笨\"——现在能本地跑的开源模型对很多编码任务已经够用，敏感项目值得这个取舍。\n- **怎么选**：跟你们 IT / 平台团队谈，这通常不是个人能拍板的事。\n\n几种典型形态（由轻到重）：\n\n- **企业网关 / 代理**：公司统一接一个企业版入口，走审计、走脱敏管道，员工不直接接触外部服务。企业里最常见。\n- **自托管开源模型**：在公司自己的机器上跑开源模型，数据完全不出内网。\n- **敏感项目断网用法**：极端场景下，某些项目直接规定\"在隔离环境 / 断网机器上用本地模型\"，一点数据都不外流。\n\n个人开发者一般用不到最重的那档，但你至少要知道\"有这条路\"——当遇到一个\"这数据真的一点都不能出去\"的项目时，答案不是\"那就别用 AI 了\"，而是\"换成本地 / 私有部署\"。具体怎么落地，交给你们平台 / IT 团队，别自己硬上。\n\n---\n\n## 常见坑\n\n- **\"内部代码应该没事吧\"**——内部 ≠ 可以外发。内部代码里常藏着真实域名、内部服务名、账号，甚至注释里的业务机密。喂之前当黄灯处理。\n- **\"我删掉密钥再发\"结果删漏了**——密钥经常不止一处（配置里一个、日志里又一个、注释里还有一个）。养成\"密钥类整段清空\"的习惯，别逐个找。\n- **把工具的版本混为一谈**——个人版的数据处理方式，不能想当然套到企业版上，反之亦然。用哪个版本就查哪个版本的条款。\n- **拿 AI 当法务**——包括我在内的任何 AI，都不该是你的合规依据。合规问题回到公司 policy 和法务。\n- **脱敏改一半**——把 `client.com` 改成 `client2.com` 不叫脱敏，还是能认出来。要换成彻底无意义的占位。\n- **截图也是外发**——不只是复制粘贴文本，把带敏感信息的截图丢给多模态 AI 一样是把数据送出去了。\n\n---\n\n## 小结\n\n- 按下回车前先问一句：\"这东西泄露了我慌不慌？\" 慌 → 红灯或黄灯。\n- **红灯铁律**：密钥、PII、核心机密，任何情况都不喂、不进 git、不截图。\n- **黄灯常态**：日志、内部代码、真实测试数据——脱敏后再喂，成本极低、效果几乎不打折。\n- 同一工具不同版本的数据待遇可能完全不同，用哪个就去读哪个的官方条款（训练 / 存储区域 / 保留期这三段）。\n- 合规问题一律回到**公司 policy 和法务**，不靠 AI、不靠记忆里的法条。\n- 敏感到脱敏都不够 → 考虑企业网关 / 私有 / 本地部署，交给 IT 团队落地。\n\n**今天就动手的一件事**：给你自己或团队写一张《AI 使用数据红线》清单，三档就够：\n\n```\n绝不进 AI：密钥/token/密码、客户PII、公司核心机密、合规敏感数据\n脱敏后可进：生产日志、内部代码、真实schema、真实测试数据（换假值再喂）\n随便用：公开代码、开源库、假数据、已开源项目\n```\n\n把它贴到团队 wiki，新人第一天就发给他。有了这张表，\"能不能喂 AI\" 这个问题，团队里每个人都能在三秒内自己答出来——这比任何事后的追责都值钱。\n"},{"path":"vibe-coding/ai-legacy-codebase.md","label":"新知识 · 遗留代码库用 AI","md":"## 先讲个我踩过的坑\n\n我第一次在公司老项目上用 Claude Code，信心满满。项目是个跑了三年的后端，二十几万行。我让它\"给订单接口加一个折扣字段\"，听起来是个五分钟的活。\n\n它确实动手了——很快。然后我一看 diff：它顺手把一个共用的日期格式化函数从 `dayjs` 换成了 `date-fns`，理由是\"date-fns 更现代\"。这个函数被四十多个地方引用，其中有几个隐晦的时区处理逻辑。测试当时没覆盖到那几处，CI 绿了，我也 merge 了。结果第二天财务那边报账单时间全错了一小时。\n\n问题不在 AI 笨。问题在于**我把它当成在绿地上写新代码的助手，而它面对的其实是一片雷区**。这一章就是讲怎么避免这种事。\n\n## 绿地和遗留，根本不是一回事\n\n你在 YouTube、在大部分教程里看到的 AI 编程，几乎全是**绿地（greenfield）**——空文件夹，从零开始，\"帮我做个 Todo App\"。AI 在这种场景下表现惊艳，因为没有任何历史包袱，它想怎么写就怎么写。\n\n但你上班第一天打开的，几乎一定是**遗留（legacy）代码库**——已经有人写了几个月甚至几年、正在生产上跑、你只懂其中一小块。两者的区别是本质性的：\n\n| | 绿地项目 | 遗留项目 |\n|---|---|---|\n| 上下文 | 几乎没有，你说了算 | 巨大，且大半没写在文档里 |\n| 约定 | 你现定 | 已经定死，且经常是隐性的 |\n| 改动影响 | 影响你自己 | 牵一发动全身 |\n| 能不能大改 | 随便重构 | 不能，改坏了是线上事故 |\n\n**这就是学校/教程和工作之间最大的落差。** 教程教你怎么让 AI 从零造东西，工作却要你让 AI 在一个它（和你）都没完全读懂的系统里做精准的小手术。同样一句\"帮我加个功能\"，在这两种场景下是完全不同难度的任务。\n\n## 关键一步：给 AI 喂对上下文\n\nAI 不是不聪明，是**它默认对你的项目一无所知**。你不告诉它这个项目的架构和雷区，它只能靠猜——猜就会引入新花样。\n\n### 术语：上下文窗口 / 中间遗忘\n\n- **是什么**：模型一次能\"看进眼里\"的文字量就是上下文窗口。塞太多，中间那段它会记不清，这叫\"lost in the middle / 中间遗忘\"。\n- **为什么你要懂**：很多人第一反应是把整个 repo 塞给 AI，觉得\"给得越全越好\"——恰恰相反，塞满了它反而抓不住重点。\n- **不懂会怎样**：AI 前面读的约定，改到后面自己就忘了，风格前后不一。\n- **一句话**：给 AI 的不是越多越好，是**越相关越好**。\n\n所以喂上下文的正确姿势不是\"全量灌\"，是**精准 + 分层**：\n\n**1. 用 `CLAUDE.md` 沉淀项目知识。** 这是最重要的一招。在项目根目录放一个 `CLAUDE.md`，把 AI 每次都该知道的东西写进去，它会自动读。别写废话，写它猜不到的：\n\n```markdown\n# 项目约定（AI 必读）\n\n## 架构\n- 后端 NestJS，DDD 分层：controller → service → repository，禁止跨层调用\n- 数据库改动一律走 migration，禁止直接改 schema\n\n## 雷区（改这些之前先问我）\n- src/utils/datetime.ts：全站时区逻辑，被 40+ 处引用，不要动实现\n- src/legacy/billing/：老计费模块，无测试覆盖，只读不改\n\n## 风格约定\n- 日期统一用 dayjs，不要引入 date-fns / moment\n- 错误处理走 AppException，不要裸 throw new Error\n```\n\n### 术语：CLAUDE.md 项目记忆\n\n- **是什么**：放在项目里的一份 markdown，AI 每次进这个目录都会先读，相当于给它的\"入职手册\"。\n- **为什么你要懂**：它是你把\"隐性约定\"变成\"显性规则\"的唯一低成本方式，一次写，之后每次省心。\n- **不懂会怎样**：你每次对话都要重复交代\"我们用 dayjs 别用别的\"，累且容易漏。\n- **一句话**：项目的隐性知识，一次沉淀进 `CLAUDE.md`，AI 天天记得。\n\n**2. 用 `@` 引用关键文件，而不是全量。** 需要改哪块，就 `@` 点名相关的几个文件，让 AI 聚焦：\n\n```\n帮我在订单里加折扣字段。相关文件：\n@src/order/order.service.ts\n@src/order/dto/create-order.dto.ts\n先读这两个文件，别的地方不要碰。\n```\n\n**3. 让它先读懂再动手。** 大项目里，动手前的\"复述\"这一步能救命：\n\n```\n先别写代码。用你自己的话说一遍：\n折扣字段应该加在哪一层、会影响哪些调用方、\n现有的价格计算逻辑在哪个函数里。我确认后你再改。\n```\n\n它复述对了，你才放心；复述错了，说明上下文没喂够，这时候补比改完再返工便宜得多。\n\n**4. 分模块喂，善用 sub-agent（2026）。** Claude Code 现在能开 sub-agent（子代理）帮你分担——比如让一个 sub-agent 专门去\"读懂计费模块的调用关系\"，把总结带回来，主对话不用被这些细节撑爆上下文窗口。大项目里这比一股脑全塞进主对话干净得多。\n\n## 小步安全改造：把 AI 关进笼子里\n\n上下文喂对了，接下来是控制它的**动作范围**。核心就一句：别让它一次改太多。\n\n**动手前先 commit。** 这是最便宜的保险。让 AI 改之前先存档，改坏了一个 `git checkout` 就回来了：\n\n```bash\ngit add -A && git commit -m \"chore: checkpoint before AI change\"\n```\n\n**明确划定禁区。** 在指令里把\"能碰什么、不能碰什么\"说死：\n\n```\n只改 order.service.ts 里的 createOrder 方法。\n不要改函数签名，不要动别的文件，不要加新依赖，\n不要重构任何现有代码——哪怕你觉得它写得不好。\n```\n\n那句\"哪怕你觉得它写得不好\"很关键——AI 特别爱\"顺手优化\"，这正是我开头那个坑的来源。\n\n**每一步都跑测试。** 别攒一大堆改动再验证。改一小块 → 跑测试 → 绿了再下一步：\n\n```bash\nnpm test -- order.service.spec.ts\n```\n\n改动小，出问题时定位范围就小，回滚也不心疼。\n\n## 常见坑\n\n- **把整个 repo 塞给 AI**：以为给得越全越好，结果触发中间遗忘，它反而抓不住重点。给相关的几个文件就够。\n- **不写 `CLAUDE.md`，靠每次对话临时交代**：隐性约定漏一条，AI 就引入一个新依赖。规则该沉淀就沉淀。\n- **让它\"顺便重构一下\"**：在遗留项目里，\"顺便\"两个字是事故之源。加功能就只加功能，重构单独开一次、单独 review。\n- **CI 绿了就 merge**：遗留项目测试覆盖往往有洞（我那次就是），AI 改到没测试覆盖的隐晦逻辑，CI 照样绿。改到雷区文件时人要亲自看 diff。\n- **让 AI 自作主张换技术栈**：它会推荐\"更现代\"的库。老项目要的是一致，不是新潮。`CLAUDE.md` 里把技术选型写死。\n\n## 小结\n\n绿地和遗留是两种活。教程只教前者，工作里全是后者，这个落差你得自己补上。补的方法就三件事：\n\n1. **喂对上下文**——`CLAUDE.md` 沉淀项目知识，`@` 引用相关文件，分模块喂、必要时上 sub-agent，别全量灌导致中间遗忘。\n2. **让它先读懂再动手**——动手前先让 AI 复述理解，错了当场补，不等改完返工。\n3. **小步安全推进**——先 commit，划死禁区（不重构、不换库、不动签名），改一小块就跑一次测试。\n\n一句话记住：在别人的老项目里，AI 是个能力很强但完全不了解情况的新人。你的活不是放手让它跑，是**给它足够的背景、划清边界、盯着每一步**。做到这三点，它就是最好的帮手；做不到，它就是那个把 dayjs 换成 date-fns 的实习生。\n\n## 实操：给一个现有仓库配 AI，安全加一个小功能\n\n找一个你手上真实的、已有一定规模的项目（不是新建的 demo），跟着走一遍：\n\n**Step 1 · 写 `CLAUDE.md`。** 在项目根目录建 `CLAUDE.md`，至少写清三段：架构分层、雷区文件（点名那些\"被很多地方引用、不要乱动\"的）、风格约定（用哪些库、不用哪些库）。\n\n**Step 2 · 起一个 checkpoint。**\n\n```bash\ngit add -A && git commit -m \"chore: checkpoint before AI feature\"\n```\n\n**Step 3 · 让 AI 先读懂。** 挑一个真实的小需求（加个字段、加个校验），`@` 引用相关的 1-3 个文件，让它**先复述**改哪层、影响谁，你确认。\n\n**Step 4 · 划禁区、动手。** 指令里写死：只改哪个文件哪个方法、不重构、不换库、不动签名。让它改。\n\n**Step 5 · 跑测试 + 亲自看 diff。**\n\n```bash\nnpm test\ngit diff\n```\n\n重点扫一眼：它有没有碰你没让它碰的文件？有没有偷偷加依赖？确认干净了再 commit。\n\n走完这一遍，你就有了在任何遗留项目里安全用 AI 的完整套路——这套路比\"会写 prompt\"值钱得多，因为它决定了你敢不敢在真实生产项目上放手用 AI。\n"},{"path":"vibe-coding/when-not-to-use-ai.md","label":"新知识 · 何时不该用 AI","md":"## 先讲个我上周的糗事\n\n上周三下午，我要把一个 config 里 12 个环境变量的命名从 `SNAKE_CASE` 改成 `camelCase`。放在两年前，我会直接上 vim，一个 macro 录下来，`:g` 一跑，20 秒收工。\n\n但那天我鬼使神差地打开了 Claude Code，敲了一句「帮我把这个文件里的环境变量改成 camelCase」。然后它开始读文件、问我要不要连引用一起改、生成 diff、我发现它把一个本来就是 camelCase 的字段也「顺手」改坏了、我再让它改回来、它又动了旁边一行注释……\n\n来回五轮，八分钟过去了。一件我 20 秒能干完的事。\n\n那一刻我意识到一个事实：**不是所有活都该甩给 AI。** 会用 AI 的人，和用得好的人，差的就是这点判断力——知道哪几次该自己动手。\n\n这门课整体在教你怎么把 AI 用得飞起，但这一章反过来，专门讲**什么时候把手从 Cmd+I 上拿开**。因为到了 2026，工具已经没有门槛了，Claude Code、Cursor、Codex CLI 谁都会点两下。真正拉开差距的，是判断力。\n\n---\n\n## 四种「叫了 AI 反而更糟」的场景\n\n我把踩过的坑归了归类，大致是这四种：\n\n**1. 琐碎但你 30 秒能搞定的活。** 就是开头那个例子。一次简单的重命名、加个 log、删几行注释——你自己动手的时间，比你「组织语言描述给 AI + 等它生成 + review 它的 diff」还短。AI 有固定的启动开销（读上下文、确认意图、生成、你审），这个开销在小任务上是纯亏。\n\n**2. 需要你深理解的核心架构设计。** 「这个模块要不要拆」「用事件驱动还是直接调用」「这层抽象值不值」——这些决策会跟着项目走一两年。AI 能给你选项、能列 tradeoff，但它没有你对这个项目的历史包袱、团队习惯、真实业务约束的理解。你让它拍板，等于让一个刚入职五分钟的人定架构。它可以是你的白板搭子，不能是决策人。\n\n**3. 高风险、不可逆的操作。** 改生产数据库、写迁移脚本、动 CI/CD 的发布配置、批量删文件。这类操作错了没有 Ctrl+Z。AI 生成的删表脚本看着很顺，但你敢不看一眼就跑吗？这种地方 AI 可以起草，但每一行必须你亲自过，而且最好自己重写一遍关键部分。\n\n**4. 你自己都说不清需求的时候。** 这是最隐蔽的一种。你脑子里一团浆糊，想着「先让 AI 写个大概我再看」。结果 AI 拿着你模糊的输入，非常自信地生成了一大坨看起来很完整、方向却完全跑偏的代码。**AI 不会帮你想清楚需求，它只会放大你的模糊。** 你越是没想清，它给你的东西越是「精致的错」。这种时候正确的动作是关掉编辑器，拿张纸把要做什么先写清楚。\n\n---\n\n## 术语四行模板 · automation bias\n\n> **中文**：自动化偏见\n> **英文**：automation bias\n> **一句话**：人倾向于无条件相信自动化系统给出的答案，哪怕它明显是错的。\n> **在这门课里**：AI 生成的代码看着专业、缩进整齐、命名规范，你的大脑就默认「它应该是对的」，于是跳过了本该有的审查——这是最危险的技能杀手。\n\nautomation bias 是老概念了，最早研究的是飞行员过度依赖自动驾驶。到了 AI 编程时代它换了张脸：你盯着一段 AI 写的代码，它看起来太「像样」了，以至于你懒得逐行读逻辑，直接 accept。三个月后线上出 bug，你打开那段代码，发现自己根本看不懂它当初为什么这么写——因为它从来就不是你写的，你只是点了同意。\n\n---\n\n## 过度依赖，到底在付什么代价\n\n短期看，全程 AI 爽得很。代价是慢慢累积的，而且不容易察觉：\n\n- **技能退化。** 你越少手写，手感掉得越快。有一天 AI 挂了、或者你在没网的高铁上要改个 bug，发现自己连一个 for 循环的边界条件都要愣一下。\n- **看不懂自己的项目。** 代码是你「批准」的，不是你「写」的。这两者对大脑的印记天差地别。项目越大，你对它的掌控感越虚。\n- **失去调试直觉。** 好的调试靠的是「我知道这段逻辑大概会在哪出问题」的肌肉记忆。这种直觉只能靠亲手写、亲手 debug 攒出来。全靠 AI，你连 bug 长什么样的感觉都没有。\n- **automation bias 上身。** 前面说过了，盲目接受错误答案，而且是自信地接受。\n\n我不是要吓你——这不是「AI 会让程序员变废」的焦虑贩卖。这些代价都是可控的，前提是你有意识地留一部分活给自己。\n\n---\n\n## 术语四行模板 · skill atrophy\n\n> **中文**：技能退化 / 手感萎缩\n> **英文**：skill atrophy\n> **一句话**：一项技能长期不用，会像不锻炼的肌肉一样慢慢萎缩。\n> **在这门课里**：不是让你拒绝 AI 回去手搓一切，而是提醒你——刻意保留一小块「自己动手区」，让核心手感不退，这样你才有资格判断 AI 写得对不对。\n\n关键词是「刻意」。手感不会自动保持，你得主动留出练习的场景。\n\n---\n\n## 怎么保持「会读、会审、会兜底」\n\n用 AI 用得久还不退化的人，都有几个共同习惯。不复杂，就是得坚持：\n\n1. **每段 AI 代码，合并前读懂。** 不是扫一眼觉得「差不多」，是真的理解它每一步在干嘛。读不懂的代码不许进 main，这是底线。哪怕多花五分钟。\n2. **定期手写，保持手感。** 给自己定个小规矩：比如每周有那么一两个小功能，纯手写，一行不问 AI。就当健身房，练的是那块会退化的肌肉。\n3. **关键逻辑，自己先想再问 AI。** 遇到核心逻辑，先在脑子里（或纸上）把思路走一遍，形成自己的判断，再去看 AI 怎么写。这样你是在「对答案」，能一眼看出它哪里跟你想的不一样、谁更对。而不是「抄答案」，人家写啥你信啥。\n4. **把 AI 输出当「待审草稿」，不当「标准答案」。** 心态上的一个字之差。草稿是要挑刺的，答案是拿来抄的。永远用挑刺的眼光看它——这一条能挡掉八成的 automation bias。\n\n---\n\n## 一个能直接用的判断标准：AI-first 还是 human-first\n\n每次动手前，花两秒给这个任务归个类：\n\n**AI-first（放心大胆让 AI 打头阵）：**\n- 路径明确的重复活：批量改、模板套用、格式转换\n- 样板代码：CRUD、配置文件、测试脚手架、类型定义\n- 探索性的活：陌生 API 怎么调、某个库大概怎么用、快速搭个原型验证想法\n\n**human-first（你先想、你主导，AI 只当副手）：**\n- 核心设计：架构、数据模型、关键抽象\n- 你要长期维护的关键代码：出了事半夜是你被叫起来的那部分\n- 你正在学的东西：学习阶段用 AI 代劳，等于花钱请人替你健身\n\n这条线不是死的。同一段代码，你熟的领域可以 AI-first，你在学的领域就该 human-first。判断的锚点是一个问题：**「这次让 AI 干，我是省了时间，还是省了本该我长的本事？」**\n\n---\n\n## 心法：AI 是放大器，不是拐杖\n\n这一章我想让你记住的就一句话：\n\n**AI 是放大器——它放大你的判断力，也放大你的无知。**\n\n你懂的地方，它帮你快十倍：你一眼看穿它写得对不对，它把你的想法飞速落地。你不懂的地方，它同样把你的错误、你的模糊、你的想当然，加速、放大、批量生产出来，而且包装得特别体面，让你更难发现问题。\n\n所以结论不是「少用 AI」，恰恰相反——**是「多懂点东西，好让 AI 对你更有用」。** 你越懂，放大器的增益越猛。拐杖是让你不用长腿，放大器是让你已经很强的地方变得更强。别把放大器当拐杖用。\n\n---\n\n## 常见坑\n\n- **「反正我最后会 review」——然后并没有。** review 疲劳是真实存在的，diff 一多，人就开始无脑点 accept。对策：AI 一次改动别铺太大，改一小块、审一小块。\n- **学习阶段图快全交给 AI。** 你在学新框架，让 AI 全写了，进度飞快，但三个月后你还是不会。学习期就该忍住手痒，慢就是快。\n- **模糊需求硬塞给 AI，指望它帮你想清楚。** 它想不清，只会给你一坨自信的错。需求不清先停下，别急着叫 AI。\n- **把「能跑」当成「对」。** AI 写的代码跑通了不代表逻辑对、边界全、后面好维护。跑通只是及格线的一半。\n- **走另一个极端，赌气啥都不用 AI。** 这也是坑。样板、重复活你还手搓，纯属浪费生命。用对，不是不用。\n\n---\n\n## 小结\n\n- 四种别叫 AI 的场景：**30 秒能干完的琐事、核心架构设计、高风险不可逆操作、你自己都没想清的需求。**\n- 过度依赖的代价是慢性的：**技能退化、看不懂自己项目、丢调试直觉、automation bias**。可控，但要你主动留活给自己。\n- 三个不退化的习惯：**每段代码合并前读懂、定期手写保手感、关键逻辑先自己想再对答案。**\n- 判断标准：**路径明确的重复活 AI-first，核心设计和你在学的东西 human-first。** 锚点问题——「这次让 AI 干，是省了时间，还是省了本该我长的本事？」\n- 一句心法：**AI 是放大器，放大你的判断力也放大你的无知。你越懂，它越有用。**\n\n---\n\n## 动手练一练\n\n翻一翻你自己上周的 AI 使用记录（Claude Code / Cursor 的历史，或者你的记忆都行），挑出 3 次让 AI 干活的场景，逐个问自己两个问题：\n\n1. **这次其实我自己做更快 / 更好吗？**（是不是那种 30 秒的琐事，或者需要我深理解的核心逻辑？）\n2. **这次我是不是该先自己想清楚再问 AI？**（当时我需求清楚吗？我读懂它写的每一行了吗？）\n\n把答案写下来，标出「下次这种情况我要 human-first」的场景。一周做一次，两三周后你会发现自己对这条线的手感明显变准了——这就是从「会用 AI」升级到「用得好」的分水岭。\n"},{"path":"enhanced/vibe-coding/automation-cli.md","label":"加厚 · 脚手架与自动化","md":"### 脚手架与自动化交付\n\n把常用的开发/发布动作脚本化，再结合 AI 生成与维护脚手架，能显著减少重复劳动。\n\n我先讲个真事。去年带一个刚会 vibe coding 的实习生，他每次上线前都手动跑一遍：先 `npm run lint`，看没红字；再 `tsc` 检查类型；再 `npm test`；最后手点几下确认页面没崩。四步，一步都不能漏。结果有一天他赶时间，跳过了 typecheck 直接合并，线上一个组件收到了 `undefined` 就白屏了——因为那个类型错误 lint 抓不到，只有 `tsc` 能抓。回滚、复盘、道歉，一晚上没了。\n\n问题不在他粗心。问题在于「上线前要跑哪几步、按什么顺序、哪步失败就必须停」这件事**只活在他脑子里**，没写下来、没自动化。人是会累、会赶时间、会漏的；脚本不会。今天这节课就是教你把这类「反复要做、做错代价大」的动作交给脚本和 AI 去守，你只负责看结果。\n\n不懂这个会怎样？你会一直做低价值的重复劳动，而且总有一天因为漏一步而翻车；懂了之后，你能把一整套检查/生成/发布流程压成一条命令，团队里任何人（包括三个月后忘光细节的你自己）都能一键跑对。\n\n**术语：脚手架（scaffolding）**\n- 一句话解释：帮你自动生成一套「新东西的初始骨架文件」的工具或脚本，比如新建一个页面时自动生出组件、样式、测试、类型文件。\n- 形象比喻：盖楼时先搭的那圈钢管架子。房子本身还没盖，但架子把位置、层高、施工动线都定好了，工人上去直接干活，不用每次从平地开始想「梯子搭哪」。\n- 工作中怎么用：团队约定「每个新 API 模块都要有 controller/service/dto/测试」，你就写一个脚手架脚本，敲一条命令把这四个文件按模板生出来，省掉手动新建+复制粘贴。\n- 最常踩的坑：脚手架生成的模板年久失修——项目早就换了写法，脚手架还在吐三年前的旧结构。生成出来的代码看着能跑，其实全是要手改的技术债。所以脚手架本身也要定期让 AI 帮你对着现有代码更新。\n\n#### 生成 CLI / 脚本骨架\n\n（prompt 示例：生成 bash 脚本 scripts/check.sh，顺序跑 lint、typecheck、test，任一失败即退出并打印错误，最后输出耗时统计。让 AI 先给结构再替换项目命令）\n\n这个 prompt 为什么这么写，我拆给你看。\n\n第一，**指明产物路径和类型**（`scripts/check.sh`，bash 脚本）——不说清楚，AI 可能给你一段裸命令让你自己贴哪儿都不知道，或者用了你机器上没有的语言。\n\n第二，**明确顺序**（lint → typecheck → test）——顺序有讲究：lint 最快、typecheck 中等、test 最慢，把快的放前面，一旦快的挂了立刻停，不浪费时间跑完慢的。\n\n第三，**「任一失败即退出」**——这是最关键的一句。默认情况下 bash 脚本一步失败还会往下跑，导致你以为全过了其实第一步就红了。你必须显式要求它「fail fast」。\n\n第四，**「先给结构再替换项目命令」**——因为你项目里真实的命令可能不叫 `npm run lint` 而是 `pnpm lint` 或 `bun run lint`，让 AI 先搭骨架，你再把命令换成自己的，比让它猜你的技术栈靠谱。\n\n在 2026 年，我一般直接在 Claude Code 或 Cursor 里对着项目说这句话，它能读到你的 `package.json`，连命令都不用你替，直接吐出对的版本。但你仍然要会验收——AI 给完，你要检查三点：（1）脚本开头有没有 `set -e`（碰到错误就退出）；（2）失败时是不是真的 `exit 1` 了；（3）耗时统计是不是真的在算。\n\nAI 大概会返回这样一个脚本，你对着验收：\n\n```bash\n#!/usr/bin/env bash\nset -euo pipefail   # -e 出错即停 / -u 用未定义变量报错 / -o pipefail 管道里任一步失败都算失败\n\nstart=$(date +%s)\n\necho \"▶ [1/3] Lint...\"\nnpm run lint\n\necho \"▶ [2/3] Typecheck...\"\nnpx tsc --noEmit\n\necho \"▶ [3/3] Test...\"\nnpm test\n\nend=$(date +%s)\necho \"✅ 全部通过，用时 $((end - start)) 秒\"\n```\n\n跑它只要一句：\n\n```bash\nbash scripts/check.sh\n```\n\n注意 `set -euo pipefail` 这一行——这是让脚本「fail fast」的核心。没有它，lint 报错脚本照样往下跑 test，最后打印「全部通过」，把你坑惨。有它，任何一步非零退出，脚本立刻停在那步，你一眼看到卡在哪。\n\n**术语：幂等 / 可重跑脚本（idempotent）**\n- 一句话解释：同一个脚本跑一次和跑十次，结果一样、不会越跑越乱、不会因为「上次跑过」就报错。\n- 形象比喻：电梯的楼层按钮。你按 5 楼，按一下是去 5 楼，慌张连按五下还是去 5 楼——它不会把你送到 25 楼。可重跑的脚本就该是这样。\n- 工作中怎么用：写生成脚本时，加上「文件已存在就跳过或提示，而不是直接崩」；写部署脚本时，重复执行不会创建重复资源。这样脚本跑到一半失败，你修完直接重跑就行，不用手动清理现场。\n- 最常踩的坑：脚本第二次跑就炸——比如 `mkdir` 目录已存在直接报错、生成文件时无脑覆盖把你手改的内容冲掉。让 AI 写脚本时一定要加一句「保证可重复执行（idempotent），已存在的产物要检测并妥善处理，不要报错也不要盲目覆盖」。\n\n#### 代码模板与脚手架\n\n- 让 AI 为\"新增页面/组件/接口\"生成模板（含测试/样式/类型）\n- 把模板放入 scripts/generate-*，配合 npm run 快速创建\n\n这里的核心思路是：把「新建一个 X 要建哪几个文件、每个文件长什么样」固化成模板，然后用一条命令批量生出来。\n\n举个更完整的例子。假设你的项目每个 React 组件都要配一个测试文件，你可以写一个生成脚本：\n\n```bash\n#!/usr/bin/env bash\n# scripts/generate-component.sh —— 用法: bash scripts/generate-component.sh Button\nset -euo pipefail\n\nname=\"${1:?请传组件名，例如: bash scripts/generate-component.sh Button}\"\ndir=\"src/components/$name\"\n\nif [ -d \"$dir\" ]; then\n  echo \"⚠ $dir 已存在，跳过创建（避免覆盖你的改动）\"\n  exit 0\nfi\n\nmkdir -p \"$dir\"\n\ncat > \"$dir/$name.tsx\" <<EOF\nexport function $name() {\n  return <div>$name</div>;\n}\nEOF\n\ncat > \"$dir/$name.test.tsx\" <<EOF\nimport { render } from '@testing-library/react';\nimport { $name } from './$name';\n\ntest('renders $name', () => {\n  render(<$name />);\n});\nEOF\n\necho \"✅ 已生成 $dir/{$name.tsx, $name.test.tsx}\"\n```\n\n注意我加的那段 `if [ -d \"$dir\" ]`——这就是上面讲的「幂等」在起作用。你第二次误敲同一个组件名，它提示你「已存在，跳过」，而不是把你写了半天的组件冲成空模板。\n\n配到 `package.json`：\n\n```json\n{\n  \"scripts\": {\n    \"gen:component\": \"bash scripts/generate-component.sh\"\n  }\n}\n```\n\n以后新建组件就一句：\n\n```bash\nnpm run gen:component Button\n```\n\n在 Cursor / Claude Code 时代，很多人问：「AI 都能直接帮我写组件了，还要脚手架脚本干嘛？」区别在于**一致性和门槛**。让 AI 每次现写，十个组件可能有十种目录结构、十种测试写法；脚手架脚本保证每次生出来的骨架一模一样。而且脚手架是给团队用的——新人不懂你的约定，一条 `npm run gen:component` 就能生出符合规范的骨架，不用先读一遍规范文档。AI 负责「写业务逻辑」，脚手架负责「统一起手式」，两者不冲突。\n\n#### 集成到 CI/CD\n\n- 要求 AI 输出 CI 配置片段（如 GitHub Actions），覆盖缓存、并行、失败策略\n- 让它写\"人工兜底步骤\"，如发布前手动验证清单\n\n**术语：CI/CD**\n- 一句话解释：CI（持续集成）= 每次你推代码，服务器自动帮你跑 lint/test/build，挂了就拦住；CD（持续交付/部署）= 检查过了自动把代码发到线上。\n- 形象比喻：机场安检 + 登机口。CI 是安检——每个人（每次提交）都得过一遍同样的检查，带违禁品（有 bug）就不让进。CD 是登机口——过了安检的自动被送上飞机（部署上线），不用你手动搬行李。\n- 工作中怎么用：把本地那个 `scripts/check.sh` 的三步搬到 GitHub Actions 里，让它在每个 Pull Request 上自动跑。这样别人不管在自己机器上跑没跑，代码进主干前一定被检查过一遍。\n- 最常踩的坑：CI 每次从零安装依赖，跑一次五分钟起步，慢到大家嫌烦。解决办法就是 prompt 里说的「覆盖缓存」——让 AI 加上依赖缓存配置，第二次跑直接复用，能从五分钟压到一分钟内。\n\n这个 prompt（要求 AI 输出 CI 配置片段，覆盖缓存、并行、失败策略）为什么点名这三样？因为这正是新手写 CI 最容易漏的三件事：\n\n- **缓存**：不加，每次 CI 重装依赖，慢且费额度。\n- **并行**：lint 和 test 其实可以同时跑，不加就串行排队，白等。\n- **失败策略**：默认一个 job 挂了其他还继续跑，浪费时间；你可能想要「一挂全停（fail-fast）」，或者相反「都跑完好一次看全部错误」——这得你告诉 AI 你要哪种。\n\nAI 大概会给你这样一段，你把命令换成自己的：\n\n```yaml\n# .github/workflows/check.yml\nname: Check\non: [pull_request]\n\njobs:\n  check:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 20\n          cache: 'npm'          # ← 缓存依赖，第二次跑快很多\n      - run: npm ci\n      - run: npm run lint\n      - run: npx tsc --noEmit\n      - run: npm test\n```\n\n验收要点：（1）`cache: 'npm'` 在不在（缓存）；（2）触发条件 `on:` 是不是你要的（PR 时跑还是 push 时跑）；（3）用的是 `npm ci` 不是 `npm install`（CI 里 `ci` 更快更严格，锁定 lock 文件版本）。\n\n那句「人工兜底步骤」也别忽略。自动化不是万能的——比如「发布前肉眼确认支付页面能跳到收银台」这种，机器不好判断，就写成一份人工检查清单挂在发布流程里。让 AI 帮你把这类清单也生成出来，钉在团队 wiki 或 PR 模板里。\n\n#### 保持脚本可维护\n\n- 让 AI 在脚本内加注释/用法说明，避免\"黑盒\"\n- 重要命令集中到 package.json scripts 或 Makefile\n\n脚本最怕变成「黑盒」——三个月后没人敢动，因为没人记得它干嘛、传什么参数。所以让 AI 写脚本时，永远多加一句「在文件顶部写清楚用途和用法示例，关键步骤加注释」。你看上面那个 `generate-component.sh` 顶部就有 `# 用法: ...`，这一行能省掉后来人半小时的猜。\n\n另外，别让命令散落在各处。把重要命令都收进 `package.json` 的 `scripts`（前端项目）或 `Makefile`（多语言/后端项目），让「这个项目能干哪些事」一目了然。新人进来先看这一处，就知道 `npm run dev / test / gen:component / check` 分别是什么——这本身就是最好的文档。\n\n2026 年还有个好习惯：把这些脚本和命令约定写进项目根目录的 `CLAUDE.md` / `.cursorrules`，这样 Claude Code、Cursor、Codex CLI 这些 AI 工具进到你项目里，第一时间就知道「跑检查用 `npm run check`、生成组件用 `npm run gen:component`」，不会自己乱造一套命令。等于给 AI 也发了一份说明书。\n\n#### 常见坑\n\n- **忘了 `set -e`（或等价的 fail-fast）**：脚本一步失败还往下跑，最后打印「成功」，是最坑的假阳性。写任何 bash 检查脚本，第一行就把 `set -euo pipefail` 加上。\n- **脚本不可重跑**：跑到一半挂了，重跑因为「目录已存在 / 文件已生成」直接报错，逼你手动清现场。生成类脚本一律加「已存在就跳过或提示」。\n- **脚手架模板过期**：项目写法早变了，脚手架还在吐旧结构，生成的代码全是要返工的债。定期让 AI 对着现有代码更新模板。\n- **CI 不加缓存**：每次重装依赖，慢到全团队嫌弃 CI，最后干脆有人绕过它。加缓存是必修，不是可选。\n- **命令散落无人整理**：一半在 README、一半在某人脑子里、一半在聊天记录里。统一收进 `package.json scripts` 或 `Makefile`，只留一个真相源。\n- **全信 AI 生成不验收**：AI 给的脚本可能命令名对不上你的项目、可能漏了失败退出、可能耗时统计写错。永远自己跑一遍、看一眼三个验收点再用。\n\n#### 小结\n\n这节课的核心就一句话：**把「反复做、做错代价大」的动作交给脚本和 AI 去守，你只看结果。** 具体落地是三层——\n\n1. **检查脚本**（`scripts/check.sh`）：把上线前的 lint/typecheck/test 串成一条命令，`set -euo pipefail` 保证一步挂就停。\n2. **脚手架脚本**（`scripts/generate-*`）：把「新建 X 要建哪些文件」固化成模板，一条 `npm run gen:*` 生出统一骨架，记得做到幂等可重跑。\n3. **CI/CD + 人工兜底**：把检查脚本搬上 GitHub Actions 自动跑，加缓存加失败策略，机器判断不了的用人工清单补。\n\n配合 Claude Code / Cursor / Codex CLI，你只要说清楚「产物路径 + 顺序 + 失败策略 + 先搭骨架再替命令」，AI 就能给你八九不离十的初版，剩下你负责的只有验收那三个点。会了这套，你就从「每天手动重复劳动、总担心漏一步」升级成「一条命令跑对一整套流程」。\n\n#### 练习\n\n让 AI 为项目生成\"新增 API 模块\"脚手架：controller/service/dto/测试/README，最后输出一条 npm 命令生成整套骨架。\n\n**进阶要求**（做完基础版再挑战）：\n\n1. 让脚手架**幂等**——同一个模块名跑第二次要提示「已存在，跳过」而不是覆盖你已经写的业务逻辑。\n2. 在生成的 `README` 里让 AI 自动写清这个模块的用途占位和「怎么跑这个模块的测试」。\n3. 把这条生成命令**写进项目 `CLAUDE.md`**，这样 AI 工具下次进项目就知道「新建 API 模块用 `npm run gen:api <名字>`」。\n4. 交付前，用本课的「六个常见坑」逐条自检一遍你生成的脚手架脚本，特别是：有没有 `set -e`、是不是可重跑、命令有没有收进 `package.json scripts`。\n"},{"path":"enhanced/vibe-coding/ai-ux-copy.md","label":"加厚 · AI UX 文案","md":"## AI 辅助 UX 文案与交互\n\n先说个我自己踩过的坑。我第一次独立做一个登录页，功能全通了：账号密码能提交、校验能拦、接口能连。我很得意，发给设计出身的同事看。她只看了三秒就说：「你这个按钮写『提交』，错误提示写『Error: invalid credentials』，用户看到会懵。」\n\n我当时的反应是：这不都是小事吗？功能才是重点。\n\n后来我才明白，用户根本不关心我后端写得多干净。他们只看得见界面上那几行字。工程师写的文案有个通病——又干又冷、只描述系统状态、不管人的感受。「提交」「Error 400」「暂无数据」，这些字对机器很准确，对人很冰冷。而这些字，恰恰是用户对你产品的第一印象、也常常是唯一印象。\n\n好消息是：AI 不只是帮你写代码，它现在是你身边那个「随叫随到的产品文案 + UX 顾问」。界面文案、空状态、可访问性提示、微交互脚本——这些以前要么靠自己硬憋、要么要拉设计师排期的活，现在都能用 AI 加速几倍。这一章就讲怎么把它用透。\n\n先立一个观念——不懂这些会怎样：\n\n- 按钮文案干巴巴 → 用户不敢点，转化掉一截。\n- 空状态一片空白 → 新用户第一次进来看到啥都没有，以为产品坏了，直接走人。\n- a11y（可访问性）全靠猜 → 用屏幕阅读器的用户、只能用键盘的用户，你的产品对他们等于不存在，严重的还违反当地无障碍法规。\n- 加载 / 成功 / 失败没有反馈 → 用户点完不知道发生了啥，反复乱点。\n\n下面几个术语你会反复遇到，先用「四行模板」把它们钉死。\n\n**术语：空状态 empty state**\n- 一句话解释：界面上「本该有内容、但现在还没有内容」时展示的那个页面（比如收件箱一封邮件都没有、搜索无结果、新用户还没建任何项目）。\n- 形象比喻：像你搬进新家的第一晚，屋里空荡荡。你需要的不是一间空房，而是一张纸条告诉你「插座在这、水电已通、第一步先干嘛」。\n- 工作中怎么用：任何列表 / 数据展示区都要单独设计空状态，写清「为什么是空的 + 现在能做什么（放个 CTA 按钮）」。\n- 最常踩的坑：直接留白，或者只写一句冷冰冰的「暂无数据」。用户会以为是 bug，不知道下一步该干嘛。\n\n**术语：可访问性 a11y**\n- 一句话解释：让有视觉 / 听觉 / 行动障碍的人也能正常用你的产品（a11y = accessibility，中间 11 个字母的缩写）。\n- 形象比喻：像给建筑修无障碍坡道。坡道不是给残障人士的「特殊照顾」，推婴儿车的、拖行李箱的所有人都受益。\n- 工作中怎么用：给图片加 alt、给表单控件加 label、保证能用键盘 Tab 走完整个流程、错误提示要能被屏幕阅读器读出来。\n- 最常踩的坑：只用颜色传递信息（比如「红色框代表错」），色盲用户完全看不出来；还有只顾着鼠标点，忘了很多人只用键盘。\n\n### 生成一致的文案语气\n\n原始 prompt 是这样的：\n\n> 你是产品文案，为登录页生成 标题/副标题/按钮文案/错误提示。品牌语气：温暖、清晰、有行动感。约束：不超过30字；错误提示包含解决方案。让 AI 输出多个备选并标注差异。\n\n我们把它拆开讲，为什么每一句都不能省：\n\n- **「你是产品文案」**——给 AI 定角色。不定角色，它会像写技术文档一样输出，干、准、冷。定成产品文案，它才会站在用户情绪的角度写。\n- **「品牌语气：温暖、清晰、有行动感」**——这是最关键的约束。没有它，AI 每次的语气都飘。有了它，你后面所有页面的文案才能统一成一个「人格」。（进阶做法：把这段语气描述存成一个文件，比如 `docs/tone.md`，以后每次让 AI 写文案都 `@docs/tone.md` 带上，全站语气就锁死了。）\n- **「不超过30字 / 错误提示包含解决方案」**——具体的可验证约束。「不超过30字」逼它别啰嗦；「包含解决方案」直接把工程师最容易忘的事变成硬要求。\n- **「输出多个备选并标注差异」**——不要让 AI 一锤定音。让它给 3 个版本、并说清每个版本偏向哪种感觉，你来选。你比 AI 更懂你的用户。\n\n怎么判断 AI 给的好不好？看一个对比就懂了。\n\n烂文案（工程师默认会写的）：\n\n```\n标题：登录\n副标题：请输入您的凭据\n按钮：提交\n错误：Error: Authentication failed (401)\n```\n\n好文案（带情绪、带出路）：\n\n```\n标题：欢迎回来\n副标题：登录继续你上次的进度\n按钮：登录我的账号\n错误：邮箱或密码不对。忘记密码了？点这里重置 →\n```\n\n差别在哪？好文案里，每一行都在「帮用户往前走一步」，而不是「向用户汇报系统状态」。尤其错误提示——烂的那条只告诉你「错了」，好的那条告诉你「哪里错了 + 现在怎么办」。这就是「包含解决方案」这个约束的价值。\n\n在 Cursor 或 Claude Code 里，你甚至可以让它直接改进现有组件，而不是只给纯文本：\n\n> @components/LoginForm.tsx 把里面所有面向用户的文案改成「温暖、清晰、有行动感」的语气，错误提示要包含解决方案，每条不超过30字。只改文案字符串，不动逻辑。改完给我 diff。\n\n最后那句「只改文案不动逻辑、给我 diff」很重要——它把 AI 的改动范围框死，你 review 起来一目了然，不会一不小心把校验逻辑也给你「优化」没了。\n\n### 设计空状态与引导\n\n原文的做法保留并讲透：\n\n- 要求 AI 输出空态文案 + 示例插图描述 + CTA 链接\n- 补充「触发条件」和「成功指标」便于验证\n\n为什么要 AI 顺带输出「示例插图描述」？因为空状态光有文字还是空。一句「你还没有任何项目」配一张友好的小插画，感受完全不同。你不一定要自己画，但让 AI 描述出来（比如「一个打开的空盒子，暖色调，旁边一支笔」），你就能拿这段描述去找现成图库、或喂给出图工具。\n\n为什么要「触发条件 + 成功指标」？因为空状态有好几种，别混成一个：\n\n- 新用户第一次来（还没建过东西）→ 引导他建第一个。\n- 搜索 / 筛选后没结果 → 提示他换个关键词，别让他以为产品没内容。\n- 全删光了（曾经有、现在清空了）→ 语气可以轻松点，「都清完啦，休息一下？」\n\n一个更完整的例子。假设做一个待办应用的空收件箱：\n\n```jsx\nfunction EmptyInbox() {\n  return (\n    <div role=\"status\" style={{ textAlign: 'center', padding: '48px' }}>\n      {/* 插图描述：一只打勾的信封，暖橙色，轻松风格 */}\n      <img src=\"/empty-inbox.svg\" alt=\"收件箱已清空\" width={120} />\n      <h3>收件箱清空了 🎉</h3>\n      <p>所有待办都处理完了。要不要现在加一条新的？</p>\n      <button onClick={onAddTask}>+ 新建待办</button>\n    </div>\n  );\n}\n```\n\n注意里面的 `role=\"status\"` 和 `alt`——这就是把 a11y 顺手带进去了，屏幕阅读器会读出「收件箱已清空」。这也引出下一节。\n\n### 可访问性辅助\n\n原始 prompt：\n\n> 审查 @components/Form.tsx 的可访问性：label/aria/键盘导航/错误提示。输出问题列表和修复 patch。\n\n让 AI 生成 a11y 检查表和 patch。\n\n这个 prompt 好在两点：一是 `@components/Form.tsx` 直接把真实文件喂给它，它审的是你的真代码不是泛泛而谈；二是明确列了四个检查维度（label / aria / 键盘导航 / 错误提示），AI 就不会漏。\n\n它一般会返回这样的东西：\n\n```\n问题清单：\n1. [严重] <input> 没有关联 <label>，屏幕阅读器读不出这是什么字段。\n2. [中] 错误提示是纯红色文字，无 aria-live，屏幕阅读器不会主动播报。\n3. [中] 自定义下拉框用 <div> 做的，不能用键盘 Tab / 方向键操作。\n4. [轻] 提交按钮 loading 时没有 aria-busy。\n```\n\n配套的 patch 可能长这样：\n\n```jsx\n// 修复 1 + 2：label 关联 + 错误可被朗读\n<label htmlFor=\"email\">邮箱</label>\n<input id=\"email\" type=\"email\" aria-describedby=\"email-err\" />\n{error && (\n  <p id=\"email-err\" role=\"alert\" style={{ color: '#c00' }}>\n    {error}\n  </p>\n)}\n```\n\n怎么判断这个 patch 好不好？一个笨办法特别管用：改完后，把鼠标丢一边，只用键盘（Tab 切换、Enter 确认）走一遍你的表单。如果能顺利走完、每一步焦点都看得清、报错能听见——就成了。走不通，就把卡住的地方再喂回给 AI：「我用键盘 Tab 到下拉框后按方向键没反应，帮我修」。AI 审 a11y 很强，但最终验证要靠你亲自用一遍。\n\n**术语：微交互 microinteraction**\n- 一句话解释：用户做一个小动作时，界面给的那一点点即时反馈（按钮按下去有个下沉、点赞时爱心弹一下、加载时转圈）。\n- 形象比喻：像你按电梯按钮，它亮一下灯。灯不影响电梯来不来，但没有这个灯你会一直怀疑「我到底按上了没」，忍不住狂按。\n- 工作中怎么用：给每个关键操作配「进行中 / 成功 / 失败」三态反馈，让用户永远知道系统在干嘛。\n- 最常踩的坑：只做了「成功」态，忘了「加载中」和「失败」态。用户点完按钮，界面半天没动静，就开始重复点、或者以为坏了走人。\n\n### 微交互与动效脚本\n\n原文保留：\n\n- 让 AI 设计「加载、成功、失败」的动画或状态机描述，再生成代码\n- 要求给出「终端/移动端」差异处理\n\n为什么要 AI 先给「状态机描述」再给代码？因为微交互最容易漏状态。你脑子里往往只想着「点了就成功」，但真实世界里还有「正在请求」「请求失败」「网慢超时」。让 AI 先把状态画出来，你一眼就能看出漏没漏：\n\n```\nidle（初始）\n  → 用户点击 → loading（转圈，按钮禁用防重复点）\n      → 成功 → success（打勾，2 秒后回 idle）\n      → 失败 → error（抖一下 + 显示可重试的错误提示）\n```\n\n有了这张图，再让它生成代码就稳了：\n\n```jsx\nconst [state, setState] = useState('idle');\n\nasync function handleSubmit() {\n  setState('loading');\n  try {\n    await save();\n    setState('success');\n    setTimeout(() => setState('idle'), 2000);\n  } catch {\n    setState('error'); // 保留在 error，让用户能看到并重试\n  }\n}\n\n// 按钮根据 state 变样子\n<button disabled={state === 'loading'} aria-busy={state === 'loading'}>\n  {state === 'loading' ? '保存中…' :\n   state === 'success' ? '已保存 ✓' :\n   state === 'error'   ? '失败，重试' : '保存'}\n</button>\n```\n\n「终端 / 移动端差异处理」也别忘让 AI 提醒你：手机上没有鼠标 hover，所以别把关键反馈只挂在 hover 上；手机屏小，动效要更克制，别让页面乱抖影响阅读。\n\n### 常见坑\n\n- **让 AI 一次给一个「最终版」文案就直接用**。永远让它给多个备选、标差异，你来选。你比 AI 懂你的真实用户。\n- **语气不统一**。这个页面 AI 写得活泼、那个页面写得严肃，全站像好几个人写的。解决办法：把品牌语气写进一个文件，每次 `@` 带上。\n- **只做成功态，不做加载和失败态**。这是工程师最常见的 UX 债。让 AI 输出状态机时，主动问它「失败和超时怎么办」。\n- **a11y 只看 AI 报告不亲自验**。AI 能揪出大部分问题，但「键盘走一遍、屏幕阅读器听一遍」这种真人验证不能省。\n- **空状态留白或只写「暂无数据」**。至少要有一句话解释 + 一个能点的下一步。\n- **把 AI 当设计师全权托管**。AI 是加速器，不是拍板人。它给方案，你做判断——尤其涉及品牌调性和真实用户的地方。\n\n### 小结\n\n这一章的核心就一句话：**界面上给用户看的每一个字、每一个反馈，都是产品的一部分，值得像写代码一样认真对待——而 AI 能让你做这件事快很多。**\n\n具体记住这几点：\n- 文案定角色 + 定品牌语气 + 给可验证约束（字数、必含解决方案），并要多个备选。\n- 空状态要分清是「新用户 / 无搜索结果 / 已清空」哪一种，各写各的引导 + CTA。\n- a11y 让 AI 审 label / aria / 键盘 / 错误提示，但最后自己用键盘走一遍。\n- 微交互先让 AI 画状态机（idle / loading / success / error），再生成代码，别漏状态。\n- AI 是你的 UX 副驾，不是自动驾驶——它出方案，你拍板。\n\n### 练习\n\n（在原练习基础上做，先完成原三步，再加做拓展。）\n\n**基础（原练习，必做）**：选一个页面组件，让 AI：\n1. 生成统一语气的文案；\n2. 给出空态与 CTA；\n3. 输出 a11y 修复建议。\n\n然后比较 AI 方案与现有文案，择优合并——注意是「合并」，不是无脑全换，好的地方留、AI 更好的地方换。\n\n**拓展一（把语气固化）**：把你选定的品牌语气写成一份 `tone.md`（三五句话即可），下次让 AI 写任何文案时都 `@tone.md` 带上，观察前后一致性有没有变好。\n\n**拓展二（真人验 a11y）**：改完 a11y 后，把鼠标放到一边，只用键盘 Tab + Enter 走完整个组件流程。记录卡住的地方，把它原样喂回给 AI 让它修，直到能顺畅走完。\n\n**拓展三（补齐微交互）**：给这个组件的主操作加上完整的「加载 / 成功 / 失败」三态反馈。先让 AI 画状态机，你确认没漏状态后再让它生成代码。特别检查：失败态能不能重试？加载态有没有防重复点击？\n"},{"path":"enhanced/vibe-coding/prompt-patterns.md","label":"加厚 · Prompt 模板","md":"## 高质量 Prompt 模板\n\n我先讲个我上周真实碰到的事。有个同事在 Cursor 里让 AI「帮我写个登录表单验证」，AI 唰唰给了一段代码，看着挺像回事——结果引了个他项目里根本没装的表单库，验证逻辑还跟他们现有的 `useToast` hook 撞了，最后他花了 40 分钟把 AI 生成的东西一点点拆掉重接。他跑来问我：「是不是 AI 变笨了？」\n\n不是 AI 笨，是 prompt 没说清。同样这个需求，我让他换成一句结构化的写法——把「用的什么技术栈、已经有哪些能复用的组件、不许引新依赖、要什么格式的输出、怎么算做对了」全写进去，AI 第二次直接给出了能跑、能过 lint、还带了两个测试用例的代码,一次成型。\n\n这就是这一章要讲的东西：**别再靠运气写 prompt**。你把要求写模糊，AI 就只能猜，猜错了你返工；你把要求写成固定模板，AI 每次都稳定输出你要的结果。下面 3 个模板是我自己天天在用的，直接抄。\n\n> **术语：结构化 Prompt（structured prompt）**\n> 就是不用「一句话随口说」，而是按固定的几个字段（任务/背景/约束/输出/验收）把需求填满的写法。\n> 形象点说，随口 prompt 像你跟外卖备注「少放点辣」——「少」是多少？店家全靠猜；结构化 prompt 像「微辣，两根小米辣，能吃出味但不冲」——没有歧义。\n> 工作中怎么用：任何要 AI 产出代码/文档/方案的场景，先花 30 秒把字段填齐，比事后返工快 10 倍。\n> 最常踩的坑：以为「写详细」= 啰嗦一大段。不是。是把关键字段填全，废话反而要删——AI 读的是信息密度，不是字数。\n\n在日常开发里，用固定模板可以快速复制出稳定结果。下面 3 个常用模式直接套用。\n\n### 模式1：任务+背景+约束+输出+验收\n\n（示例：[任务]实现登录表单前端校验 [背景]React+TS，已有 Form/Input 组件、可复用 hooks/useToast [约束]不引新依赖，失败返回具体字段错误 [输出]完整代码块含类型，附2个输入输出示例 [验收]通过 ESLint，说明覆盖哪些边界）适用于绝大多数功能开发，关键是写清\"项目现状\"和\"验收标准\"。\n\n**为什么这五个字段一个都不能省？** 我见过太多人只写「任务」，剩下四个全靠 AI 脑补，结果就是开头那个 40 分钟返工的故事。逐个说下每个字段挡掉什么坑：\n\n- **任务**——你想要它干什么。省了 AI 直接懵。这个大家一般不会漏。\n- **背景**——你的项目现在长什么样。这是最容易被低估的。你不说技术栈，AI 可能用 Vue 语法写你的 React 项目；你不说「已有 useToast」，AI 就自己造一个新的 toast，跟你现有的打架。\n- **约束**——什么不许做。**这是最常被漏、也最要命的一个**。「不引新依赖」这五个字，能挡掉 AI 一时兴起给你装三个 npm 包的惨案。约束就是你的护栏，不写护栏，AI 就在悬崖边自由发挥。\n- **输出**——你要什么形式。要完整代码块还是只要 diff？要不要带类型？要不要示例？不说清，AI 给你一段夹在解释里的伪代码，你还得自己抠出来。\n- **验收**——怎么算做对了。**这个跟「约束」并列第一容易被漏**。不写验收，AI 觉得「能编译就行」，但你心里想的是「要处理空输入、超长输入、特殊字符」。验收标准就是你脑子里那把尺，得摆到台面上。\n\n> **术语：验收标准（acceptance criteria）**\n> 一句话：判断「这活儿到底做完了没」的那把尺子——满足了就算过，没满足就打回。\n> 形象比喻：像验房时的清单——「墙面无裂缝、水管不漏、开关都能用」，逐条打钩才收房。没有清单，你只能凭感觉说「差不多吧」，然后住进去才发现漏水。\n> 工作中怎么用：写 prompt 时把「我怎么知道它做对了」提前列成 2-4 条可勾选的条件（通过 lint、覆盖 X 个边界、不改动 Y）。\n> 最常踩的坑：写成「代码质量要高」这种没法验证的虚话。验收标准必须是能一眼判断真假的——「通过 ESLint」可验证，「代码优雅」不可验证。\n\n**模糊 → 结构化 改写对比：**\n\n```\n❌ 模糊版\n帮我写个登录表单校验\n\n✅ 结构化版\n[任务] 给登录表单加前端校验\n[背景] React 19 + TypeScript 项目，已有 <Form>/<Input> 组件和 useToast hook（在 hooks/useToast.ts），\n       表单字段是 email + password\n[约束] 不引入任何新依赖；校验失败时返回具体到字段的错误信息，别只弹一个笼统的\"输入有误\"\n[输出] 一个完整的可复制代码块，含 TypeScript 类型；末尾附 2 个「输入 → 输出」示例\n[验收] 能通过项目现有 ESLint 配置；说明你覆盖了哪些边界情况（空值、格式错误、超长）\n```\n\n你能明显感觉到，右边那版 AI 几乎没有猜的空间了。这就是目标。\n\n### 模式2：角色+步骤+检查表\n\n（示例：你是代码审查助手，按步骤：1)读 @pages/login.tsx 与 @components/Form.tsx 2)找可访问性问题 3)输出修复 patch(md代码块)再列检查表。检查表：可键盘操作、字段有 label、错误信息可被屏幕阅读器读取）适合重构/Review/a11y 等需列表化检查的任务。\n\n**为什么要给它「角色」和「步骤」？** 因为不给角色，AI 是个啥都会一点的通才；给了「你是代码审查助手」，它就切换到「挑刺模式」，标准会严很多。不给步骤，它可能读完文件直接给你一坨改动；给了 1-2-3，它会老老实实先读、再找问题、最后才动手——中间过程你能看见，也能中途叫停。\n\n那个「检查表」尤其值钱。它把「做得好不好」这种主观判断，变成了一条条能打钩的客观项。做完 review，你拿着检查表一条条对，漏没漏一目了然。这跟模式1里的「验收」是一个思路——把标准显性化。\n\n**模糊 → 结构化 改写对比：**\n\n```\n❌ 模糊版\n帮我看看这个登录页有没有无障碍问题\n\n✅ 结构化版\n你是代码审查助手，专门查前端可访问性（a11y）。按以下步骤做：\n1) 读 @pages/login.tsx 和 @components/Form.tsx\n2) 找出所有可访问性问题（重点看键盘操作、label、屏幕阅读器）\n3) 先输出修复的 patch（unified diff，放 md 代码块里），再附一张检查表\n检查表逐条打钩：\n[ ] 所有交互元素可纯键盘操作（Tab/Enter）\n[ ] 每个输入框都有关联的 <label>\n[ ] 错误信息能被屏幕阅读器读到（aria-live 或等价方案）\n```\n\n左边那句 AI 大概率给你一段泛泛而谈的「建议加 label、注意对比度」；右边这版你拿到的是能直接 apply 的 diff + 一张验收清单。\n\n### 模式3：Diff/Patch 指令\n\n（示例：生成针对 @components/Button.tsx 的 patch：primary 按钮背景改 #0f172a，hover 加阴影；保持 props 不变；输出 unified diff，不含无关文件）在已有代码上做小改动时，patch 能减少误伤。\n\n**为什么改小地方要用 patch 而不是让 AI 重写整个文件？** 因为你让 AI「重新给我这个 Button 组件」，它很可能顺手把你的注释删了、把某个 prop 名改了、把一段它「觉得没用」的逻辑清理掉——这叫误伤，是 vibe coding 里翻车的重灾区。而 patch（diff）只描述「哪几行变成什么」，其余原封不动，AI 想动别的地方都没机会。\n\n在 2026 年这一点尤其重要。Claude Code、Cursor 的 Agent 模式、Codex CLI 这些工具本来就是围绕「读文件 → 生成 diff → 你审 diff → apply」这个循环设计的。你主动要 unified diff，等于顺着工具的纹理来，AI 给的东西直接就能进它的 review 面板，你扫一眼就知道动了哪几行。\n\n> **术语：unified diff（统一差异格式）**\n> 就是 `git diff` 打出来的那种格式——`-` 开头的是删掉的行，`+` 开头的是加上的行，其余是没动的上下文行。\n> 形象比喻：像老师批改作文时用红笔——划掉一句（`-`）、旁边补一句（`+`），整篇作文不用重抄。你一眼看得出改了哪、没动哪。\n> 工作中怎么用：要 AI 在已有代码上做小修改时，明确说「输出 unified diff」，然后在 Cursor/Claude Code 里直接 apply，改动可控可回滚。\n> 最常踩的坑：patch 的上下文行（没有 +/- 的那几行）跟你本地代码对不上，apply 就会失败。所以 @ 引用要指对文件，别让 AI 凭空造上下文。\n\n**模糊 → 结构化 改写对比：**\n\n```\n❌ 模糊版\n把 Button 的主按钮改深色一点，加个 hover 效果\n\n✅ 结构化版\n针对 @components/Button.tsx 生成一个 patch：\n- primary 按钮背景色改成 #0f172a\n- hover 时加一个柔和阴影（box-shadow: 0 2px 8px rgba(0,0,0,.15)）\n约束：保持所有现有 props 和类型签名不变，不要碰其他任何文件\n输出：unified diff 格式，只包含 Button.tsx 的改动\n```\n\n「深一点」是多深？「hover 效果」是啥效果？左边全是给 AI 的自由发挥题。右边把色值、阴影、边界（不碰别的文件）全钉死了，AI 只能照做。\n\n### 常见坑\n\n踩过的坑分享给你，能省不少来回：\n\n1. **只写「任务」，指望 AI 猜背景。** 最高频的坑。AI 不知道你的技术栈、你有哪些现成组件，它只能按最通用的假设来，然后就跟你项目现状对不上。背景字段花 20 秒填，省你半小时。\n2. **漏掉「约束」，然后惊讶 AI 装了新依赖。** 「不引新依赖」「保持 props 不变」「别碰其他文件」——这些护栏不写，AI 就当你默许它自由发挥。\n3. **验收标准写成虚话。** 「代码质量要高」「要健壮」——这种 AI 没法验证，等于没写。改成「通过 ESLint」「覆盖空输入和超长输入」这种能一眼判真假的。\n4. **要改三行，却让 AI 重写整个文件。** 用模式3 的 patch，别用「重新给我一份」。重写=给 AI 一张误伤的许可证。\n5. **@ 引用指错文件或不指。** 2026 的工具（Claude Code / Cursor / Codex CLI）都支持 `@文件名` 把真实代码喂给 AI。你不 @，AI 就凭想象写；你 @ 错了，patch 的上下文对不上，apply 直接失败。\n6. **一个 prompt 塞五个不相关的任务。** AI 会顾此失彼。宁可拆成几个结构化 prompt 分别跑，也别糊成一大坨。\n7. **不给示例，却期待特定格式。** 如果你对输出格式有讲究，模式1 里那句「附 2 个输入输出示例」很关键——用例子告诉 AI 你要的样子，比用文字描述准得多。\n\n> **术语：few-shot 示例（少样本示例）**\n> 就是在 prompt 里直接塞 1-3 个「输入长这样 → 输出应该长这样」的例子，让 AI 照着葫芦画瓢。\n> 形象比喻：像教新同事做表格，与其口头讲半天格式，不如直接甩他一份填好的样表——「照这个来」，秒懂。\n> 工作中怎么用：当你对输出格式/风格有明确要求、又不好用文字讲清时，给 2 个例子最省事（这就是模式1 里「附 2 个输入输出示例」的作用）。\n> 最常踩的坑：例子给得跟真实需求偏差太大，AI 会照着错的例子学。例子要典型、要贴近你真实场景。\n\n### 小结\n\n这一章其实就一句话：**别让 AI 猜，把要求写成模板**。\n\n- 做**功能**用模式1（任务+背景+约束+输出+验收），重点是别漏「约束」和「验收」这两个最容易被跳过、又最挡坑的字段。\n- 做**审查/重构/a11y**用模式2（角色+步骤+检查表），把主观判断变成可打钩的清单。\n- 做**小改动**用模式3（Diff/Patch），只改该改的，避免 AI 顺手误伤。\n\n三个模板背后是同一个道理：把你脑子里那些「默认的、没说出口的」前提（技术栈、护栏、验收尺子、输出格式）全部搬到台面上。你说得越具体，AI 猜得越少，你返工越少。刚开始会觉得「写这么多字好麻烦」，但用两周你就回不去了——因为一次成型的爽感，远超返工的痛苦。\n\n### 练习\n\n- 任选一个模式在 Cursor 里对当前项目跑一遍，看 AI 是否遵守格式\n- 调整\"约束\"\"验收\"字段观察输出变化，积累自己的模板库\n- **进阶1**：拿你今天手头一个真实需求，先用「模糊版」写一遍 prompt 跑一次，再用对应模板改成「结构化版」跑一次，把两次输出并排对比——直观感受一下差距，这比看十遍讲解都管用。\n- **进阶2**：故意从模式1 里删掉「约束」字段跑一次，再删掉「验收」跑一次，观察 AI 分别开始「自由发挥」什么。踩一遍你就永远记住这两个字段为什么不能省。\n- **进阶3**：用模式3 让 Claude Code 或 Codex CLI 对一个真实文件生成 unified diff，然后真的 apply 一次。体会「只改该改的」跟「让它重写整个文件」在可控性上的区别，顺便熟悉 diff 的 apply/回滚流程。\n- **收尾**：把你调顺的模板存进一个自己的 `prompts.md`，下次直接抄字段填内容。你的模板库就是你的生产力。\n"},{"path":"enhanced/vibe-coding/install-cursor.md","label":"加厚 · 安装 Cursor","md":"## 安装 Cursor 与基础配置\n\n先说句掏心窝的：这一章看起来只是\"装个软件\"，很多人想跳过。但我带过的学员里，后面卡得最惨的那批，十有八九都是环境没配好——模型登不上、快捷键不会按、项目索引没建起来，于是每写一行代码都要跟工具较劲，AI 明明能帮你，你却在跟安装界面搏斗。第一步这 20 分钟花扎实了，后面几十节课都顺；这里偷懒，后面天天返工。所以别嫌它基础，跟我一步步来。\n\nCursor 是最流行的 AI 编程 IDE 之一，基于 VS Code，集成 Claude / GPT 模型。装好环境后面学得更顺。你可以把它理解成\"一个会写代码的 VS Code\"——外壳、快捷键、插件生态几乎和 VS Code 一模一样，但它把 AI 缝进了编辑器的每一个角落，你选中一段代码就能让它改，不用再复制到网页版聊天框里来回倒腾。\n\n### 下载与安装\n\n1. 打开官网 https://cursor.com\n2. 下载对应系统版本（macOS / Windows / Linux）\n3. 运行安装；首次启动选 \"Import VS Code Settings\" 继承已有配置\n\n这里补一句：如果你之前用过 VS Code，\"Import VS Code Settings\" 一定要点。它会把你原来的主题、插件、快捷键一整套搬过来，你打开的第一眼就是熟悉的样子，几乎零学习成本。如果你从没用过 VS Code，全新安装也没关系，跟着默认配置走就行，后面我们再慢慢调。\n\n### 登录与模型选择\n\n- 用 Google / GitHub 登录领试用额度\n- 推荐模型：**Claude Fable 5 / Opus 4.8 质量最高**，写复杂逻辑、跨文件重构、需要\"想清楚再下笔\"的活交给它们最稳；**GPT-5.4 mini 更快出草稿**，写点小函数、快速试个想法、要它秒回的时候用它更爽\n- 初期保持默认，之后按延迟和成本调\n\n模型这块多讲两句，因为选错了会直接影响你的体验。质量高的模型（Claude Fable 5 / Opus 4.8）胜在\"理解力\"——你给它一段乱七八糟的需求，它能读懂你真正想要什么，改出来的代码也更少埋坑；代价是稍慢一点、成本高一点。快模型（GPT-5.4 mini）胜在\"手速\"，适合你已经想清楚要什么、只是懒得手敲的场景。我的习惯是：默认挂质量高的，遇到\"我就要个循环\"\"帮我改个变量名\"这种小活临时切快的。你不用一开始就纠结，保持默认用一周，自己就有手感了。\n\n> **术语：模型（Model）**\n> 一句话解释：就是背后帮你写代码的那个 AI 大脑，Cursor 只是它的\"身体\"（编辑器界面）。\n> 形象比喻：同一个 IDE 好比同一辆车，换模型就像换发动机——有的猛有的省油。\n> 工作中怎么用：右下角或命令面板里能随时切换，一个项目里不同任务用不同模型很正常。\n> 最常踩的坑：以为\"Cursor 卡\"，其实是选了个又慢又贵的模型在写简单活，换个快模型立刻顺。\n\n### 必备快捷键\n\n- Cmd/Ctrl + K：在光标处生成/修改代码（最常用）\n- Cmd/Ctrl + L：打开 chat 侧栏多轮讨论\n- Cmd/Ctrl + Shift + I：打开 Composer 跨文件重构\n- Cmd/Ctrl + Shift + P：命令面板，切模型/开关功能\n\n这四个快捷键是你每天要按几百次的东西，我一个个讲透，顺便告诉你\"什么时候该按哪个\"，因为按错了会很别扭。\n\n**Cmd/Ctrl + K —— 就地生成/改代码。** 这是最高频的一个。你把光标放在某一行，或者选中一段代码，按 K，弹出一个小输入框，你用中文说\"给这个函数加上参数校验\"，它就在原地改给你看。使用场景：你正在写一个函数，写到一半卡住了，选中已有的几行按 K 说\"帮我补全剩下的逻辑\"——不用离开当前位置，改动直接内联显示，你按回车接受、按 Esc 拒绝。它的特点是\"点状、精准\"，只动你选中的地方。\n\n**Cmd/Ctrl + L —— 打开右侧聊天栏讨论。** 这个是\"聊天\"，不是\"直接改代码\"。使用场景：你拿到一段别人写的、看不懂的代码，选中它按 L，在侧栏问\"这段在干嘛？为什么用递归？\"——它会解释，你可以追问，来回聊好几轮。或者你还没想清楚怎么写，先按 L 跟它讨论方案、让它给几个思路，聊明白了再回编辑器动手。K 是\"动手\"，L 是\"动脑\"，这是两者最大的区别。\n\n**Cmd/Ctrl + Shift + I —— 打开 Composer 跨文件重构。** 这是重头戏，也是 Cursor 比原生 VS Code 强的地方。使用场景：你要做的事横跨好几个文件——比如\"把整个项目里的 `getUser` 重命名成 `fetchUser`，相关的 import 和调用都一起改\"，或者\"新加一个用户注册功能，要动路由、控制器、数据库模型三个文件\"。这种活用 K 一个文件一个文件改会累死，Composer 能一次性理解多个文件的关系、成批改动、最后给你一个统一的 diff 让你审。\n\n> **术语：Composer 跨文件重构**\n> 一句话解释：让 AI 一次性在多个文件里协同改动的\"大工程\"模式。\n> 形象比喻：K 是拿手术刀点一下，Composer 是叫来一个施工队，同时开好几个房间的工。\n> 工作中怎么用：做加新功能、大范围重命名、拆分模块这类\"牵一发动全身\"的活时用它。\n> 最常踩的坑：什么都想用 Composer，结果它一次改太多，你根本审不过来——小改动老老实实用 K。\n\n**Cmd/Ctrl + Shift + P —— 命令面板。** 这是 VS Code 原生就有的万能入口，Cursor 也保留了。按下去弹出一个搜索框，你输关键词就能找到几乎所有功能：切换模型、开关某个设置、格式化文件、装插件……记不住某个功能的入口时，Shift + P 搜一下最快。\n\n### 配置建议\n\n- 设置里开 \"Auto Suggest\" 及时补全\n- 常用目录加入 Workspace 便于索引；大项目先跑一次全局搜索预热索引\n- 团队协作配好 Git 凭证，保证 git status 正常\n\n再补几条我踩过坑之后总结的：\n\n**Auto Suggest（自动补全）一定要开。** 开了之后你敲代码时，AI 会像\"读心术\"一样在光标后面用灰字预判你接下来要写什么，按 Tab 就接受。它跟按 K 的区别是：K 是你主动喊它来改，Auto Suggest 是它在你打字过程中默默帮你续写。刚开始你可能觉得灰字有点晃眼，用两天就离不开了。\n\n**关于索引。** Cursor 要先把你的项目\"读一遍、建个目录\"，之后你问它\"用户登录的逻辑在哪个文件\"它才答得上来。大项目第一次打开时，让它在后台跑一会儿把索引建完，别急着提问，不然它对项目还\"一无所知\"，答出来的东西张冠李戴。\n\n> **术语：索引（Codebase Indexing）**\n> 一句话解释：Cursor 把你整个项目扫一遍、建立\"哪段代码在哪\"的地图，好让 AI 能全局理解你的工程。\n> 形象比喻：像图书管理员先把书全部登记进系统，之后你要哪本它才能秒定位。\n> 工作中怎么用：新项目打开后等它索引建完再提整体性问题（\"这个功能怎么实现的\"）。\n> 最常踩的坑：项目刚打开索引没建完就急着问，AI 答得驴唇不对马嘴，你还以为它笨。\n\n**Git 凭证配好。** Cursor 很多协作和版本相关的能力都依赖底层的 Git 正常工作，配好凭证、保证在项目里跑 `git status` 不报错，后面提交代码、看改动历史才顺。快速自检一下：\n\n```bash\n# 在你的项目目录里跑，能正常显示状态就说明 Git 通了\ngit status\n\n# 顺手确认一下身份配好了（提交代码要用）\ngit config user.name\ngit config user.email\n```\n\n### Cursor 和原生 VS Code 有啥不一样\n\n既然 Cursor 是\"套壳 VS Code\"，很多人问那我干嘛不直接用免费的 VS Code 装个插件。差别主要在\"AI 是不是长在骨子里\"：\n\n- **Composer 跨文件协作**是 Cursor 的招牌能力，原生 VS Code 加插件很难做到这种多文件协同改动的顺滑度。\n- **`@` 引用上下文**：在聊天或 K 里打 `@`，可以精准把某个文件、某个函数、甚至某个文档喂给 AI 当参考，让它\"看着这个来改\"，而不是瞎猜。这是 Cursor 里非常好用的一招。\n- **深度的项目索引**让 AI 能全局理解你的代码，回答\"这个功能散落在哪几个文件\"这类问题。\n\n> **术语：@ 引用上下文**\n> 一句话解释：在对话里用 `@` 手动指定\"参考哪个文件/函数\"，把准确的上下文塞给 AI。\n> 形象比喻：像开会时你把某份文件推到对方面前说\"照这个来\"，省得他自己乱翻。\n> 工作中怎么用：改 A 文件但逻辑要参照 B 文件时，`@B文件` 一提，AI 就不会两头对不上。\n> 最常踩的坑：不用 @ 直接让它改，它凭空脑补相关代码，结果对不上你项目的真实结构。\n\n### 隐私与联网注意点\n\n用 AI IDE 绕不开一个问题：你的代码会不会被传出去。定性地说几条，别当成绝对结论、以你所在公司/项目的合规要求为准：\n\n- **`.cursorignore` 文件**：类似 `.gitignore`，你可以在项目根目录建一个 `.cursorignore`，把不想让 AI 碰、不想被索引的文件/目录写进去（比如含密钥的配置、敏感数据）。这是你控制\"哪些内容参与 AI 处理\"的第一道闸。\n- **联网**：AI 补全和对话本质上要把相关上下文发到模型服务端处理，所以是需要联网的。断网时 AI 功能基本用不了。\n- **敏感信息**：不管工具怎么设置，最稳的做法永远是——**真实密钥、token、密码绝对不要写进代码文件**（走环境变量），这样就算内容参与了处理，泄露的也不是活凭证。\n\n（以上是原则性说明，Cursor 具体的数据处理策略、企业版隐私模式等，以官网最新条款为准，我这里不编具体数字。）\n\n### 常见坑\n\n- **登录后模型用不了 / 一直转圈**：多半是网络问题或试用额度设置没生效，先在命令面板（Shift + P）里确认当前选的是哪个模型，换一个再试。\n- **AI 回答对不上项目**：十有八九是索引没建完，或者没用 `@` 把相关文件喂给它——大项目先等索引，改动前先 `@` 引用。\n- **什么都用 Composer**：小改动用 Composer 反而慢、diff 大到审不过来，记住\"点状改动用 K，跨文件工程用 Composer\"。\n- **灰字补全乱按 Tab**：Auto Suggest 很好用，但别闭眼接受，看清楚它续写的是不是你要的再按 Tab，不然会引入你没注意到的逻辑。\n- **Git 没配就开干**：`git status` 报错还硬写，后面提交、看历史全乱，第一步就把 Git 凭证配好。\n\n### 小结\n\n这一章我们做了三件事：把 Cursor 装好并继承了原有配置；搞清楚了 2026 年该用哪个模型（质量优先 Claude Fable 5 / Opus 4.8，求快用 GPT-5.4 mini）；把四个每天要用几百次的快捷键——K（就地改）、L（聊天讨论）、Composer（跨文件重构）、Shift + P（命令面板）——的用途和使用场景过了一遍。再加上索引、Auto Suggest、`@` 引用、`.cursorignore` 这几个概念，你现在手里的这台 IDE 已经是一个\"会写代码的搭档\"，而不只是个文本编辑器。环境这一关过了，后面学起来会轻松很多。\n\n### 练习\n\n- 新建 hello.ts，按 Cmd/Ctrl + K 输入\"写一个打印 Hello JR Academy 的函数并导出\"\n- 观察生成代码，改 prompt 加参数校验，注意响应速度\n\n做完上面两步，再多练三个动作，把这章学到的都串起来：\n
